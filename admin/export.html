<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Qtutor Admin Export</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { font-family: 'Kanit', sans-serif !important; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f8fafc; overflow-x: hidden; }
    body { display: flex; min-height: 100vh; }

    :root {
      --sidebar-w: 240px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
      width: var(--sidebar-w); position: fixed; height: 100vh; z-index: 200;
      left: calc(-1 * var(--sidebar-w)); transition: left 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .sidebar.open { left: 0; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; backdrop-filter: blur(3px); }
    .sidebar.open ~ .sidebar-overlay { display: block; }
    .sidebar-header { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
    .sidebar-brand h1 { font-size: 22px; font-weight: 900; color: #fff; margin: 0; }
    .sidebar-brand p { color: #94a3b8; font-size: 10px; margin: 2px 0 0; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-close { display: none; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 20px; padding: 6px; }
    .sidebar-close:hover { color: #fff; }
    .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; color: #cbd5e1; font-weight: 600; font-size: 13px; text-decoration: none; cursor: pointer; transition: all 0.2s; margin-bottom: 3px; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
    .sidebar-footer { padding: 12px 10px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
    .logout-btn { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; border: none; background: rgba(239,68,68,0.1); color: #f87171; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { background: rgba(239,68,68,0.2); }

    @media (min-width: 1024px) {
      .sidebar { left: 0; }
      .sidebar-close { display: none !important; }
      .sidebar-overlay { display: none !important; }
      .content-area { margin-left: var(--sidebar-w); }
    }
    @media (max-width: 1023px) { .sidebar-close { display: block; } }

    /* ===== LAYOUT ===== */
    .content-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    main { flex: 1; padding: 16px; overflow-x: hidden; }
    @media (min-width: 768px) { main { padding: 20px 24px; } }
    .content-wrapper { max-width: 900px; margin: 0 auto; }

    /* ===== HEADER ===== */
    header {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 12px 16px; position: sticky; top: 0; z-index: 40;
      box-shadow: var(--shadow-sm);
    }
    .hdr-row1 { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
    .menu-toggle { display: none; background: #f1f5f9; border: none; padding: 8px 12px; border-radius: 10px; font-size: 18px; cursor: pointer; }
    @media (max-width: 1023px) { .menu-toggle { display: flex; } }
    .hdr-title { font-size: 15px; font-weight: 900; color: #0f172a; }
    .save-btn {
      background: #0f172a; color: #fff; padding: 8px 16px;
      border-radius: 10px; border: none; font-weight: 700; font-size: 12px;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .save-btn:hover { opacity: 0.85; }
    .save-btn:active { opacity: 0.7; transform: scale(0.97); }

    /* Course select row */
    .hdr-row2 { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .ctrl-select {
      flex: 1; background: #f1f5f9; border: 1px solid #e2e8f0;
      padding: 9px 12px; border-radius: 10px; font-weight: 600;
      font-size: 13px; cursor: pointer; color: #475569;
    }
    .ctrl-select:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

    /* Tab toggle */
    .view-tabs { display: flex; background: #f1f5f9; border-radius: 12px; padding: 3px; gap: 2px; }
    .tab-btn {
      flex: 1; padding: 8px 14px; border-radius: 10px; border: none;
      font-weight: 700; font-size: 13px; cursor: pointer;
      background: transparent; color: #64748b;
      transition: all 0.2s; white-space: nowrap;
    }
    .tab-btn.active { background: #fff; color: #0f172a; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    /* Student select (individual mode) */
    .student-row { display: none; }
    .student-row.show { display: block; }
    .student-sel {
      width: 100%; background: linear-gradient(135deg, #eef2ff, #f0f4ff);
      border: 2px solid #6366f1; padding: 9px 14px; border-radius: 10px;
      font-weight: 700; font-size: 13px; color: #4f46e5; cursor: pointer;
    }

    /* ===== TEST STRIP ===== */
    .strip-wrap { background: #fff; border-radius: 14px; padding: 8px 10px; box-shadow: var(--shadow-sm); margin-bottom: 16px; }
    .strip-lbl { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 4px 6px; }
    .strip-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 2px 4px 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .strip-scroll::-webkit-scrollbar { display: none; }
    .t-chip {
      flex: 0 0 auto; height: 38px; border-radius: 19px;
      background: #f1f5f9; color: #64748b; display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 12px; cursor: pointer;
      border: 2px solid transparent; white-space: nowrap; padding: 0 14px;
      transition: all 0.2s; touch-action: manipulation;
    }
    .t-chip:hover { background: #e2e8f0; }
    .t-chip.active {
      background: #0f172a; color: #fff; border-color: #0f172a;
      box-shadow: 0 3px 10px rgba(15,23,42,0.2);
    }

    /* ===== HERO DARK CARD ===== */
    .hero-dark {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-radius: 20px; padding: 20px; color: #fff;
      margin-bottom: 16px; box-shadow: var(--shadow-md);
      position: relative; overflow: hidden;
    }
    .hero-dark::before {
      content: ''; position: absolute; top: -40%; right: -5%;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-inner { position: relative; z-index: 1; }
    .hero-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .hero-icon { width: 44px; height: 44px; background: rgba(255,255,255,0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .hero-ttl { font-size: 20px; font-weight: 900; margin: 0 0 2px; }
    .hero-sub { font-size: 9px; color: #a5b4fc; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin: 0; }
    .hero-metrics { display: grid; gap: 8px; }
    .metric-box { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 12px; text-align: center; }
    .metric-lbl { font-size: 9px; font-weight: 700; color: #cbd5e1; text-transform: uppercase; margin-bottom: 4px; }
    .metric-val { font-size: 18px; font-weight: 900; color: #fff; margin: 0; }

    /* ===== STAT CARDS ===== */
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    @media (min-width: 600px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card { background: #fff; border-radius: 12px; padding: 12px; box-shadow: var(--shadow-sm); border: 1px solid #f1f5f9; }
    .stat-icon { font-size: 20px; margin-bottom: 4px; }
    .stat-lbl { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-val { font-size: 22px; font-weight: 900; color: #0f172a; }
    .stat-note { font-size: 11px; color: #94a3b8; margin-top: 2px; font-weight: 500; }

    /* ===== TOPICS ===== */
    .topics-card { background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); border: 1px solid #f1f5f9; }
    .topics-lbl { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
    .topic-box { background: #f8fafc; border-radius: 10px; padding: 10px 12px; border: 1px solid #e2e8f0; }
    .topic-sub { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
    .topic-nm { font-size: 12px; font-weight: 700; color: #0f172a; line-height: 1.4; }

    /* ===== RANKING SECTION ===== */
    .rank-section { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid #f1f5f9; margin-bottom: 16px; }
    .rank-header { background: #f8fafc; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .rank-title { font-size: 12px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: 0.5px; }
    .save-small { padding: 6px 12px; border-radius: 8px; border: none; background: #f1f5f9; color: #475569; font-weight: 700; font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .save-small:hover { background: #e2e8f0; }

    /* Desktop Table ≥768px */
    .rank-table-wrap { display: none; }
    @media (min-width: 768px) { .rank-table-wrap { display: block; } }
    .rank-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .rank-table thead { background: #0f172a; color: #fff; }
    .rank-table th { padding: 10px 14px; text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .rank-table td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    .rank-table tbody tr:hover { background: #f8fafc; }
    .rank-table tbody tr:last-child td { border-bottom: none; }
    .rank-badge { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; background: #f1f5f9; color: #64748b; }
    .rank-badge.r1 { background: #fef3c7; color: #d97706; }
    .rank-badge.r2 { background: #e5e7eb; color: #4b5563; }
    .rank-badge.r3 { background: #fed7aa; color: #b45309; }

    /* Mobile Cards <768px */
    .rank-cards { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
    @media (min-width: 768px) { .rank-cards { display: none; } }
    .rank-card { background: #fff; border-radius: 12px; padding: 12px 14px; border: 1px solid #e2e8f0; }
    .rank-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .card-badge { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: #fff; flex-shrink: 0; }
    .card-badge.r1 { background: linear-gradient(135deg, #fbbf24, #f97316); }
    .card-badge.r2 { background: linear-gradient(135deg, #c7d2e0, #94a3b8); }
    .card-badge.r3 { background: linear-gradient(135deg, #fdba74, #fb923c); }
    .card-badge.rn { background: linear-gradient(135deg, #cbd5e1, #94a3b8); font-size: 12px; }
    .card-nm { flex: 1; font-weight: 700; color: #0f172a; font-size: 14px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-overall { font-weight: 900; font-size: 17px; color: #6366f1; white-space: nowrap; }
    .card-subs { display: grid; gap: 5px; }
    .sub-box { text-align: center; padding: 5px 4px; background: #f8fafc; border-radius: 8px; border: 1px solid #f1f5f9; }
    .sub-lbl { font-size: 9px; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-bottom: 1px; }
    .sub-score { font-size: 13px; font-weight: 900; }

    /* ===== INDIVIDUAL HERO ===== */
    .ind-hero {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border-radius: 20px; padding: 20px; color: #fff;
      margin-bottom: 16px; box-shadow: var(--shadow-md);
      position: relative; overflow: hidden;
    }
    .ind-hero::before {
      content: ''; position: absolute; top: -40%; right: -5%;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .ind-inner { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 14px; }
    @media (min-width: 560px) { .ind-inner { flex-direction: row; align-items: center; justify-content: space-between; } }
    .ind-name { font-size: 24px; font-weight: 900; margin: 0 0 3px; }
    .ind-course { font-size: 10px; color: #a5b4fc; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
    .ind-avg-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 14px; padding: 14px 18px; text-align: center; min-width: 90px; flex-shrink: 0; }
    .ind-avg-lbl { font-size: 9px; font-weight: 700; color: #cbd5e1; text-transform: uppercase; margin-bottom: 4px; }
    .ind-avg-val { font-size: 30px; font-weight: 900; margin: 0; }

    /* ===== CHART CARD ===== */
    .chart-card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); border: 1px solid #f1f5f9; }
    .chart-hdr { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .chart-ttl { font-size: 12px; font-weight: 700; color: #334155; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    .chart-canvas-wrap { position: relative; height: 200px; }

    /* ===== SCORE TABLE ===== */
    .subj-section { background: #fff; border-radius: 14px; overflow: hidden; margin-bottom: 12px; box-shadow: var(--shadow-sm); border: 1px solid #f1f5f9; }
    .subj-head { padding: 11px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .subj-ttl { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: #0f172a; }
    .subj-line { width: 4px; height: 18px; border-radius: 2px; flex-shrink: 0; }
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* Compact score table */
    .score-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .score-tbl thead { background: #0f172a; color: #fff; }
    .score-tbl th { padding: 9px 12px; text-align: left; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .score-tbl td { padding: 9px 12px; border-bottom: 1px solid #f8fafc; }
    .score-tbl tbody tr:hover { background: #fafcff; }
    .score-tbl tbody tr:last-child td { border-bottom: none; }
    .pct-text { font-weight: 900; font-size: 13px; }
    .pct-pass { color: #10b981; }
    .pct-fail { color: #ef4444; }
    .pct-total { color: #6366f1; font-weight: 900; }

    /* ===== ANIM ===== */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .anim { animation: fadeUp 0.3s ease-out forwards; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar flex flex-col">
    <div class="px-5 py-6 border-b border-slate-800 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-black text-white">Qtutor</h1>
        <p class="text-slate-500 text-xs mt-0.5">Admin Panel</p>
      </div>
      <button onclick="closeSidebar()" class="md:hidden text-slate-400 hover:text-slate-300 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="dashboard.html" class="nav-item"><span>📊</span> ภาพรวม</a>
      <a href="scores.html" class="nav-item"><span>📝</span> จัดการคะแนน</a>
      <a href="students.html" class="nav-item"><span>👥</span> นักเรียน</a>
      <a href="courses.html" class="nav-item"><span>📚</span> คอร์สเรียน</a>
      <a href="content.html" class="nav-item"><span>🎬</span> เนื้อหา (เฉลย/คลิป)</a>
      <a href="export.html" class="nav-item active"><span>📤</span> Export รายงาน</a>
    </nav>
    <div class="px-3 py-4 border-t border-slate-800">
      <button onclick="logout()" class="nav-item w-full text-left text-red-400 hover:bg-red-500/10 hover:text-red-300 rounded-xl">
        <span>🚪</span> ออกจากระบบ
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Content -->
  <div class="content-area">
    <header>
      <!-- Row 1: menu + title + save -->
      <div class="hdr-row1">
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <span class="hdr-title">📤 Export รายงาน</span>
        </div>
        <button class="save-btn" onclick="saveCurrentView()">📸 บันทึกรูป</button>
      </div>

      <!-- Row 2: course select + view tabs -->
      <div class="hdr-row2">
        <select id="courseSelect" onchange="onCourseChange()" class="ctrl-select">
          <option value="">-- เลือกคอร์ส --</option>
        </select>
        <div class="view-tabs">
          <button class="tab-btn active" onclick="switchView('ranking', this)">🏆 อันดับ</button>
          <button class="tab-btn" onclick="switchView('individual', this)">👤 รายบุคคล</button>
        </div>
      </div>

      <!-- Row 3: student select (individual only) -->
      <div class="student-row" id="studentRow">
        <select id="studentSelect" onchange="renderIndividual()" class="student-sel">
          <option value="">-- เลือกนักเรียน --</option>
        </select>
      </div>
    </header>

    <main>
      <div class="content-wrapper">

        <!-- ===== RANKING VIEW ===== -->
        <div id="rankingView">
          <div class="stat-grid" id="statGrid"></div>

          <div class="strip-wrap">
            <div class="strip-lbl">📋 เลือกการสอบ</div>
            <div class="strip-scroll" id="testStrip"></div>
          </div>

          <div class="hero-dark">
            <div class="hero-inner">
              <div class="hero-head">
                <div class="hero-icon">🏆</div>
                <div>
                  <h2 class="hero-ttl" id="rankTitle">Dashboard</h2>
                  <p class="hero-sub" id="rankCourse"></p>
                </div>
              </div>
              <div class="hero-metrics" id="heroMetrics"></div>
            </div>
          </div>

          <div class="topics-card" id="topicsCard" style="display:none;">
            <div class="topics-lbl" id="topicsLbl">📖 เนื้อหาที่สอบ</div>
            <div class="topics-grid" id="topicsGrid"></div>
          </div>

          <div class="rank-section" id="rankSection">
            <div class="rank-header">
              <span class="rank-title">📈 อันดับนักเรียน</span>
              <button class="save-small" onclick="saveElement('rankSection','อันดับ')">📸 บันทึก</button>
            </div>
            <div class="rank-table-wrap">
              <table class="rank-table">
                <thead id="rankTableHead"></thead>
                <tbody id="rankTableBody"></tbody>
              </table>
            </div>
            <div class="rank-cards" id="rankCards"></div>
          </div>
        </div>

        <!-- ===== INDIVIDUAL VIEW ===== -->
        <div id="individualView" style="display:none;">
          <div class="ind-hero" id="indHero">
            <div class="ind-inner">
              <div>
                <h2 class="ind-name" id="iName">กรุณาเลือกนักเรียน</h2>
                <p class="ind-course" id="iCourse"></p>
              </div>
              <div class="ind-avg-box">
                <div class="ind-avg-lbl">คะแนนรวม</div>
                <p class="ind-avg-val" id="iTotalPct">—%</p>
              </div>
            </div>
          </div>

          <div class="chart-card" id="chartCard">
            <div class="chart-hdr">
              <p class="chart-ttl">
                <span style="width:4px;height:16px;background:#6366f1;border-radius:2px;display:inline-block;"></span>
                วิเคราะห์พัฒนาการ (%)
              </p>
              <button class="save-small" onclick="saveElement('chartCard','กราฟ')">📸 บันทึกกราฟ</button>
            </div>
            <div class="chart-canvas-wrap">
              <canvas id="progressChart"></canvas>
            </div>
          </div>

          <div id="iScoreList"></div>
        </div>

      </div>
    </main>
  </div>

  <script>
    /* ===== CONFIG ===== */
    const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ===== STATE ===== */
    let allStudents = [], students = [], allScores = [], allCourses = [];
    // allSettings: rows from score_settings for the active course.
    // Keyed access via settingsKey(testNumber, subject) -> { full_score, topic }
    let allSettings = [];
    let courseInfo = null, activeTest = 0, chart = null;
    let currentSubjects = [], currentView = 'ranking';

    /* ===== SETTINGS LOOKUP HELPERS ===== */
    // Build a fast lookup key from test_number + subject (same composite key as the DB constraint).
    function settingsKey(courseCode, testNum, subject) {
      return `${courseCode}__${testNum}__${subject}`;
    } 

    // Returns { full_score, topic } from score_settings, with safe fallbacks so nothing crashes.
    function getSettings(courseCode, testNum, subject) {
      const row = allSettings.find(
        r =>
          r.course_code === courseCode &&
          r.test_number === testNum &&
          r.subject === subject
      );

      return {
        full_score: Number(row?.full_score || 0),
        topic: row?.topic || null
      };
    }

    // Enrich a test_scores row with full_score and topic from score_settings.
    // Returns a new object — never mutates the original.
    function enrichScore(sc) {
      const meta = getSettings(
        sc.course_code,
        sc.test_number,
        sc.subject
      );

      return {
        ...sc,
        full_score: meta.full_score,
        topic: meta.topic
      };
    }

    /* ===== SUBJECT ORDER: วิทย์ → คณิต → อังกฤษ → อื่นๆ ===== */
    const SUBJECT_ORDER = [
      'วิทยาศาสตร์','วิทย์',
      'คณิตศาสตร์','คณิต',
      'ภาษาอังกฤษ','อังกฤษ',
      'ภาษาไทย','ไทย',
      'สังคมศึกษา','สังคม'
    ];
    function sortSubjects(subs) {
      return [...subs].sort((a, b) => {
        const ia = SUBJECT_ORDER.findIndex(x => x === a);
        const ib = SUBJECT_ORDER.findIndex(x => x === b);
        if (ia === -1 && ib === -1) return a.localeCompare(b);
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
      });
    }

    /* ===== COLOR MAP ===== */
    const PALETTE = ['#6366f1','#10b981','#3b82f6','#f59e0b','#a855f7','#ef4444'];
    function subjectColor(sub, idx) {
      const map = {'วิทยาศาสตร์':'#10b981','วิทย์':'#10b981','คณิตศาสตร์':'#3b82f6','คณิต':'#3b82f6','ภาษาอังกฤษ':'#a855f7','อังกฤษ':'#a855f7','ภาษาไทย':'#f59e0b','สังคมศึกษา':'#64748b'};
      return map[sub] || PALETTE[idx % PALETTE.length];
    }

    /* ===== INIT ===== */
    async function init() {
      try {
        // Fetch courses, students, test_scores, AND score_settings in one parallel round-trip.
        // score_settings is the source of truth for full_score and topic.
        // test_scores contains only: student_id, course_code, test_number, subject, score.
        const [cRes, sRes, scRes, stRes] = await Promise.all([
          db.from('courses')
            .select('*')
            .eq('is_active', true)
            .order('sort_order', { ascending: true }),
          db.from('students').select('*'),
          // Fetch only the columns that test_scores now owns — no full_score, no topic.
          db.from('test_scores').select('student_id, course_code, test_number, subject, score'),
          // Single fetch for ALL settings across ALL courses.
          // onCourseChange will filter to the active course_code before using.
          db.from('score_settings').select('course_code, test_number, subject, full_score, topic')
        ]);

        allCourses   = cRes.data  || [];
        allStudents  = sRes.data  || [];
        allScores    = scRes.data || [];   // raw rows — no full_score/topic yet
        allSettings  = stRes.data || [];   // metadata from score_settings

        const sel = document.getElementById('courseSelect');

        if (allCourses.length > 0) {
          sel.innerHTML = allCourses.map(c =>
            `<option value="${c.course_code}">${c.course_name}</option>`
          ).join('');
          await onCourseChange();
        } else {
          sel.innerHTML = '<option value="">-- ไม่มีคอร์สที่เปิดสอน --</option>';
        }

      } catch(e) {
        console.error('Init error:', e);
      }
    }

    async function onCourseChange() {
      const code = document.getElementById('courseSelect').value;
      if (!code) return;
      courseInfo = allCourses.find(c => c.course_code === code) || null;

      // Raw rows for this course (score only — no full_score/topic in test_scores).
      const rawCourseScores = allScores.filter(s => s.course_code === code);

      // Enrich every row with full_score + topic pulled from allSettings.
      // allSettings was fetched once in init() — no extra DB call needed here.
      const cs = rawCourseScores.map(enrichScore);

      currentSubjects = sortSubjects([...new Set(cs.map(s => s.subject))]);

      const ids = new Set(cs.map(s => s.student_id));
      students = allStudents.filter(s => ids.has(s.id));

      updateStudentSelect();
      activeTest = 0;

      const tests = [...new Set(cs.map(s => s.test_number))].sort((a,b) => a-b);
      renderTestStrip(tests);

      if (currentView === 'ranking') renderRanking();
      else renderIndividual();
    }

    function updateStudentSelect() {
      const sel = document.getElementById('studentSelect');
      sel.innerHTML = `<option value="">-- เลือกนักเรียน --</option>` +
        students.map(s => `<option value="${s.id}">${s.nickname}</option>`).join('');
    }

    /* ===== VIEW SWITCH (tab) ===== */
    function switchView(view, btn) {
      currentView = view;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const isInd = view === 'individual';
      document.getElementById('rankingView').style.display = isInd ? 'none' : 'block';
      document.getElementById('individualView').style.display = isInd ? 'block' : 'none';
      document.getElementById('studentRow').classList.toggle('show', isInd);
      document.getElementById('testStrip').closest('.strip-wrap').style.display = isInd ? 'none' : 'block';

      if (isInd) renderIndividual();
    }

    /* ===== TEST STRIP ===== */
    function renderTestStrip(tests) {
      const strip = document.getElementById('testStrip');
      strip.innerHTML = `<div class="t-chip active" onclick="selectTest(0, this)">รวม</div>` +
        tests.map(t => `<div class="t-chip" onclick="selectTest(${t}, this)">ครั้งที่ ${t}</div>`).join('');
    }

    function selectTest(val, btn) {
      activeTest = val;
      document.querySelectorAll('.t-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRanking();
    }

    /* ===== RANKING ===== */
    function renderRanking() {
      const code = document.getElementById('courseSelect').value;
      if (!code) return;

      // Enrich all scores for this course from score_settings (full_score + topic).
      const cs       = allScores.filter(s => s.course_code === code).map(enrichScore);
      const filtered = activeTest === 0 ? cs : cs.filter(s => s.test_number === activeTest);
      const courseName = document.getElementById('courseSelect').selectedOptions[0]?.text || '';

      document.getElementById('rankTitle').textContent = activeTest === 0 ? 'สรุปภาพรวมสะสม' : `การสอบครั้งที่ ${activeTest}`;
      document.getElementById('rankCourse').textContent = courseName;

      // Build per-student data using full_score from score_settings (via enrichScore).
      const map = {};
      filtered.forEach(sc => {
        if (sc.score == null) return;            // skip rows with no score entered
        const sid = sc.student_id;
        if (!map[sid]) { map[sid] = { totalS:0, totalF:0, subs:{} }; currentSubjects.forEach(s => map[sid].subs[s] = {s:0,f:0}); }
        if (map[sid].subs[sc.subject]) {
          map[sid].subs[sc.subject].s += +sc.score;
          map[sid].subs[sc.subject].f += +sc.full_score;   // from score_settings
        }
        map[sid].totalS += +sc.score;
        map[sid].totalF += +sc.full_score;                  // from score_settings
      });

      const rows = Object.entries(map).map(([sid, d]) => ({
        id: +sid,
        nickname: students.find(s => s.id === +sid)?.nickname || '—',
        subs: currentSubjects.map(sub => d.subs[sub]?.f > 0 ? d.subs[sub].s / d.subs[sub].f * 100 : null),
        pct: d.totalF > 0 ? d.totalS / d.totalF * 100 : 0
      })).sort((a,b) => b.pct - a.pct);

      renderStats(rows, cs);
      renderHeroMetrics(rows);
      renderTopics(filtered);
      renderRankTable(rows);
      renderRankCards(rows);
    }

    function renderStats(rows, cs) {
      const avg = rows.length ? rows.reduce((a,b) => a + b.pct, 0) / rows.length : 0;
      const top = rows[0];
      const needsHelp = rows.filter(r => r.pct < 60).length;
      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-lbl">นักเรียน</div><div class="stat-val">${students.length}</div><div class="stat-note">คน</div></div>
        <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-lbl">ค่าเฉลี่ย</div><div class="stat-val">${avg.toFixed(1)}%</div><div class="stat-note">โดยรวม</div></div>
        <div class="stat-card"><div class="stat-icon">🥇</div><div class="stat-lbl">อันดับ 1</div><div class="stat-val" style="font-size:16px;">${top ? top.nickname : '-'}</div><div class="stat-note">${top ? top.pct.toFixed(1)+'%' : ''}</div></div>
        <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-lbl">ต้องช่วยเหลือ</div><div class="stat-val">${needsHelp}</div><div class="stat-note">คะแนน < 60%</div></div>
      `;
    }

    function renderHeroMetrics(rows) {
      const overall = rows.length ? (rows.reduce((a,b) => a+b.pct,0)/rows.length).toFixed(1)+'%' : '-';
      let html = `<div class="metric-box"><div class="metric-lbl">เฉลี่ยรวม</div><p class="metric-val">${overall}</p></div>`;
      currentSubjects.forEach((sub, idx) => {
        const vals = rows.map(r => r.subs[idx]).filter(v => v !== null);
        const avg = vals.length ? (vals.reduce((a,b) => a+b,0)/vals.length).toFixed(1)+'%' : '-';
        html += `<div class="metric-box"><div class="metric-lbl">${sub}</div><p class="metric-val">${avg}</p></div>`;
      });
      const grid = document.getElementById('heroMetrics');
      const cols = Math.min(1 + currentSubjects.length, 4);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.innerHTML = html;
    }

    function renderTopics(filtered) {
      const card = document.getElementById('topicsCard');

      if (courseInfo?.score_display_mode === 'test_summary') {
        card.style.display = 'none';
        return;
      }

      // Topics now come from score_settings (via enrichScore), not test_scores.
      // One canonical topic per (test_number, subject) pair — no per-student duplication.
      const hasTopics = currentSubjects.some(sub => filtered.some(f => f.subject === sub && f.topic));
      if (!hasTopics) {
        card.style.display = 'none';
        return;
      }

      card.style.display = 'block';
      document.getElementById('topicsLbl').textContent =
        activeTest === 0 ? '📚 ภาพรวมเนื้อหาการสอบทั้งหมด' : '📖 เนื้อหาที่สอบครั้งนี้';

      document.getElementById('topicsGrid').innerHTML = currentSubjects.map(sub => {
        // De-duplicate topics per subject (multiple students share the same topic row).
        // Sort by test_number so the list is chronological.
        const topics = [
          ...new Set(
            filtered
              .filter(f => f.subject === sub && f.topic)
              .sort((a, b) => a.test_number - b.test_number)
              .map(f => f.topic)
          )
        ];

        return `
          <div class="topic-box">
            <div class="topic-sub">${sub}</div>
            <div class="topic-nm">
              ${topics.length
                ? (activeTest === 0
                    ? topics.map((t, i) => `<div class="mb-1">${i + 1}. ${t}</div>`).join('')
                    : topics.join(', '))
                : '<span style="color:#cbd5e1;font-style:italic;">ไม่มีข้อมูลเนื้อหา</span>'
              }
            </div>
          </div>`;
      }).join('');
    }

    function rankColor(pct) {
      return pct !== null ? (pct >= 60 ? '#10b981' : '#ef4444') : '#94a3b8';
    }

    function renderRankTable(rows) {
      // Show topic under subject name in the header (from score_settings via getSettings).
      // For "all tests" view (activeTest === 0), topics may differ per test so we omit them.
      const subCols = currentSubjects.map(sub => {
        const meta  = activeTest !== 0 ? getSettings(activeTest, sub) : null;
        const topic = meta?.topic ? `<div style="font-size:9px;font-weight:500;color:#a5b4fc;margin-top:2px;">${meta.topic}</div>` : '';
        return `<th style="text-align:center;min-width:70px;">${sub}${topic}</th>`;
      }).join('');

      document.getElementById('rankTableHead').innerHTML =
        `<tr><th style="width:52px;">อันดับ</th><th>ชื่อ</th>${subCols}<th style="text-align:right;">รวม</th></tr>`;

      document.getElementById('rankTableBody').innerHTML = rows.map((r, i) => {
        const bClass   = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
        const subCells = r.subs.map(s =>
          `<td style="text-align:center;font-weight:700;color:${rankColor(s)};">${s !== null ? s.toFixed(1)+'%' : '—'}</td>`
        ).join('');
        return `<tr>
          <td><div class="rank-badge ${bClass}">${i+1}</div></td>
          <td style="font-weight:700;color:#0f172a;">${r.nickname}</td>
          ${subCells}
          <td style="text-align:right;font-weight:900;color:#6366f1;">${r.pct.toFixed(1)}%</td>
        </tr>`;
      }).join('');
    }

    function renderRankCards(rows) {
      const cols = Math.max(1, Math.min(currentSubjects.length, 4));
      document.getElementById('rankCards').innerHTML = rows.map((r, i) => {
        const bClass = i===0?'r1':i===1?'r2':i===2?'r3':'rn';
        const subBoxes = r.subs.map((s,idx) => `
          <div class="sub-box">
            <div class="sub-lbl">${currentSubjects[idx]}</div>
            <div class="sub-score" style="color:${rankColor(s)};">${s !== null ? s.toFixed(1)+'%' : '—'}</div>
          </div>`).join('');
        return `<div class="rank-card anim">
          <div class="rank-card-top">
            <div class="card-badge ${bClass}">${i+1}</div>
            <div class="card-nm">${r.nickname}</div>
            <div class="card-overall">${r.pct.toFixed(1)}%</div>
          </div>
          <div class="card-subs" style="grid-template-columns:repeat(${cols},1fr);">${subBoxes}</div>
        </div>`;
      }).join('');
    }

    /* ===== INDIVIDUAL ===== */
    function renderIndividual() {
      const sid = document.getElementById('studentSelect').value;
      if (!sid) return;
      const s = students.find(x => x.id == sid);
      if (!s) return;

      const code = document.getElementById('courseSelect').value;

      // Enrich this student's scores with full_score + topic from score_settings.
      const mySc = allScores
        .filter(sc => sc.student_id == sid && sc.course_code === code)
        .map(enrichScore)
        .sort((a,b) => a.test_number - b.test_number);

      const tests    = [...new Set(mySc.map(m => m.test_number))].sort((a,b) => a-b);
      const subjects = sortSubjects([...new Set(mySc.map(m => m.subject))]);
      const courseName = document.getElementById('courseSelect').selectedOptions[0]?.text || '';

      // Totals use full_score from score_settings (via enrichScore), not test_scores.
      const totalS = mySc.filter(m => m.score != null).reduce((a,b) => a + +b.score, 0);
      const totalF = mySc.filter(m => m.score != null).reduce((a,b) => a + +b.full_score, 0);

      document.getElementById('iName').textContent = `น้อง${s.nickname}`;
      document.getElementById('iCourse').textContent = courseName;
      document.getElementById('iTotalPct').textContent = totalF > 0 ? (totalS/totalF*100).toFixed(1)+'%' : '—%';

      renderProgressChart(mySc, tests, subjects);

      if (courseInfo?.score_display_mode === 'test_summary') renderSummaryTable(mySc, tests, subjects);
      else renderBySubject(mySc, subjects, s.nickname);
    }

    function renderProgressChart(mySc, tests, subjects) {
      if (chart) chart.destroy();
      const labels   = tests.map(t => `ครั้งที่ ${t}`);
      // full_score is already enriched from score_settings on every row in mySc.
      const datasets = subjects.map((sub, idx) => ({
        label: sub,
        data: tests.map(t => {
          const r = mySc.find(m => m.test_number===t && m.subject===sub);
          // Guard: skip rows with no score or zero full_score (no crash if settings missing).
          return (r && r.score != null && r.full_score > 0)
            ? +(r.score / r.full_score * 100).toFixed(1)
            : null;
        }),
        borderColor: subjectColor(sub, idx), borderWidth: 2, tension: 0.35, pointRadius: 4, spanGaps: true, fill: false
      }));

      const overallData = tests.map(t => {
        const rows = mySc.filter(m => m.test_number===t && m.score != null);
        const s = rows.reduce((a,b) => a + +b.score, 0);
        const f = rows.reduce((a,b) => a + +b.full_score, 0);   // from score_settings
        return f > 0 ? +(s/f*100).toFixed(1) : null;
      });
      datasets.push({ label: 'ภาพรวม', data: overallData, borderColor: '#0f172a', borderWidth: 3, pointRadius: 5, fill: false, tension: 0.35, borderDash: [6,4] });

      const allVals = datasets.flatMap(d => d.data).filter(v => v !== null);
      const minVal = allVals.length ? Math.min(...allVals) : 0;
      const yMin = minVal > 20 ? Math.floor((minVal-10)/10)*10 : 0;

      chart = new Chart(document.getElementById('progressChart'), {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            y: { min: yMin, max: 100, ticks: { font:{size:10}, callback: v => v+'%' }, grid: { color:'rgba(0,0,0,0.04)' } },
            x: { ticks: { font:{size:10} }, grid: { display:false } }
          },
          plugins: { legend: { position:'bottom', labels: { boxWidth:8, font:{size:10,weight:'bold'}, padding:10 } } }
        },
        plugins: [{
          id: 'line60',
          beforeDraw(c) {
            const {ctx, chartArea:{left,right}, scales:{y}} = c;
            const yPos = y.getPixelForValue(60);
            ctx.save(); ctx.strokeStyle='#ef4444'; ctx.setLineDash([5,5]); ctx.lineWidth=1.2; ctx.globalAlpha=0.5;
            ctx.beginPath(); ctx.moveTo(left,yPos); ctx.lineTo(right,yPos); ctx.stroke(); ctx.restore();
          }
        }]
      });
    }

    function renderBySubject(mySc, subjects, nickname) {
      document.getElementById('iScoreList').innerHTML = subjects.map((sub, idx) => {
        const subRows = mySc.filter(m => m.subject === sub && m.score != null);
        if (!subRows.length) return '';
        const color = subjectColor(sub, idx);

        // full_score and topic already on each row via enrichScore — no fallback needed.
        // Guard for missing score_settings entry: display 'N/A' / '-' gracefully.
        const rows = subRows.map(row => {
          const fullScore = row.full_score > 0 ? row.full_score : null;
          const pct       = fullScore ? row.score / fullScore * 100 : 0;
          const scoreDisp = fullScore
            ? `${row.score}/${fullScore}`
            : `${row.score}/N/A`;
          const topicDisp = row.topic || '-';
          return `<tr>
            <td style="color:#94a3b8;font-weight:700;width:46px;">T${row.test_number}</td>
            <td style="color:#0f172a;">${topicDisp}</td>
            <td style="text-align:center;color:#475569;font-weight:700;">${scoreDisp}</td>
            <td style="text-align:right;"><span class="pct-text ${fullScore && pct>=60?'pct-pass':'pct-fail'}">${fullScore ? pct.toFixed(0)+'%' : '—'}</span></td>
          </tr>`;
        }).join('');

        const capId = `cap-${sub.replace(/\s/g,'_')}`;
        return `<div class="subj-section" id="${capId}">
          <div class="subj-head">
            <h3 class="subj-ttl"><span class="subj-line" style="background:${color};"></span>วิชา${sub}</h3>
            <button class="save-small" onclick="saveElement('${capId}','${sub}_${nickname}')">📸 บันทึก</button>
          </div>
          <div class="tbl-wrap">
            <table class="score-tbl">
              <thead><tr><th style="width:46px;">ครั้ง</th><th>เนื้อหา</th><th style="text-align:center;">คะแนน</th><th style="text-align:right;">%</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
      }).join('');
    }

    function renderSummaryTable(mySc, tests, subjects) {
      // Show topic under each subject in the header.
      // For summary mode every test may have a different topic, so we list all unique ones.
      const headerHtml = `<tr>
        <th style="width:60px;">ครั้งที่</th>
        ${subjects.map(s => {
          const topics = [...new Set(
            mySc
              .filter(m => m.subject === s && m.topic)
              .sort((a,b) => a.test_number - b.test_number)
              .map(m => m.topic)
          )];
          const topicLine = topics.length
            ? `<div style="font-size:9px;font-weight:500;color:#a5b4fc;margin-top:2px;">${topics.join(', ')}</div>`
            : '';
          return `<th style="text-align:center;">${s}${topicLine}</th>`;
        }).join('')}
        <th style="text-align:right;">รวม</th>
      </tr>`;

      const rowsHtml = tests.map(t => {
        let rs=0, rf=0;
        const cells = subjects.map(sub => {
          const row = mySc.find(m => m.test_number===t && m.subject===sub && m.score != null);
          if (row) {
            // full_score is from score_settings (via enrichScore).
            const full = row.full_score > 0 ? row.full_score : null;
            const p    = full ? row.score / full * 100 : 0;
            rs += +row.score;
            rf += full || 0;
            return full
              ? `<td style="text-align:center;"><span class="pct-text ${p>=60?'pct-pass':'pct-fail'}">${p.toFixed(0)}%</span></td>`
              : `<td style="text-align:center;color:#94a3b8;">N/A</td>`;
          }
          return `<td style="text-align:center;color:#cbd5e1;">-</td>`;
        }).join('');
        const tp = rf>0 ? (rs/rf*100).toFixed(0) : 0;
        return `<tr>
          <td style="font-weight:700;color:#0f172a;">ครั้งที่ ${t}</td>
          ${cells}
          <td style="text-align:right;"><span class="pct-text pct-total">${tp}%</span></td>
        </tr>`;
      }).join('');

      document.getElementById('iScoreList').innerHTML = `<div class="subj-section" id="cap-summary">
        <div class="subj-head">
          <h3 class="subj-ttl"><span class="subj-line" style="background:#6366f1;"></span>ตารางสรุปคะแนน</h3>
          <button class="save-small" onclick="saveElement('cap-summary','สรุปคะแนน')">📸 บันทึก</button>
        </div>
        <div class="tbl-wrap">
          <table class="score-tbl">
            <thead>${headerHtml}</thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      </div>`;
    }

    /* ===== SAVE IMAGE ===== */
    async function saveElement(id, name) {
      const el = document.getElementById(id);
      if (!el) return;
      const btns = el.querySelectorAll('button');
      btns.forEach(b => b.style.visibility = 'hidden');
      try {
        const canvas = await html2canvas(el, { scale: 3, useCORS: true, backgroundColor: '#ffffff', logging: false });
        const link = document.createElement('a');
        link.download = `Qtutor_${name}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
      } finally { btns.forEach(b => b.style.visibility = 'visible'); }
    }

    async function saveCurrentView() {
      const elId = currentView === 'ranking' ? 'rankingView' : 'individualView';
      const el = document.getElementById(elId);
      const btns = el.querySelectorAll('button');
      btns.forEach(b => b.style.visibility = 'hidden');
      const code = document.getElementById('courseSelect').value;
      const sid = document.getElementById('studentSelect').value;
      const s = students.find(x => x.id == sid);
      const name = currentView === 'ranking' ? `Ranking_${code}` : `Individual_${s ? s.nickname : 'Student'}`;
      try {
        const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#f8fafc', logging: false });
        const link = document.createElement('a');
        link.download = `${name}.png`;
        link.href = canvas.toDataURL('image/png', 0.95);
        link.click();
      } finally { btns.forEach(b => b.style.visibility = 'visible'); }
    }

    /* ===== SIDEBAR ===== */
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
    function logout() { if (confirm('ออกจากระบบ?')) { sessionStorage.clear(); location.href = 'index.html'; } }

    init();
  </script>
</body>
