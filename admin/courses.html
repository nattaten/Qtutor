<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>คอร์สเรียน - Qtutor Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { font-family: 'Kanit', sans-serif !important; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f8fafc; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
      width: 240px; position: fixed; top: 0; left: -240px; height: 100vh;
      z-index: 200; display: flex; flex-direction: column;
      transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    .sidebar.open { left: 0; }
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 150;
      backdrop-filter: blur(3px);
    }
    .overlay.show { display: block; }
    @media (min-width: 1024px) {
      .sidebar { left: 0; }
      .overlay { display: none !important; }
      .content { margin-left: 240px; }
      .menu-toggle { display: none !important; }
    }

    .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 10px; color: #94a3b8; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s; text-decoration: none; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item.active { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; }

    /* ===== COMPONENTS ===== */
    .field-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; display: block; }
    .inp { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 11px 13px; font-size: 14px; font-weight: 600; color: #1e293b; width: 100%; transition: border-color 0.15s; }
    .inp:focus { outline: none; border-color: #6366f1; background: #fff; }
    .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; font-weight: 900; border-radius: 12px; padding: 12px 20px; transition: all 0.15s; border: none; cursor: pointer; font-size: 14px; touch-action: manipulation; }
    .btn-primary:active { opacity: 0.8; transform: scale(0.97); }
    .btn-sm { font-weight: 700; border-radius: 9px; padding: 9px 14px; font-size: 13px; border: none; cursor: pointer; transition: all 0.15s; touch-action: manipulation; }
    .btn-sm:active { opacity: 0.7; }
    .btn-edit   { background: #ede9fe; color: #6d28d9; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); z-index: 400; padding: 13px 22px; border-radius: 14px; font-weight: 700; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); transition: all 0.3s; opacity: 0; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { background: #d1fae5; color: #065f46; }
    .toast.error   { background: #fee2e2; color: #991b1b; }

    /* ===== MODAL ===== */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,0.5);
      z-index: 300; display: flex; align-items: flex-end; justify-content: center;
      padding: 0;
    }
    @media (min-width: 560px) {
      .modal-backdrop { align-items: center; padding: 16px; }
    }
    .modal {
      background: #fff; border-radius: 24px 24px 0 0; padding: 24px 20px 32px;
      width: 100%; max-width: 560px; max-height: 95vh; overflow-y: auto;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
    }
    @media (min-width: 560px) {
      .modal { border-radius: 24px; padding: 28px; }
    }
    .modal-drag { width: 40px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 0 auto 20px; }
    @media (min-width: 560px) { .modal-drag { display: none; } }

    /* ===== COURSE CARD ===== */
    .course-card { background: #fff; border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; overflow: hidden; }
    .course-card-body { padding: 16px; }
    .course-card-actions { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #f8fafc; }
    .course-card-actions .btn-sm { flex: 1; text-align: center; }
  </style>
</head>
<body>

  <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar flex flex-col">
    <div class="px-5 py-6 border-b border-slate-800 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-black text-white">Qtutor</h1>
        <p class="text-slate-500 text-xs mt-0.5">Admin Panel</p>
      </div>
      <button onclick="closeSidebar()" class="md:hidden text-slate-400 hover:text-slate-300 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="dashboard.html" class="nav-item"><span>📊</span> ภาพรวม</a>
      <a href="scores.html" class="nav-item"><span>📝</span> จัดการคะแนน</a>
      <a href="students.html" class="nav-item"><span>👥</span> นักเรียน</a>
      <a href="courses.html" class="nav-item active"><span>📚</span> คอร์สเรียน</a>
      <a href="content.html" class="nav-item"><span>🎬</span> เนื้อหา (เฉลย/คลิป)</a>
      <a href="export.html" class="nav-item"><span>📤</span> Export รายงาน</a>
    </nav>
    <div class="px-3 py-4 border-t border-slate-800">
      <button onclick="logout()" class="nav-item w-full text-left text-red-400 hover:bg-red-500/10 hover:text-red-300 rounded-xl">
        <span>🚪</span> ออกจากระบบ
      </button>
    </div>
  </aside>

  <!-- Content -->
  <div class="content" style="min-height:100vh;display:flex;flex-direction:column;">
    <!-- Header -->
    <header style="background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 16px;position:sticky;top:0;z-index:40;box-shadow:0 1px 6px rgba(0,0,0,0.05);">
      <div style="display:flex;justify-content:space-between;align-items:center;max-width:900px;margin:0 auto;">
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="menu-toggle" onclick="openSidebar()" style="background:#f1f5f9;border:none;padding:9px 12px;border-radius:10px;font-size:18px;cursor:pointer;line-height:1;">☰</button>
          <span style="font-size:16px;font-weight:900;color:#0f172a;">📚 คอร์สเรียน</span>
        </div>
        <button onclick="openModal()" class="btn-primary" style="font-size:13px;padding:10px 18px;">+ สร้างคอร์ส</button>
      </div>
    </header>

    <main style="flex:1;padding:16px;max-width:900px;width:100%;margin:0 auto;">
      <div id="courseGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;">
        <div style="grid-column:1/-1;text-align:center;padding:40px 0;color:#94a3b8;font-weight:600;">กำลังโหลด...</div>
      </div>
    </main>
  </div>

  <!-- Course Modal -->
  <div id="modal" class="modal-backdrop" style="display:none;" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <div class="modal-drag"></div>
      <h3 id="modalTitle" style="font-size:18px;font-weight:900;color:#0f172a;margin:0 0 20px;">สร้างคอร์ส</h3>
      <input type="hidden" id="editId" />
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div><label class="field-label">รหัสคอร์ส *</label><input id="modalCode" type="text" class="inp" style="font-family:monospace;font-size:13px;" /></div>
          <div><label class="field-label">ชื่อคอร์ส *</label><input id="modalName" type="text" class="inp" /></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div><label class="field-label">ระดับชั้น</label>
            <select id="modalLevel" class="inp">
            <option value="สอบเข้า ม.1">สอบเข้า ม.1</option>
            <option value="สอบเข้า ม.4">สอบเข้า ม.4</option>
            <option value="ม.1">ม.1</option>
            <option value="ม.2">ม.2</option>
            <option value="ม.3">ม.3</option>
          </select>
          </div>
          <div><label class="field-label">ลำดับแสดงผล</label><input id="modalSort" type="number" class="inp" /></div>
        </div>
        <div>
          <label class="field-label">โหมดแสดงคะแนน</label>
          <select id="modalScoreMode" class="inp">
            <option value="total">แสดงคะแนนรวม</option>
            <option value="by_subject">แสดงแยกรายวิชา</option>
            
          </select>
        </div>
        <div>
          <label class="field-label">สถานะ</label>
          <select id="modalIsActive" class="inp">
            <option value="true">เปิด</option>
            <option value="false">ปิด</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:24px;">
        <button onclick="closeModal()" style="flex:1;background:#f1f5f9;color:#475569;font-weight:700;border-radius:12px;padding:13px;border:none;cursor:pointer;font-size:14px;">ยกเลิก</button>
        <button onclick="saveCourse()" class="btn-primary" style="flex:1;">💾 บันทึก</button>
      </div>
    </div>
  </div>

  <!-- Subject Modal -->
  <div id="subjectModal" class="modal-backdrop" style="display:none;" onclick="if(event.target===this) closeSubjectModal()">
    <div class="modal">
      <div class="modal-drag"></div>
      <div style="margin-bottom:16px;">
        <div style="font-size:18px;font-weight:900;color:#0f172a;">📚 จัดการรายวิชา</div>
        <div id="subModalCourseName" style="font-size:11px;color:#6366f1;font-weight:700;margin-top:3px;"></div>
      </div>

      <!-- Add/edit form -->
      <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px;margin-bottom:16px;">
        <div id="subFormTitle" class="field-label">เพิ่มวิชาใหม่</div>
        <input type="hidden" id="editSubId" />
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <input id="newSubName" type="text" placeholder="ชื่อวิชา (เช่น คณิต)" class="inp" style="font-size:13px;" />
          <input id="newSubCode" type="text" placeholder="รหัสวิชา (เช่น mat)" class="inp" style="font-size:13px;" />
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="newSubSort" type="number" placeholder="ลำดับ" value="1" class="inp" style="font-size:13px;width:70px;flex-shrink:0;" />
          <button onclick="saveSubject()" id="btnSubSave" class="btn-primary" style="flex:1;font-size:13px;padding:11px 12px;">＋ บันทึกวิชา</button>
          <button onclick="resetSubForm()" id="btnSubCancel" class="btn-sm" style="background:#e2e8f0;color:#475569;display:none;">ยกเลิก</button>
        </div>
      </div>

      <div id="subjectList" style="display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;"></div>
      <button onclick="closeSubjectModal()" style="width:100%;margin-top:18px;background:#f1f5f9;color:#475569;font-weight:700;border-radius:12px;padding:13px;border:none;cursor:pointer;font-size:14px;">ปิด</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentCourseCode = '';

    async function init() { await loadCourses(); }

    async function loadCourses() {
      const grid = document.getElementById('courseGrid');
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:#94a3b8;font-weight:600;">กำลังโหลด...</div>';

      const { data: courses } = await db.from('courses').select('*').order('sort_order', { ascending: true });
      const { data: enrollments } = await db.from('enrollments').select('course_code');

      const countMap = {};
      (enrollments || []).forEach(en => {
        if (en.course_code) {
          const key = en.course_code.toLowerCase().trim();
          countMap[key] = (countMap[key] || 0) + 1;
        }
      });

      if (!courses?.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:#94a3b8;font-weight:600;">ยังไม่มีคอร์ส</div>';
        return;
      }

      grid.innerHTML = courses.map(c => {
        const key = (c.course_code || '').toLowerCase().trim();
        const stuCount = countMap[key] || 0;
        const isActive = c.is_active !== false;
        return `
          <div class="course-card">
            <div class="course-card-body">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:12px;">
                <div style="min-width:0;">
                  <div style="font-weight:900;color:#0f172a;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.course_name}</div>
                  <div style="font-size:11px;font-weight:700;color:#6366f1;font-family:monospace;margin-top:2px;">${c.course_code}</div>
                </div>
                <span style="padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;flex-shrink:0;background:${isActive?'#d1fae5':'#f1f5f9'};color:${isActive?'#065f46':'#64748b'};">
                  ${isActive ? 'เปิดอยู่' : 'ปิด'}
                </span>
              </div>
              <div style="display:flex;gap:20px;padding:10px 0;border-top:1px solid #f8fafc;border-bottom:1px solid #f8fafc;margin-bottom:0;">
                <div><div style="font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-bottom:2px;">นักเรียน</div><div style="font-weight:900;color:#0f172a;font-size:15px;">${stuCount} คน</div></div>
                <div><div style="font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-bottom:2px;">ระดับ</div><div style="font-weight:900;color:#0f172a;font-size:15px;">${c.level || '-'}</div></div>
                <div><div style="font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-bottom:2px;">โหมด</div><div style="font-weight:700;color:#475569;font-size:12px;">${c.score_display_mode || 'total'}</div></div>
              </div>
            </div>
            <div class="course-card-actions">
              <button onclick='openSubjectModal("${c.course_code}", "${c.course_name.replace(/'/g, "\\'")}")' class="btn-sm" style="flex:1.5;background:#eef2ff;color:#4f46e5;text-align:center;">📚 วิชา</button>
              <button onclick='editCourse(${JSON.stringify(c).replace(/'/g,"&#39;")})' class="btn-sm btn-edit" style="flex:1;text-align:center;">✏️ แก้ไข</button>
              <button onclick="deleteCourse('${c.course_code}', '${c.course_name.replace(/'/g,"\\'")}')" class="btn-sm btn-danger" style="flex:1;text-align:center;">🗑️ ลบ</button>
            </div>
          </div>`;
      }).join('');
    }

    /* ===== SUBJECT MODAL ===== */
    async function openSubjectModal(code, name) {
      currentCourseCode = code;
      document.getElementById('subModalCourseName').textContent = `คอร์ส: ${name} (${code})`;
      document.getElementById('subjectModal').style.display = 'flex';
      resetSubForm();
      loadSubjects();
    }
    function closeSubjectModal() { document.getElementById('subjectModal').style.display = 'none'; }

    async function loadSubjects() {
      const { data } = await db.from('subjects').select('*').eq('course_code', currentCourseCode).order('sort_order', { ascending: true });
      const listDiv = document.getElementById('subjectList');
      if (!data?.length) {
        listDiv.innerHTML = '<div style="text-align:center;color:#94a3b8;font-size:12px;padding:16px;">ยังไม่มีรายวิชา</div>';
        return;
      }
      listDiv.innerHTML = data.map(s => `
        <div style="display:flex;align-items:center;justify-content:space-between;background:#fff;border:1.5px solid #f1f5f9;border-radius:12px;padding:12px 14px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:10px;background:#f1f5f9;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:900;">${s.sort_order}</span>
            <div>
              <div style="font-size:13px;font-weight:700;color:#1e293b;">${s.subject_name}</div>
              <div style="font-size:10px;font-family:monospace;color:#94a3b8;">${s.subject_code}</div>
            </div>
          </div>
          <div style="display:flex;gap:4px;">
            <button onclick='editSubject(${JSON.stringify(s).replace(/'/g,"&#39;")})' style="padding:8px 10px;border:none;background:#f1f5f9;border-radius:8px;cursor:pointer;font-size:14px;">✏️</button>
            <button onclick="deleteSubject(${s.id})" style="padding:8px 10px;border:none;background:#fee2e2;color:#dc2626;border-radius:8px;cursor:pointer;font-size:14px;">✕</button>
          </div>
        </div>`).join('');
    }

    async function saveSubject() {
      const id = document.getElementById('editSubId').value;
      const name = document.getElementById('newSubName').value.trim();
      const code = document.getElementById('newSubCode').value.trim();
      const sort = parseInt(document.getElementById('newSubSort').value) || 0;
      if (!name || !code) return showToast('กรุณากรอกชื่อและรหัสวิชา', 'error');
      const payload = { course_code: currentCourseCode, subject_name: name, subject_code: code, sort_order: sort };
      const { error } = id ? await db.from('subjects').update(payload).eq('id', id) : await db.from('subjects').insert(payload);
      if (error) return showToast(error.message, 'error');
      showToast('บันทึกวิชาเรียบร้อย', 'success');
      resetSubForm(); loadSubjects();
    }

    function editSubject(s) {
      document.getElementById('editSubId').value = s.id;
      document.getElementById('newSubName').value = s.subject_name;
      document.getElementById('newSubCode').value = s.subject_code;
      document.getElementById('newSubSort').value = s.sort_order;
      document.getElementById('subFormTitle').textContent = 'แก้ไขวิชา';
      document.getElementById('btnSubSave').textContent = '💾 บันทึกการแก้ไข';
      document.getElementById('btnSubCancel').style.display = 'block';
    }

    function resetSubForm() {
      document.getElementById('editSubId').value = '';
      document.getElementById('newSubName').value = '';
      document.getElementById('newSubCode').value = '';
      document.getElementById('newSubSort').value = '1';
      document.getElementById('subFormTitle').textContent = 'เพิ่มวิชาใหม่';
      document.getElementById('btnSubSave').textContent = '＋ บันทึกวิชา';
      document.getElementById('btnSubCancel').style.display = 'none';
    }

    async function deleteSubject(id) {
      if (confirm('ต้องการลบวิชานี้?')) {
        await db.from('subjects').delete().eq('id', id);
        loadSubjects();
      }
    }

    /* ===== COURSE CRUD ===== */
    function openModal(course = null) {
      const isEdit = !!course;
      document.getElementById('editId').value = isEdit ? course.id : '';
      document.getElementById('modalCode').value = isEdit ? course.course_code : '';
      document.getElementById('modalCode').disabled = isEdit;
      document.getElementById('modalName').value = isEdit ? course.course_name : '';
      document.getElementById('modalLevel').value = isEdit ? (course.level || '') : '';
      document.getElementById('modalSort').value = isEdit ? (course.sort_order || 1) : 1;
      document.getElementById('modalScoreMode').value = isEdit ? (course.score_display_mode || 'total') : 'total';
      document.getElementById('modalIsActive').value = isEdit ? String(course.is_active !== false) : 'true';
      document.getElementById('modalTitle').textContent = isEdit ? 'แก้ไขคอร์ส' : 'สร้างคอร์ส';
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function editCourse(c) { openModal(c); }

    async function saveCourse() {
      const id = document.getElementById('editId').value;
      const code = document.getElementById('modalCode').value.trim();
      const name = document.getElementById('modalName').value.trim();
      if (!code || !name) return showToast('กรุณากรอกรหัสและชื่อคอร์ส', 'error');
      const payload = {
        course_code: code, course_name: name,
        level: document.getElementById('modalLevel').value,
        sort_order: parseInt(document.getElementById('modalSort').value) || 0,
        score_display_mode: document.getElementById('modalScoreMode').value,
        is_active: document.getElementById('modalIsActive').value === 'true'
      };
      const { error } = id ? await db.from('courses').update(payload).eq('id', id) : await db.from('courses').insert(payload);
      if (error) return showToast(error.message, 'error');
      showToast('บันทึกคอร์สสำเร็จ', 'success');
      closeModal(); loadCourses();
    }

    async function deleteCourse(code, name) {
      if (confirm(`ลบคอร์ส "${name}"?\n(วิชาและคะแนนที่เกี่ยวข้องจะถูกลบทั้งหมด)`)) {
        await db.from('subjects').delete().eq('course_code', code);
        await db.from('courses').delete().eq('course_code', code);
        loadCourses();
      }
    }

    /* ===== UTILS ===== */
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }
    function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
    function logout() { if (confirm('ออกจากระบบ?')) { sessionStorage.clear(); location.href = 'index.html'; } }

    init();
  </script>
</body>
</html>
