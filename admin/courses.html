<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>คอร์สเรียน - Qtutor Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
    .sidebar { background: #0f172a; min-height: 100vh; width: 240px; flex-shrink: 0; transition: all 0.3s; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .nav-item:hover { background: #1e293b; color: #e2e8f0; }
    .nav-item.active { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; box-shadow: 0 4px 12px rgba(99,102,241,0.35); }
    .field-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
    .input { background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-weight: 600; color: #1e293b; width: 100%; transition: border-color 0.15s; }
    .input:focus { outline: none; border-color: #6366f1; }
    .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; font-weight: 900; border-radius: 14px; padding: 10px 22px; transition: all 0.15s; border: none; cursor: pointer; font-size: 14px; }
    .btn-sm { font-weight: 700; border-radius: 10px; padding: 8px 12px; font-size: 13px; border: none; cursor: pointer; transition: all 0.15s; }
    .btn-edit   { background: #ede9fe; color: #6d28d9; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 200; padding: 14px 20px; border-radius: 16px; font-weight: 700; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); transition: all 0.3s; transform: translateY(80px); opacity: 0; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #d1fae5; color: #065f46; }
    .toast.error   { background: #fee2e2; color: #991b1b; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: #fff; border-radius: 24px; padding: 24px; width: 100%; max-width: 550px; box-shadow: 0 24px 48px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
  </style>
</head>
<body class="bg-slate-50 flex overflow-x-hidden">

  <div id="overlay" class="fixed inset-0 bg-black/50 z-[140] hidden md:hidden" onclick="closeSidebar()"></div>

  <aside id="sidebar" class="sidebar flex flex-col">
    <div class="px-5 py-6 border-b border-slate-800 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-black text-white">Qtutor</h1>
        <p class="text-slate-500 text-xs mt-0.5">Admin Panel</p>
      </div>
      <button onclick="closeSidebar()" class="md:hidden text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="dashboard.html" class="nav-item "><span>📊</span> ภาพรวม</a>
      <a href="scores.html"    class="nav-item"><span>📝</span> จัดการคะแนน</a>
      <a href="students.html"  class="nav-item active"><span>👥</span> นักเรียน</a>
      <a href="courses.html"   class="nav-item"><span>📚</span> คอร์สเรียน</a>
      <a href="content.html"   class="nav-item"><span>🎬</span> เนื้อหา (เฉลย/คลิป)</a>
      <a href="export.html"    class="nav-item"><span>📤</span> Export รายงาน</a>
    </nav>
    
  </aside>

  <div class="flex-1 flex flex-col min-h-screen">
    <div class="bg-white border-b border-slate-100 px-5 py-4 flex items-center justify-between sticky top-0 z-10">
      <div class="flex items-center gap-3">
        <button onclick="openSidebar()" class="md:hidden text-slate-500 bg-slate-50 p-2 rounded-lg">☰</button>
        <h2 class="text-lg font-black text-slate-800">📚 คอร์สเรียน</h2>
      </div>
      <button onclick="openModal()" class="btn-primary text-sm">+ สร้างคอร์ส</button>
    </div>

    <main class="flex-1 p-4 md:p-6 max-w-5xl">
      <div id="courseGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>
    </main>
  </div>

  <div id="modal" class="modal-backdrop hidden" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <h3 id="modalTitle" class="text-xl font-black text-slate-800 mb-6">สร้างคอร์ส</h3>
      <input type="hidden" id="editId" />
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div><label class="field-label">รหัสคอร์ส *</label><input id="modalCode" type="text" class="input font-mono" /></div>
          <div><label class="field-label">ชื่อคอร์ส *</label><input id="modalName" type="text" class="input" /></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="field-label">ระดับชั้น</label><input id="modalLevel" type="text" class="input" /></div>
          <div><label class="field-label">ลำดับแสดงผล</label><input id="modalSort" type="number" class="input" /></div>
        </div>
        <div>
          <label class="field-label">โหมดแสดงคะแนน</label>
          <select id="modalScoreMode" class="input">
            <option value="total">แสดงคะแนนรวม (Total)</option>
            <option value="by_subject">แสดงแยกรายวิชา (By Subject)</option>
          </select>
        </div>
        <div><label class="field-label">สถานะ</label><select id="modalIsActive" class="input"><option value="true">เปิด</option><option value="false">ปิด</option></select></div>
      </div>
      <div class="flex gap-3 mt-8">
        <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl">ยกเลิก</button>
        <button onclick="saveCourse()" class="flex-1 btn-primary">💾 บันทึก</button>
      </div>
    </div>
  </div>

  <div id="subjectModal" class="modal-backdrop hidden" onclick="if(event.target===this) closeSubjectModal()">
    <div class="modal max-w-lg">
      <div class="mb-4">
        <h3 class="text-xl font-black text-slate-800">📚 จัดการรายวิชา</h3>
        <p id="subModalCourseName" class="text-xs text-indigo-500 font-bold"></p>
      </div>
      
      <div class="bg-slate-50 p-4 rounded-2xl mb-6 border border-slate-100">
        <p id="subFormTitle" class="field-label">เพิ่มวิชาใหม่</p>
        <input type="hidden" id="editSubId" />
        <div class="grid grid-cols-2 gap-2 mb-2">
            <input id="newSubName" type="text" placeholder="ชื่อวิชา (เช่น คณิต)" class="input text-xs" />
            <input id="newSubCode" type="text" placeholder="รหัสวิชา (เช่น mat)" class="input text-xs" />
        </div>
        <div class="flex gap-2">
            <input id="newSubSort" type="number" placeholder="ลำดับ" value="1" class="input text-xs w-20" />
            <button onclick="saveSubject()" id="btnSubSave" class="btn-primary text-xs flex-1">＋ บันทึกวิชา</button>
            <button onclick="resetSubForm()" id="btnSubCancel" class="hidden btn-sm bg-slate-200 text-slate-600 text-xs">ยกเลิก</button>
        </div>
      </div>

      <div class="space-y-2 max-h-60 overflow-y-auto" id="subjectList"></div>
      <button onclick="closeSubjectModal()" class="w-full mt-6 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl">ปิด</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentCourseCode = '';

    async function init() { await loadCourses(); }

    async function loadCourses() {
      const grid = document.getElementById('courseGrid');
      grid.innerHTML = '<div class="col-span-full text-center py-10 text-slate-400">กำลังโหลด...</div>';

      // 1. ดึงคอร์ส
      const { data: courses } = await db.from('courses').select('*').order('sort_order', { ascending: true });
      // 2. ดึงการลงทะเบียนเพื่อนับจำนวนนักเรียน (จากตาราง enrollments)
      const { data: enrollments } = await db.from('enrollments').select('course_code');
      
      const countMap = {};
      (enrollments || []).forEach(en => {
        if(en.course_code) {
          const code = en.course_code.toLowerCase().trim();
          countMap[code] = (countMap[code] || 0) + 1;
        }
      });

      if (!courses || courses.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center py-16 text-slate-400">ยังไม่มีข้อมูลคอร์ส</div>';
        return;
      }

      grid.innerHTML = courses.map(c => {
        const key = (c.course_code || "").toLowerCase().trim();
        const stuCount = countMap[key] || 0;
        
        return `
          <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex flex-col gap-4">
            <div class="flex justify-between items-start">
              <div class="min-w-0">
                <p class="font-black text-slate-800 text-base truncate">${c.course_name}</p>
                <p class="text-[10px] font-mono text-indigo-500">${c.course_code}</p>
              </div>
              <span class="badge ${c.is_active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}">
                ${c.is_active ? 'เปิดอยู่' : 'ปิด'}
              </span>
            </div>
            
            <div class="flex gap-6 border-y border-slate-50 py-3">
              <div><p class="text-[10px] text-slate-400 font-bold uppercase">นักเรียน</p><p class="font-black text-slate-700 text-sm">${stuCount} คน</p></div>
              <div><p class="text-[10px] text-slate-400 font-bold uppercase">ระดับ</p><p class="font-black text-slate-700 text-sm">${c.level || '-'}</p></div>
            </div>

            <div class="flex gap-2">
              <button onclick='openSubjectModal("${c.course_code}", "${c.course_name.replace(/'/g,"\\'")}")' class="flex-1 btn-sm bg-indigo-50 text-indigo-600">📚 วิชา</button>
              <button onclick='editCourse(${JSON.stringify(c)})' class="btn-sm btn-edit">แก้ไข</button>
              <button onclick="deleteCourse('${c.course_code}', '${c.course_name.replace(/'/g,"\\'")}')" class="btn-sm btn-danger">ลบ</button>
            </div>
          </div>`;
      }).join('');
    }

    // --- Subject Logic ---
    async function openSubjectModal(code, name) {
      currentCourseCode = code;
      document.getElementById('subModalCourseName').textContent = `คอร์ส: ${name} (${code})`;
      document.getElementById('subjectModal').classList.remove('hidden');
      resetSubForm();
      loadSubjects();
    }
    function closeSubjectModal() { document.getElementById('subjectModal').classList.add('hidden'); }

    async function loadSubjects() {
      const { data } = await db.from('subjects').select('*').eq('course_code', currentCourseCode).order('sort_order', { ascending: true });
      const listDiv = document.getElementById('subjectList');
      if (!data?.length) { listDiv.innerHTML = '<p class="text-center text-xs text-slate-400 py-4">ยังไม่มีรายวิชา</p>'; return; }
      
      listDiv.innerHTML = data.map(s => `
        <div class="flex items-center justify-between bg-white border border-slate-100 p-3 rounded-xl shadow-sm">
            <div class="flex items-center gap-3">
                <span class="text-[10px] bg-slate-100 w-6 h-6 flex items-center justify-center rounded-full font-bold">${s.sort_order}</span>
                <div><p class="text-sm font-bold text-slate-700">${s.subject_name}</p><p class="text-[10px] font-mono text-slate-400">${s.subject_code}</p></div>
            </div>
            <div class="flex gap-1">
                <button onclick='editSubject(${JSON.stringify(s)})' class="p-2 hover:bg-slate-50 rounded">✏️</button>
                <button onclick="deleteSubject(${s.id})" class="text-rose-400 p-2 hover:bg-rose-50 rounded">✕</button>
            </div>
        </div>`).join('');
    }

    async function saveSubject() {
      const id = document.getElementById('editSubId').value;
      const name = document.getElementById('newSubName').value.trim();
      const code = document.getElementById('newSubCode').value.trim();
      const sort = parseInt(document.getElementById('newSubSort').value) || 0;
      if (!name || !code) return showToast('กรุณากรอกข้อมูลให้ครบ', 'error');

      const payload = { course_code: currentCourseCode, subject_name: name, subject_code: code, sort_order: sort };
      const { error } = id ? await db.from('subjects').update(payload).eq('id', id) : await db.from('subjects').insert(payload);

      if (error) return showToast(error.message, 'error');
      showToast('บันทึกวิชาเรียบร้อย', 'success');
      resetSubForm(); loadSubjects();
    }

    function editSubject(s) {
      document.getElementById('editSubId').value = s.id;
      document.getElementById('newSubName').value = s.subject_name;
      document.getElementById('newSubCode').value = s.subject_code;
      document.getElementById('newSubSort').value = s.sort_order;
      document.getElementById('subFormTitle').textContent = 'แก้ไขวิชา';
      document.getElementById('btnSubSave').textContent = '💾 บันทึกการแก้ไข';
      document.getElementById('btnSubCancel').classList.remove('hidden');
    }

    function resetSubForm() {
      document.getElementById('editSubId').value = '';
      document.getElementById('newSubName').value = '';
      document.getElementById('newSubCode').value = '';
      document.getElementById('newSubSort').value = '1';
      document.getElementById('subFormTitle').textContent = 'เพิ่มวิชาใหม่';
      document.getElementById('btnSubSave').textContent = '＋ บันทึกวิชา';
      document.getElementById('btnSubCancel').classList.add('hidden');
    }

    async function deleteSubject(id) {
      if (confirm('ต้องการลบวิชานี้ใช่ไหม?')) { 
        await db.from('subjects').delete().eq('id', id); 
        loadSubjects(); 
      }
    }

    // --- Course CRUD ---
    function openModal(course = null) {
      const isEdit = !!course;
      document.getElementById('editId').value = isEdit ? course.id : '';
      document.getElementById('modalCode').value = isEdit ? course.course_code : '';
      document.getElementById('modalCode').disabled = isEdit;
      document.getElementById('modalName').value = isEdit ? course.course_name : '';
      document.getElementById('modalLevel').value = isEdit ? (course.level || '') : '';
      document.getElementById('modalSort').value = isEdit ? (course.sort_order || 1) : 1;
      document.getElementById('modalScoreMode').value = isEdit ? (course.score_display_mode || 'total') : 'total';
      document.getElementById('modalIsActive').value = isEdit ? String(course.is_active !== false) : 'true';
      document.getElementById('modalTitle').textContent = isEdit ? 'แก้ไขคอร์ส' : 'สร้างคอร์ส';
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    function editCourse(c) { openModal(c); }

    async function saveCourse() {
      const id = document.getElementById('editId').value;
      const code = document.getElementById('modalCode').value.trim();
      const name = document.getElementById('modalName').value.trim();
      if (!code || !name) return showToast('กรุณากรอกรหัสและชื่อคอร์ส', 'error');

      const payload = {
        course_code: code,
        course_name: name,
        level: document.getElementById('modalLevel').value,
        sort_order: parseInt(document.getElementById('modalSort').value) || 0,
        score_display_mode: document.getElementById('modalScoreMode').value,
        is_active: document.getElementById('modalIsActive').value === 'true'
      };

      const { error } = id ? await db.from('courses').update(payload).eq('id', id) : await db.from('courses').insert(payload);
      if (error) return showToast(error.message, 'error');
      showToast('บันทึกคอร์สสำเร็จ', 'success');
      closeModal(); loadCourses();
    }

    async function deleteCourse(code, name) {
      if (confirm(`คุณต้องการลบคอร์ส "${name}" ใช่ไหม?\n(ข้อมูลคะแนนและวิชาที่เกี่ยวข้องจะถูกลบทั้งหมด)`)) {
        await db.from('subjects').delete().eq('course_code', code);
        await db.from('courses').delete().eq('course_code', code);
        loadCourses();
      }
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function openSidebar() { document.getElementById('sidebar').style.left = '0'; document.getElementById('overlay').classList.remove('hidden'); }
    function closeSidebar() { document.getElementById('sidebar').style.left = '-240px'; document.getElementById('overlay').classList.add('hidden'); }

    init();
  </script>
</body>
</html>
