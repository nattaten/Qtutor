<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>จัดการคะแนน - Qtutor Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
    .sidebar { background: #0f172a; min-height: 100vh; width: 240px; flex-shrink: 0; transition: all 0.3s; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .nav-item:hover { background: #1e293b; color: #e2e8f0; }
    .nav-item.active { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; box-shadow: 0 4px 12px rgba(99,102,241,0.35); }
    .field-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
    .input { background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 14px; font-size: 16px; font-weight: 600; color: #1e293b; width: 100%; transition: border-color 0.15s; }
    .score-input { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 14px; font-size: 20px; font-weight: 900; color: #1e293b; width: 100%; text-align: center; }
    .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; font-weight: 900; border-radius: 14px; padding: 14px 24px; transition: all 0.15s; border: none; cursor: pointer; text-align: center; width: 100%; }
    .btn-secondary { background: #10b981; color: #fff; font-weight: 800; border-radius: 10px; padding: 8px 16px; font-size: 12px; border: none; cursor: pointer; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translate(-50%, 80px); z-index: 100; padding: 14px 20px; border-radius: 16px; font-weight: 700; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); transition: all 0.3s; opacity: 0; width: 90%; max-width: 400px; text-align: center; }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }
    .toast.success { background: #d1fae5; color: #065f46; }
    .toast.error   { background: #fee2e2; color: #991b1b; }
    .tab-btn { padding: 10px 15px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s; border: 2px solid transparent; flex: 1; text-align: center; white-space: nowrap; }
    .tab-btn.active { background: #0f172a; color: #fff; }
    .tab-btn:not(.active) { background: #f1f5f9; color: #64748b; }
    .edit-field { width: 60px; text-align: center; border: 2px solid #6366f1; border-radius: 8px; font-weight: 800; padding: 4px; }
    
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 50; left: -240px; height: 100vh; }
      .sidebar.open { left: 0; }
      .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; backdrop-filter: blur(2px); }
      .overlay.open { display: block; }
    }
  </style>
</head>
<body class="bg-slate-50 flex overflow-x-hidden">

  <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

  <aside id="sidebar" class="sidebar flex flex-col">
    <div class="px-5 py-6 border-b border-slate-800 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-black text-white">Qtutor</h1>
        <p class="text-slate-500 text-xs mt-0.5">Admin Panel</p>
      </div>
      <button onclick="closeSidebar()" class="md:hidden text-slate-400">✕</button>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="dashboard.html" class="nav-item"><span>📊</span> ภาพรวม</a>
      <a href="scores.html"    class="nav-item active"><span>📝</span> จัดการคะแนน</a>
      <a href="students.html"  class="nav-item"><span>👥</span> นักเรียน</a>
      <a href="courses.html"   class="nav-item"><span>📚</span> คอร์สเรียน</a>
      <a href="content.html"   class="nav-item"><span>🎬</span> เนื้อหา (เฉลย/คลิป)</a>
      <a href="export.html"    class="nav-item"><span>📤</span> Export รายงาน</a>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-h-screen min-w-0">
    <div class="bg-white border-b border-slate-100 px-4 py-4 flex items-center justify-between sticky top-0 z-10">
      <div class="flex items-center gap-3">
        <button onclick="openSidebar()" class="md:hidden text-slate-500 bg-slate-50 p-2 rounded-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h2 class="text-lg font-black text-slate-800">📝 จัดการคะแนน</h2>
      </div>
    </div>

    <main class="flex-1 p-4 md:p-6 space-y-5 max-w-4xl mx-auto w-full">
      <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
        <button id="btn-tab-enter" class="tab-btn active" onclick="switchTab('enter', this)">✏️ กรอกคะแนน</button>
        <button id="btn-tab-view" class="tab-btn" onclick="switchTab('view', this)">📋 ดู/แก้ไขในตาราง</button>
        <button id="btn-tab-import" class="tab-btn" onclick="switchTab('import', this)">📥 Import CSV</button>
      </div>

      <div id="tab-enter" class="space-y-4">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
          <div class="flex flex-col sm:flex-row justify-between gap-3 mb-4">
            <h3 class="font-black text-slate-800">1. ตั้งคะแนนเต็ม</h3>
            <button id="updateAllFullBtn" onclick="updateAllFullScores()" class="btn-secondary hidden">⚡ อัปเดตเต็มทุกคน</button>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <select id="enterCourse" onchange="onCourseTestChange()" class="input"><option value="">-- เลือกคอร์ส --</option></select>
            <select id="enterTest" onchange="onCourseTestChange()" class="input"><option value="">-- เลือกครั้งที่ --</option></select>
          </div>
          <div id="fullScoreArea" class="hidden mt-4 grid grid-cols-3 gap-2">
            <div><label class="field-label">วิทย์</label><input id="sciFullInput" type="number" value="50" class="input text-center"></div>
            <div><label class="field-label">คณิต</label><input id="mathFullInput" type="number" value="50" class="input text-center"></div>
            <div><label class="field-label">Eng</label><input id="engFullInput" type="number" value="50" class="input text-center"></div>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
          <h3 class="font-black text-slate-800 mb-4">2. กรอกคะแนน</h3>
          <select id="enterStudent" class="input mb-4"><option value="">-- เลือกนักเรียน --</option></select>
          <div id="scoreInputArea" class="hidden space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div class="bg-emerald-50 p-3 rounded-xl"><label class="field-label">วิทย์</label><input id="sciScore" type="number" class="score-input"><p id="sciFullLabel" class="text-xs text-center mt-2">เต็ม 50</p></div>
              <div class="bg-blue-50 p-3 rounded-xl"><label class="field-label">คณิต</label><input id="mathScore" type="number" class="score-input"><p id="mathFullLabel" class="text-xs text-center mt-2">เต็ม 50</p></div>
              <div class="bg-violet-50 p-3 rounded-xl"><label class="field-label">Eng</label><input id="engScore" type="number" class="score-input"><p id="engFullLabel" class="text-xs text-center mt-2">เต็ม 50</p></div>
            </div>
            <button onclick="saveScore()" id="saveBtn" class="btn-primary">💾 บันทึกคะแนน</button>
          </div>
        </div>
      </div>

      <div id="tab-view" class="hidden space-y-4">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
            <select id="viewCourse" onchange="loadStudents('viewCourse','viewStudent')" class="input"><option value="">-- เลือกคอร์ส --</option></select>
            <select id="viewStudent" onchange="loadScoreTable()" class="input"><option value="">-- ทั้งหมด --</option></select>
          </div>
          <button onclick="loadScoreTable()" class="btn-primary">🔍 ดูคะแนน</button>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-x-auto">
          <div id="scoreTable"></div>
        </div>
      </div>

      <div id="tab-import" class="hidden space-y-4">
        <div class="bg-white rounded-2xl p-5 border border-slate-100">
          <h3 class="font-black text-slate-800 mb-2">📥 Import คะแนนจาก CSV</h3>
          <div class="border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center mb-4 cursor-pointer hover:border-indigo-300" onclick="document.getElementById('csvFile').click()">
            <p class="text-4xl mb-2">📂</p>
            <p class="font-bold text-slate-600">คลิกเพื่อเลือกไฟล์ CSV</p>
            <input type="file" id="csvFile" accept=".csv" class="hidden" onchange="previewCSV(event)">
          </div>
          <div id="csvPreview" class="hidden">
            <div class="flex justify-between items-center mb-4">
              <span id="csvSummary" class="text-sm font-bold text-indigo-600"></span>
              <button onclick="importCSV()" id="importBtn" class="btn-secondary px-6 py-2 text-sm">⬆️ เริ่ม Import ข้อมูล</button>
            </div>
            <div class="overflow-x-auto rounded-xl border border-slate-100">
              <table class="w-full text-[10px]">
                <thead class="bg-slate-50"><tr id="csvHead"></tr></thead>
                <tbody id="csvBody" class="divide-y divide-slate-50"></tbody>
              </table>
            </div>
          </div>
          <div class="mt-6 p-4 bg-slate-50 rounded-xl">
             <button onclick="downloadTemplate()" class="text-indigo-600 text-sm font-bold flex items-center gap-2">
               <span>⬇️</span> ดาวน์โหลด Template CSV สำหรับเตรียมข้อมูล
             </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let csvData = [];

    async function init() {
      const { data: courses } = await db.from('courses').select('course_code, course_name').order('created_at', { ascending: false });
      ['enterCourse','viewCourse'].forEach(id => {
        const sel = document.getElementById(id);
        (courses || []).forEach(c => { sel.innerHTML += `<option value="${c.course_code}">${c.course_name}</option>`; });
      });
      for (let i = 1; i <= 13; i++) { document.getElementById('enterTest').innerHTML += `<option value="${i}">ครั้งที่ ${i}</option>`; }
      document.getElementById('enterStudent').addEventListener('change', checkShowScoreArea);
    }

    // --- Enterprise Functions ---
    async function onCourseTestChange() {
      const code = document.getElementById('enterCourse').value;
      const test = document.getElementById('enterTest').value;
      if (!code || !test) return;
      document.getElementById('fullScoreArea').classList.remove('hidden');
      document.getElementById('updateAllFullBtn').classList.remove('hidden');
      const { data: existing } = await db.from('test_scores').select('subject, full_score').eq('course_code', code).eq('test_number', +test).limit(3);
      if (existing?.length) {
        existing.forEach(r => {
          if (r.subject === 'วิทย์') document.getElementById('sciFullInput').value = r.full_score;
          if (r.subject === 'คณิต') document.getElementById('mathFullInput').value = r.full_score;
          if (r.subject === 'อังกฤษ') document.getElementById('engFullInput').value = r.full_score;
        });
      }
      updateFullLabels();
      loadStudents('enterCourse', 'enterStudent');
    }

    function updateFullLabels() {
      const s = document.getElementById('sciFullInput').value;
      const m = document.getElementById('mathFullInput').value;
      const e = document.getElementById('engFullInput').value;
      document.getElementById('sciFullLabel').textContent = `เต็ม ${s}`;
      document.getElementById('mathFullLabel').textContent = `เต็ม ${m}`;
      document.getElementById('engFullLabel').textContent = `เต็ม ${e}`;
    }

    async function loadStudents(cId, sId) {
      const code = document.getElementById(cId).value;
      const sel = document.getElementById(sId);
      sel.innerHTML = '<option value="">-- เลือกนักเรียน --</option>';
      if (!code) return;
      const { data } = await db.from('students').select('id, nickname').eq('course_code', code).order('nickname');
      data?.forEach(s => { sel.innerHTML += `<option value="${s.id}">${s.nickname}</option>`; });
    }

    function checkShowScoreArea() {
      const stu = document.getElementById('enterStudent').value;
      if (stu) {
        document.getElementById('scoreInputArea').classList.remove('hidden');
        loadExistingScore(document.getElementById('enterCourse').value, stu, document.getElementById('enterTest').value);
      } else {
        document.getElementById('scoreInputArea').classList.add('hidden');
      }
    }

    async function loadExistingScore(code, sid, test) {
      const { data } = await db.from('test_scores').select('subject, score').eq('course_code', code).eq('student_id', +sid).eq('test_number', +test);
      ['sciScore','mathScore','engScore'].forEach(id => document.getElementById(id).value = '');
      data?.forEach(r => {
        if (r.subject === 'วิทย์') document.getElementById('sciScore').value = r.score;
        if (r.subject === 'คณิต') document.getElementById('mathScore').value = r.score;
        if (r.subject === 'อังกฤษ') document.getElementById('engScore').value = r.score;
      });
    }

    async function saveScore() {
      const code = document.getElementById('enterCourse').value;
      const sid = document.getElementById('enterStudent').value;
      const test = document.getElementById('enterTest').value;
      const sciF = +document.getElementById('sciFullInput').value;
      const mathF = +document.getElementById('mathFullInput').value;
      const engF = +document.getElementById('engFullInput').value;
      const sciV = document.getElementById('sciScore').value;
      const mathV = document.getElementById('mathScore').value;
      const engV = document.getElementById('engScore').value;

      const rows = [];
      if (sciV !== '') rows.push({ course_code: code, student_id: +sid, test_number: +test, subject: 'วิทย์', score: +sciV, full_score: sciF });
      if (mathV !== '') rows.push({ course_code: code, student_id: +sid, test_number: +test, subject: 'คณิต', score: +mathV, full_score: mathF });
      if (engV !== '') rows.push({ course_code: code, student_id: +sid, test_number: +test, subject: 'อังกฤษ', score: +engV, full_score: engF });

      const { error } = await db.from('test_scores').upsert(rows, { onConflict: 'student_id,test_number,subject' });
      if (!error) { showToast('บันทึกสำเร็จ'); refreshRankings(code); }
    }

    // --- View & Inline Edit (เรียง 1-13) ---
    async function loadScoreTable() {
      const code = document.getElementById('viewCourse').value;
      const sid = document.getElementById('viewStudent').value;
      if (!code) return;
      const container = document.getElementById('scoreTable');
      container.innerHTML = '<p class="p-10 text-center">กำลังโหลด...</p>';

      let q = db.from('test_scores').select('*, students(nickname)').eq('course_code', code).order('test_number', {ascending: true}); // เรียง 1-13
      if (sid) q = q.eq('student_id', sid);
      const { data } = await q;

      const grouped = {};
      data?.forEach(r => {
        const key = `${r.student_id}_${r.test_number}`;
        if (!grouped[key]) grouped[key] = { nickname: r.students?.nickname, student_id: r.student_id, test_number: r.test_number };
        grouped[key][r.subject] = { score: r.score, full: r.full_score };
      });

      let html = `<table class="w-full text-xs min-w-[600px]"><thead class="bg-slate-50"><tr><th class="p-3 text-left">นักเรียน</th><th class="p-3">ครั้งที่</th><th class="p-3">วิทย์</th><th class="p-3">คณิต</th><th class="p-3">Eng</th><th class="p-3 text-center">จัดการ</th></tr></thead><tbody>`;
      Object.values(grouped).forEach(g => {
        const rowId = `inline-${g.student_id}-${g.test_number}`;
        html += `<tr id="${rowId}" class="border-b hover:bg-slate-50">
          <td class="p-3 font-bold">${g.nickname}</td>
          <td class="p-3 text-center font-black">${g.test_number}</td>
          <td class="p-3 text-center" data-subj="วิทย์"><span class="v-m">${g['วิทย์']?.score ?? 0}</span><input type="number" class="e-m hidden edit-field" value="${g['วิทย์']?.score ?? 0}" data-f="${g['วิทย์']?.full ?? 50}"></td>
          <td class="p-3 text-center" data-subj="คณิต"><span class="v-m">${g['คณิต']?.score ?? 0}</span><input type="number" class="e-m hidden edit-field" value="${g['คณิต']?.score ?? 0}" data-f="${g['คณิต']?.full ?? 50}"></td>
          <td class="p-3 text-center" data-subj="อังกฤษ"><span class="v-m">${g['อังกฤษ']?.score ?? 0}</span><input type="number" class="e-m hidden edit-field" value="${g['อังกฤษ']?.score ?? 0}" data-f="${g['อังกฤษ']?.full ?? 50}"></td>
          <td class="p-3 text-center">
            <div class="v-m flex justify-center gap-3">
                <button onclick="toggleRow('${rowId}', true)" class="text-blue-600 font-bold">แก้ไข</button>
                <button onclick="deleteRow(${g.student_id}, ${g.test_number}, '${code}')" class="text-red-500 font-bold">ลบ</button>
            </div>
            <div class="e-m hidden flex justify-center gap-2">
                <button onclick="saveInline('${rowId}', ${g.student_id}, ${g.test_number}, '${code}')" class="bg-green-500 text-white px-2 py-1 rounded">บันทึก</button>
                <button onclick="toggleRow('${rowId}', false)" class="bg-slate-200 px-2 py-1 rounded">X</button>
            </div>
          </td></tr>`;
      });
      container.innerHTML = html + '</tbody></table>';
    }

    function toggleRow(id, isEdit) {
      const r = document.getElementById(id);
      r.querySelectorAll('.v-m').forEach(el => el.classList.toggle('hidden', isEdit));
      r.querySelectorAll('.e-m').forEach(el => el.classList.toggle('hidden', !isEdit));
    }

    async function saveInline(rowId, sid, test, code) {
      const r = document.getElementById(rowId);
      const upserts = [];
      r.querySelectorAll('td[data-subj]').forEach(td => {
        const input = td.querySelector('input');
        upserts.push({ student_id: sid, test_number: test, course_code: code, subject: td.dataset.subj, score: +input.value, full_score: +input.dataset.f });
      });
      const { error } = await db.from('test_scores').upsert(upserts, { onConflict: 'student_id,test_number,subject' });
      if (!error) { showToast('บันทึกสำเร็จ'); loadScoreTable(); refreshRankings(code); }
    }

    async function deleteRow(sid, test, code) {
      if(!confirm(`ต้องการลบคะแนน ครั้งที่ ${test}?`)) return;
      const { error } = await db.from('test_scores').delete().eq('student_id', sid).eq('test_number', test).eq('course_code', code);
      if(!error) { showToast('ลบข้อมูลเรียบร้อย'); loadScoreTable(); refreshRankings(code); }
    }

    // --- CSV Import (คืนชีพหน้าตาเดิม) ---
    function previewCSV(e) {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const lines = ev.target.result.trim().split('\n');
        const headers = lines[0].split(',').map(h => h.trim());
        csvData = lines.slice(1).map(line => {
          const vals = line.split(',').map(v => v.trim());
          return Object.fromEntries(headers.map((h, i) => [h, vals[i]]));
        }).filter(r => r.course_code);
        
        document.getElementById('csvSummary').textContent = `พบข้อมูลทั้งหมด ${csvData.length} รายการ`;
        document.getElementById('csvPreview').classList.remove('hidden');
        document.getElementById('csvHead').innerHTML = headers.map(h => `<th class="text-left px-2 py-2 text-slate-500 uppercase font-black">${h}</th>`).join('');
        document.getElementById('csvBody').innerHTML = csvData.slice(0, 10).map(row =>
          `<tr class="hover:bg-slate-50">${headers.map(h => `<td class="px-2 py-2 text-slate-700">${row[h] ?? ''}</td>`).join('')}</tr>`
        ).join('');
      };
      reader.readAsText(file, 'UTF-8');
    }

    async function importCSV() {
      if (!csvData.length) return;
      const btn = document.getElementById('importBtn');
      btn.disabled = true; btn.textContent = '⏳ กำลัง Import...';
      const rows = csvData.map(r => ({ course_code: r.course_code, student_id: +r.student_id, test_number: +r.test_number, subject: r.subject, score: +r.score, full_score: +r.full_score }));
      const { error } = await db.from('test_scores').upsert(rows, { onConflict: 'student_id,test_number,subject' });
      if (!error) {
        const codes = [...new Set(rows.map(r => r.course_code))];
        for (const c of codes) await refreshRankings(c);
        showToast(`✅ Import ข้อมูลเรียบร้อย!`);
        document.getElementById('csvPreview').classList.add('hidden');
      } else { showToast('Import ผิดพลาด กรุณาตรวจสอบรูปแบบไฟล์', 'error'); }
      btn.disabled = false; btn.textContent = '⬆️ เริ่ม Import ข้อมูล';
    }

    function downloadTemplate() {
      const csv = 'course_code,student_id,test_number,subject,score,full_score\ns2m12569,1,1,วิทย์,38,50\ns2m12569,1,1,คณิต,42,50';
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'score-template.csv'; a.click();
    }

    // --- Core Logic ---
    async function refreshRankings(courseCode) {
      const { data: scores } = await db.from('test_scores').select('student_id, score, full_score').eq('course_code', courseCode);
      const map = {};
      scores.forEach(s => {
        if (!map[s.student_id]) map[s.student_id] = { sum: 0, count: 0 };
        map[s.student_id].sum += s.full_score > 0 ? (s.score / s.full_score) * 100 : 0;
        map[s.student_id].count += 1;
      });
      const rows = Object.entries(map).map(([sid, d]) => ({ 
        course_code: courseCode, student_id: +sid, total_percent: Math.round(d.sum / d.count * 100) / 100 
      })).sort((a, b) => b.total_percent - a.total_percent).map((r, i) => ({ ...r, rank_number: i + 1 }));
      await db.from('class_rankings').upsert(rows, { onConflict: 'course_code,student_id' });
    }

    function switchTab(name, btn) {
      ['enter','view','import'].forEach(t => document.getElementById('tab-' + t).classList.add('hidden'));
      document.getElementById('tab-' + name).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function showToast(m, type='success') {
      const t = document.getElementById('toast');
      t.textContent = m; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    init();
  </script>
