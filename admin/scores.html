<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>จัดการคะแนน - Qtutor Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
    .sidebar { background: #0f172a; min-height: 100vh; width: 240px; flex-shrink: 0; transition: all 0.3s; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .nav-item:hover { background: #1e293b; color: #e2e8f0; }
    .nav-item.active { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; box-shadow: 0 4px 12px rgba(99,102,241,0.35); }
    .field-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; display: block; }
    .input { background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; padding: 11px 13px; font-size: 15px; font-weight: 600; color: #1e293b; width: 100%; transition: border-color 0.15s; outline: none; }
    .input:focus { border-color: #6366f1; }
    .score-input { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 10px 8px; font-size: 18px; font-weight: 900; color: #1e293b; width: 100%; text-align: center; outline: none; transition: all 0.2s; }
    .score-input:focus { border-color: #6366f1; background: #fff; }
    .score-input.valid { background: #dcfce7; border-color: #22c55e; }
    .score-input.invalid { background: #fee2e2; border-color: #ef4444; }
    .score-input.empty { background: #fff; border-color: #e2e8f0; }
    .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; font-weight: 900; border-radius: 14px; padding: 13px 20px; transition: all 0.15s; border: none; cursor: pointer; text-align: center; width: 100%; font-size: 15px; min-height: 50px; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary.success { background: linear-gradient(135deg,#10b981,#34d399); animation: successPulse 0.6s ease-out; }
    @keyframes successPulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    .btn-secondary { background: #10b981; color: #fff; font-weight: 800; border-radius: 10px; padding: 8px 16px; font-size: 12px; border: none; cursor: pointer; min-height: 40px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translate(-50%, 80px); z-index: 9999; padding: 14px 20px; border-radius: 16px; font-weight: 700; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); transition: all 0.3s; opacity: 0; width: 90%; max-width: 380px; text-align: center; }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }
    .toast.success { background: #d1fae5; color: #065f46; }
    .toast.error { background: #fee2e2; color: #991b1b; }
    .tab-btn { padding: 10px 14px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s; border: 2px solid transparent; flex: 1; text-align: center; white-space: nowrap; min-width: 0; min-height: 40px; }
    .tab-btn.active { background: #0f172a; color: #fff; }
    .tab-btn:not(.active) { background: #f1f5f9; color: #64748b; }
    .loading-dots::after { content: ''; animation: dots 1.2s infinite; }
    @keyframes dots { 0%,100%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
    .subject-column-header { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 4px; text-align: center; border-bottom: 2px solid #e2e8f0; }
    .score-table-row { display: grid; gap: 2px; padding: 4px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; margin-bottom: 8px; }
    .score-table-cell { padding: 4px; }
    .student-index-cell { font-weight: 700; font-size: 12px; color: #94a3b8; padding: 8px; text-align: center; min-width: 40px; }
    .student-name-cell { font-weight: 700; font-size: 16px; color: #1e293b; padding: 8px; min-width: 160px; }
    .score-cell { min-width: 80px; }
    .editable-score { cursor: pointer; padding: 6px; border-radius: 6px; transition: all 0.2s; border: 2px solid transparent; }
    .editable-score:hover { background: #f0f9ff; border-color: #6366f1; }
    .editable-score.editing { background: #fff; border-color: #10b981; }
    .topic-text { font-size: 11px; color: #94a3b8; font-weight: 600; margin-top: 2px; padding: 2px 4px; }
    .null-score { color: #94a3b8; font-weight: 300; font-style: italic; }
    .zero-score { color: #1e293b; font-weight: 900; }
    .two-col-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: flex-end; }
    @media (max-width: 640px) {
      .two-col-inline { grid-template-columns: 1fr; }
    }
    .max-score-display { font-weight: 700; color: #6366f1; padding: 2px 6px; background: #eef2ff; border-radius: 4px; }

    /* ===== COMPACT ROW STYLES ===== */
    .score-view-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .score-row {
      display: grid;
      grid-template-columns: 45px 150px 90px 100px 1fr 40px;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
      transition: background-color 0.15s ease;
      position: relative;
    }

    .score-row:last-child {
      border-bottom: none;
    }

    .score-row:hover {
      background-color: #f8fafc;
    }

    .score-row-index {
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      color: #94a3b8;
      min-width: 45px;
    }

    .score-row-nickname {
      font-weight: 700;
      font-size: 15px;
      color: #1e293b;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-row-test {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-align: center;
      white-space: nowrap;
    }

    .score-row-subject {
      font-size: 13px;
      font-weight: 600;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-row-score-wrapper {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .score-row-score-display {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
      cursor: pointer;
      transition: all 0.15s ease;
      font-weight: 600;
      font-size: 13px;
    }

    .score-row-score-display:hover {
      background: #f0f9ff;
      border-color: #6366f1;
    }

    .score-row-score-display .max-score {
      font-weight: 600;
      color: #64748b;
    }

    .score-row-edit-input {
      width: 100%;
      padding: 6px 10px;
      border: 2px solid #6366f1;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      color: #1e293b;
      text-align: center;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .score-row-edit-input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }

    .score-row-edit-input.hidden {
      display: none;
    }

    .score-row-topic {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
      padding: 2px 6px;
      background: #f1f5f9;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: -2px;
    }

    .score-row-delete {
      width: 36px;
      height: 36px;
      border: none;
      background: #fee2e2;
      color: #ef4444;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .score-row-delete:hover {
      background: #fecaca;
      transform: scale(1.05);
    }

    .score-row-delete:active {
      transform: scale(0.95);
    }

    /* Responsive adjustments */
    @media (max-width: 1024px) {
      .score-row {
        grid-template-columns: 40px 120px 80px 90px 1fr 36px;
        gap: 8px;
        padding: 8px 10px;
      }

      .score-row-nickname {
        font-size: 14px;
      }

      .score-row-test {
        font-size: 11px;
      }

      .score-row-subject {
        font-size: 12px;
      }
    }

    @media (max-width: 768px) {
      .score-row {
        grid-template-columns: 35px 100px 70px 80px 1fr 32px;
        gap: 6px;
        padding: 6px 8px;
      }

      .score-row-index {
        font-size: 12px;
      }

      .score-row-nickname {
        font-size: 13px;
      }

      .score-row-test {
        font-size: 10px;
      }

      .score-row-subject {
        font-size: 11px;
      }

      .score-row-delete {
        width: 32px;
        height: 32px;
        font-size: 14px;
      }
    }

    @media (max-width: 512px) {
      .score-row {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 8px;
      }

      .score-row-index,
      .score-row-nickname,
      .score-row-test,
      .score-row-subject,
      .score-row-score-wrapper,
      .score-row-delete {
        width: 100%;
      }

      .score-row-index {
        order: -1;
        padding-bottom: 4px;
        border-bottom: 1px solid #e2e8f0;
        text-align: left;
      }

      .score-row-nickname {
        order: 0;
        font-size: 14px;
      }

      .score-row-test {
        order: 1;
        text-align: left;
        font-size: 12px;
      }

      .score-row-subject {
        order: 2;
        font-size: 12px;
      }

      .score-row-score-wrapper {
        order: 3;
      }

      .score-row-delete {
        order: 4;
      }
    }

    /* Existing styles preserved */
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 50; left: -240px; height: 100vh; }
      .sidebar.open { left: 0; }
      .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; backdrop-filter: blur(2px); }
      .overlay.open { display: block; }
      .mobile-stack { display: flex; flex-direction: column; }
      .mobile-stack > * { width: 100%; }
    }
    @media (min-width: 769px) {
      .sidebar { position: relative; left: 0; }
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

  <script>
    const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allSubjects = [];
    let allStudents = [];
    let fullScores = {};
    let currentScores = {};
    let currentTopics = {};
    let isSaving = false;
    let scoreDisplayMode = 'default';
    let editingCell = null;
    let subjectSortMap = {}; // Maps subject_name -> sort_order

    // ==================== STALE DATA PROTECTION ====================
    // Flags to prevent accidental overwrites when app state is lost
    let appStateValid = false;
    let lastValidCourseCode = null;
    let lastValidTestNumber = null;

    // ========== PERSISTENCE: Enhanced LocalStorage Helpers ==========
    function saveAppState(state) {
      const fullState = {
        currentTab: state.currentTab || 'enter',
        courseCode: state.courseCode || '',
        testNumber: state.testNumber || '',
        timestamp: Date.now()
      };
      localStorage.setItem('scoreManagementState', JSON.stringify(fullState));
      
      // Mark app state as valid
      appStateValid = !!state.courseCode;
      if (state.courseCode) lastValidCourseCode = state.courseCode;
      if (state.testNumber) lastValidTestNumber = state.testNumber;
    }

    function loadAppState() {
      const saved = localStorage.getItem('scoreManagementState');
      return saved ? JSON.parse(saved) : { currentTab: 'enter', courseCode: '', testNumber: '' };
    }

    function applyPersistentState() {
      const state = loadAppState();
      
      // Restore tab
      if (state.currentTab === 'view') {
        const viewTab = document.querySelectorAll('.tab-btn')[1];
        switchTab('view', viewTab);
      }

      // Restore course selection
      const enterCourse = document.getElementById('enterCourse');
      if (state.courseCode && enterCourse.querySelector(`option[value="${state.courseCode}"]`)) {
        enterCourse.value = state.courseCode;
        onEnterCourseChange();
        
        // Restore test selection
        if (state.testNumber) {
          setTimeout(() => {
            const enterTest = document.getElementById('enterTest');
            if (enterTest.querySelector(`option[value="${state.testNumber}"]`)) {
              enterTest.value = state.testNumber;
              onCourseTestChange();
              appStateValid = true;
            }
          }, 300);
        }
      }

      const viewCourse = document.getElementById('viewCourse');
      if (state.courseCode && viewCourse.querySelector(`option[value="${state.courseCode}"]`)) {
        viewCourse.value = state.courseCode;
        onViewCourseChange();
      }
    }

    // ==================== VISIBILITY CHANGE LISTENER ====================
    // Refresh data when user switches back to the tab (mobile memory management protection)
    document.addEventListener('visibilitychange', async () => {
      if (!document.hidden && appStateValid && lastValidCourseCode) {
        console.log('📱 Tab regained focus - refreshing data...');
        showToast('🔄 রিফ্রেশ করা হচ্ছে...', 'success');
        
        // Re-load full scores and students

    // ── When course changes (Entry Mode) ──────────────────────────────────────
    async function onEnterCourseChange() {
      const code = document.getElementById('enterCourse').value;
      const testSel = document.getElementById('enterTest');
      const addBtn = document.getElementById('addTestBtn');
      const hint = document.getElementById('testHint');

      testSel.innerHTML = '<option value="">-- ครั้งที่ --</option>';
      document.getElementById('fullScoreArea').classList.add('hidden');
      document.getElementById('bulkScoreArea').classList.add('hidden');

      if (!code) {
        addBtn.disabled = true;
        hint.textContent = 'เลือกคอร์สก่อนเพื่อดูการสอบที่มีอยู่';
        appStateValid = false;
        return;
      }

      // Save state
      const state = loadAppState();
      saveAppState({ ...state, courseCode: code, testNumber: '' });
      lastValidCourseCode = code;

      // Fetch course display mode
      const { data: courseData } = await db
        .from('courses')
        .select('score_display_mode')
        .eq('course_code', code)
        .limit(1);

      scoreDisplayMode = courseData?.[0]?.score_display_mode || 'default';

      // Fetch subjects for this course with sort_order
      const { data: subjects } = await db
        .from('subjects')
        .select('subject_name, sort_order')
        .eq('course_code', code)
        .order('sort_order', { ascending: true });

      allSubjects = (subjects || []).map(s => s.subject_name);
      subjectSortMap = {};
      (subjects || []).forEach(s => {
        subjectSortMap[s.subject_name] = s.sort_order;
      });

      // Fetch test numbers
      const { data } = await db
        .from('test_scores')
        .select('test_number')
        .eq('course_code', code);

      const existing = [...new Set((data || []).map(r => r.test_number))].sort((a, b) => a - b);
      let nextNum = existing.length > 0 ? Math.max(...existing) + 1 : 1;

      existing.forEach(n => {
        testSel.innerHTML += `<option value="${n}">ครั้งที่ ${n}</option>`;
      });

      const saved = sessionStorage.getItem(pendingKey(code));
      if (saved && !existing.includes(+saved)) {
        testSel.innerHTML += `<option value="${saved}">ครั้งที่ ${saved} (ยังไม่บันทึก)</option>`;
        testSel.value = saved;
        nextNum = +saved + 1;
        await onCourseTestChange();
      }

      addBtn.disabled = false;
      addBtn.dataset.next = nextNum;

      const total = existing.length + (saved && !existing.includes(+saved) ? 1 : 0);
      if (total === 0) {
        hint.textContent = `ยังไม่มีการสอบ — กด ＋ เพื่อเพิ่มครั้งที่ ${nextNum}`;
      } else {
        hint.textContent = `มีการสอบแล้ว ${total} ครั้ง — กด ＋ เพื่อเพิ่มครั้งที่ ${nextNum}`;
      }
    }

    // ── Add next test number ─────────────────────────────────────
    function addNextTest() {
      const code = document.getElementById('enterCourse').value;
      if (!code) return;
      const addBtn = document.getElementById('addTestBtn');
      const testSel = document.getElementById('enterTest');
      const hint = document.getElementById('testHint');
      const nextNum = +(addBtn.dataset.next || 1);

      const exists = Array.from(testSel.options).some(o => +o.value === nextNum);
      if (!exists) {
        testSel.innerHTML += `<option value="${nextNum}">ครั้งที่ ${nextNum} (ยังไม่บันทึก)</option>`;
      }
      testSel.value = nextNum;

      sessionStorage.setItem(pendingKey(code), nextNum);

      const newNext = nextNum + 1;
      addBtn.dataset.next = newNext;
      hint.textContent = `กด ＋ เพื่อเพิ่มครั้งที่ ${newNext}`;

      onCourseTestChange();
    }

    // ── On course+test change ────────────────────────────────────
    async function onCourseTestChange() {
      const code = document.getElementById('enterCourse').value;
      const test = document.getElementById('enterTest').value;
      document.getElementById('delTestBtn').disabled = !(code && test);

      if (code && test) {
        const state = loadAppState();
        saveAppState({ ...state, courseCode: code, testNumber: test });
        lastValidTestNumber = test;
        appStateValid = true;
      }

      document.getElementById('fullScoreArea').classList.add('hidden');
      document.getElementById('bulkScoreArea').classList.add('hidden');

    // Save full scores and topics (if applicable)
    async function saveFullScoresAndTopic() {
      const code = document.getElementById('enterCourse').value;
      const test = document.getElementById('enterTest').value;
      if (!code || !test) return;

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '⏳ กำลังบันทึก...';

      const updates = allSubjects.map(subject => {
        const fullScore = +document.getElementById(`fullScore_${subject}`).value;
        const topic = scoreDisplayMode === 'by_subject' 
          ? document.getElementById(`topic_${subject}`)?.value?.trim() || null
          : null;

        fullScores[subject] = fullScore;
        currentTopics[subject] = topic || '';
        
        return db.from('test_scores')
          .update({ 
            full_score: fullScore,
            topic: topic
          })
          .eq('course_code', code)
          .eq('test_number', +test)
          .eq('subject', subject);
      });

      const results = await Promise.all(updates);
      const hasError = results.some(r => r.error);

      if (hasError) {
        showToast('บันทึกบางรายการล้มเหลว', 'error');
      } else {
        showToast('✅ บันทึกคะแนนเต็มและหัวข้อสำเร็จ');
        // Live update: re-render the score table with new max scores
        await loadStudentsAndScores(code, test);
      }

      btn.disabled = false;
      btn.textContent = '💾 บันทึกคะแนนเต็มและหัวข้อ';
    }

    // Load students and existing scores with proper sorting
    async function loadStudentsAndScores(code, test) {
      const container = document.getElementById('scoreTableContainer');
      container.innerHTML = `<p class="text-slate-400 font-bold text-sm text-center py-6 loading-dots">กำลังโหลด</p>`;
      document.getElementById('bulkScoreArea').classList.remove('hidden');
      document.getElementById('bulkTestLabel').textContent = `ครั้งที่ ${test}`;

      // Fetch students with proper sorting (by sort_order, then by student_id)
      const { data: enrollments } = await db
        .from('enrollments')
        .select('student_id, sort_order, students(id, nickname, full_name)')
        .eq('course_code', code)
        .order('sort_order', { ascending: true })
        .order('student_id', { ascending: true });

      allStudents = (enrollments || [])
        .map(e => ({ 
          id: e.student_id, 
          nickname: e.students?.nickname || e.students?.full_name || 'Unknown'
        }));

      if (!allStudents.length) {
        container.innerHTML = `<p class="text-slate-400 text-sm text-center py-6">ไม่พบนักเรียนในคอร์สนี้</p>`;
        return;
      }

      // Fetch existing scores
      const { data: scores } = await db
        .from('test_scores')
        .select('student_id, subject, score')
        .eq('course_code', code)
        .eq('test_number', +test);

      currentScores = {};
      (scores || []).forEach(r => {
        if (!currentScores[r.student_id]) currentScores[r.student_id] = {};
        currentScores[r.student_id][r.subject] = r.score;
      });

      // Render table
      renderScoreTable();
    }

    // Render score entry table with index numbers
    function renderScoreTable() {
      const container = document.getElementById('scoreTableContainer');
      container.innerHTML = '';

      // Header row with index column
      let headerHtml = '<div class="grid gap-2 mb-3" style="grid-template-columns: 50px 160px ' + allSubjects.map(() => '100px').join(' ') + '">';
      headerHtml += '<div class="font-black text-slate-600 text-xs py-2 text-center">ลำดับ</div>';
      headerHtml += '<div class="font-black text-slate-600 text-xs py-2">นักเรียน</div>';
      allSubjects.forEach(subject => {
        const full = fullScores[subject] || 50;
        headerHtml += `<div class="subject-column-header">${subject}<br><span class="max-score-display">/${full}</span></div>`;
      });
      headerHtml += '</div>';
      container.innerHTML = headerHtml;

      // Student rows with index
      allStudents.forEach((student, idx) => {
        let rowHtml = `<div class="score-table-row" style="grid-template-columns: 50px 160px ${allSubjects.map(() => '100px').join(' ')}">`;
        rowHtml += `<div class="student-index-cell">${idx + 1}</div>`;
        rowHtml += `<div class="student-name-cell">${student.nickname}</div>`;

        allSubjects.forEach((subject, subjIdx) => {
          const scoreVal = currentScores[student.id]?.[subject] || '';
          const full = fullScores[subject] || 50;
          const inputId = `score_${student.id}_${subject}`;
          
          rowHtml += `
            <div class="score-cell">
              <input 
                id="${inputId}" 
                type="text" 
                inputmode="decimal" 
                value="${scoreVal}" 
                placeholder="–" 
                class="score-input text-sm py-2" 
                data-student-id="${student.id}"
                data-subject="${subject}"
                data-full="${full}"
                data-row="${idx}"
                data-col="${subjIdx}"
                onchange="validateScoreInput(this)" 
                onkeydown="handleScoreKeyNavigation(event, this)"
              >
            </div>
          `;
        });
        
        rowHtml += '</div>';
        container.innerHTML += rowHtml;
      });
    }

    // Validate score input
    function validateScoreInput(input) {
      const val = input.value.trim();
      const fullScore = +input.dataset.full;
      
      const sanitized = val.replace(/[^\d.]/g, '');
      if (sanitized !== val) {
        input.value = sanitized;
      }

      input.classList.remove('valid', 'invalid', 'empty');

      if (input.value === '' || input.value === null) {
        input.classList.add('empty');
        return true;
      }

      const numVal = parseFloat(input.value);
      
      if (isNaN(numVal)) {
        input.classList.add('empty');
        return true;
      }

      if (numVal < 0 || numVal > fullScore) {
        input.classList.add('invalid');
        document.getElementById('saveAllBtn').disabled = true;
        return false;
      }

      input.classList.add('valid');
      checkIfAllValid();
      return true;
    }

    function checkIfAllValid() {
      const saveBtn = document.getElementById('saveAllBtn');
      const allInputs = document.querySelectorAll('#scoreTableContainer .score-input');
      let hasInvalid = false;

      allInputs.forEach(input => {
        if (input.classList.contains('invalid')) {
          hasInvalid = true;
        }
      });

      saveBtn.disabled = hasInvalid || isSaving;
    }

    // Excel-like keyboard navigation
    function handleScoreKeyNavigation(e, input) {
      const row = +input.dataset.row;
      const col = +input.dataset.col;
      const allInputs = document.querySelectorAll('#scoreTableContainer .score-input');
      const currentIdx = Array.from(allInputs).indexOf(input);

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const nextInput = document.querySelector(`[data-row="${row + 1}"][data-col="${col}"]`);
        if (nextInput) nextInput.focus();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prevInput = document.querySelector(`[data-row="${row - 1}"][data-col="${col}"]`);
        if (prevInput) prevInput.focus();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        const nextInput = document.querySelector(`[data-row="${row}"][data-col="${col + 1}"]`);
        if (nextInput) nextInput.focus();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        const prevInput = document.querySelector(`[data-row="${row}"][data-col="${col - 1}"]`);
        if (prevInput) prevInput.focus();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const nextInput = document.querySelector(`[data-row="${row + 1}"][data-col="0"]`);
        if (nextInput) nextInput.focus();
        else {
          const firstInput = document.querySelector('[data-row="0"][data-col="0"]');
          if (firstInput) firstInput.focus();
        }
      }
    }

    // Save all scores
    async function saveAllScores() {
      const code = document.getElementById('enterCourse').value;
      const test = document.getElementById('enterTest').value;
      
      // ====== STALE DATA PROTECTION: Validate state before saving ======
      if (!code || !test) {
        showToast('⚠️ ข้อมูลสูญหาย - กรุณาเลือกคอร์สและครั้งที่สอบใหม่', 'error');
        return;
      }

      if (!appStateValid || !lastValidCourseCode) {
        showToast('⚠️ สถานะแอปพลิเคชันไม่ถูกต้อง - กรุณารีเฟรชหน้า', 'error');
        return;
      }

      const btn = document.getElementById('saveAllBtn');
      isSaving = true;
      btn.disabled = true;
      btn.textContent = '⏳ กำลังบันทึก...';

      const rows = [];
      allStudents.forEach(student => {
        allSubjects.forEach(subject => {
          const input = document.getElementById(`score_${student.id}_${subject}`);
          const val = input?.value;
          const full = fullScores[subject] || 50;
          const topic = currentTopics[subject] || null;
          
          rows.push({
            course_code: code,
            student_id: student.id,
            test_number: +test,
            subject: subject,
            score: (val === '' || val === null) ? null : parseFloat(val),
            full_score: full,
            topic: topic
          });
        });
      });

      if (!rows.length) {
        showToast('ไม่พบข้อมูลนักเรียน', 'error');
        isSaving = false;
        btn.disabled = false;
        return;
      }

      const { error } = await db.from('test_scores').upsert(rows, { 
        onConflict: 'student_id,course_code,test_number,subject' 
      });
      
      if (!error) {
        btn.classList.add('success');
        btn.textContent = '✅ บันทึกเรียบร้อย!';
        showToast(`✅ บันทึกคะแนนทั้งหมดเรียบร้อย`);
        sessionStorage.removeItem(pendingKey(code));

        await refreshRankings(code);

        setTimeout(() => {
          btn.classList.remove('success');
          btn.textContent = '💾 บันทึกคะแนนทั้งหมด';
          isSaving = false;
          btn.disabled = false;
        }, 2000);
      } else {
        console.error(error);
        showToast('เกิดข้อผิดพลาดในการบันทึก: ' + error.message, 'error');
        isSaving = false;
        btn.disabled = false;
        btn.textContent = '💾 บันทึกคะแนนทั้งหมด';
      }
    }

      const code = document.getElementById('enterCourse').value;
      const test = document.getElementById('enterTest').value;
      if (!code || !test) return;

      if (!confirm(`⚠️ ลบการสอบครั้งที่ ${test} ของคอร์สนี้ทั้งหมด?\n\nคะแนนของนักเรียนทุกคนจะถูกลบถาวร`)) return;

      const btn = document.getElementById('delTestBtn');
      btn.disabled = true;
      btn.textContent = '⏳';

      const { error } = await db.from('test_scores')
        .delete()
        .eq('course_code', code)
        .eq('test_number', +test);

      if (error) {
        showToast('ลบไม่สำเร็จ กรุณาลองใหม่', 'error');
        btn.disabled = false;
        btn.textContent = '🗑';

      const nextNum = remaining > 0 ? Math.max(...Array.from(testSel.options).filter(o => o.value).map(o => +o.value)) + 1 : 1;

    // ── View tab: Advanced search with filters ──────────────────────────────────
    async function loadScoreTableView() {
      const code = document.getElementById('viewCourse').value;
      const subject = document.getElementById('viewSubject').value;
      const testNumber = document.getElementById('viewTestNumber').value;
      const studentSearch = document.getElementById('studentSearch').value?.toLowerCase() || '';

      if (!code) {
        showToast('กรุณาเลือกคอร์สก่อน', 'error');
        return;
      }

      const container = document.getElementById('scoreTableView');
      container.innerHTML = '<p class="p-10 text-center loading-dots font-bold text-slate-400">กำลังโหลดข้อมูล...</p>';

      // 1. ดึงข้อมูลนักเรียน (Enrollments) เพื่อใช้เป็นลำดับหลัก (Sort Order)
      const { data: enrollments } = await db
        .from('enrollments')
        .select('student_id, sort_order, students(id, nickname, full_name)')
        .eq('course_code', code)
        .order('sort_order', { ascending: true })
        .order('student_id', { ascending: true });

      if (!enrollments || !enrollments.length) {
        container.innerHTML = '<p class="p-10 text-center text-slate-400 font-bold">ไม่มีนักเรียนในคอร์สนี้</p>';
        return;
      }

      // 2. ดึงลำดับวิชามาเก็บไว้ใน Map เพื่อใช้เรียงลำดับวิชาภายในตัวนักเรียน
      const { data: subjectsData } = await db
        .from('subjects')
        .select('subject_name, sort_order')
        .eq('course_code', code)
        .order('sort_order', { ascending: true });

      const subjectOrder = {};
      (subjectsData || []).forEach(s => {
        subjectOrder[s.subject_name] = s.sort_order;
      });

      // 3. ดึงคะแนน (Scores) ตามเงื่อนไข Filter
      let q = db.from('test_scores')
        .select('student_id, test_number, subject, score, full_score, topic')
        .eq('course_code', code);
      
      if (subject) q = q.eq('subject', subject);
      if (testNumber) q = q.eq('test_number', +testNumber);
      
      const { data: scoreData } = await q;

      // 4. กรองข้อมูลตามชื่อนักเรียน (ถ้ามีการ Search) และจัดกลุ่มตาม student_id
      const scoreMap = {};
      (scoreData || []).forEach(row => {
        const student = enrollments.find(e => e.student_id === row.student_id);
        if (!student) return;

        const nickname = student.students?.nickname?.toLowerCase() || '';
        const fullName = student.students?.full_name?.toLowerCase() || '';
        
        if (studentSearch && !nickname.includes(studentSearch) && !fullName.includes(studentSearch)) return;

        if (!scoreMap[row.student_id]) scoreMap[row.student_id] = [];
        scoreMap[row.student_id].push(row);
      });

      if (Object.keys(scoreMap).length === 0) {
        container.innerHTML = '<p class="p-10 text-center text-slate-400 font-bold">ไม่พบข้อมูลคะแนน</p>';
        return;
      }

      // 5. สร้าง HTML โดยวนลูปตามรายชื่อนักเรียน (enrollments) เพื่อให้ลำดับ 1 ขึ้นก่อนเสมอ
      let html = '<div class="flex flex-col border border-slate-200 rounded-xl overflow-hidden shadow-sm">';

      enrollments.forEach((enroll, idx) => {
        const studentScores = scoreMap[enroll.student_id];
        
        // ถ้าคนนี้มีคะแนน ให้ทำการเรียงคะแนน (ครั้งที่ > วิชา) แล้วแสดงผล
        if (studentScores && studentScores.length > 0) {
          
          studentScores.sort((a, b) => {
            if (a.test_number !== b.test_number) return a.test_number - b.test_number;
            return (subjectOrder[a.subject] || 0) - (subjectOrder[b.subject] || 0);
          });

          studentScores.forEach(row => {
            const nickname = enroll.students?.nickname || enroll.students?.full_name || 'ไม่ระบุชื่อ';
            
            html += `
              <div class="flex items-center gap-2 md:gap-4 p-3 bg-white border-b border-slate-100 hover:bg-indigo-50/30 transition-colors text-[13px] md:text-sm">
                <div class="w-6 text-slate-400 font-bold text-center">${idx + 1}</div>
                
                <div class="w-24 md:w-32 font-bold text-slate-800 truncate">${nickname}</div>
                
                <div class="w-16 md:w-20 text-slate-500 whitespace-nowrap">ครั้งที่ ${row.test_number}</div>
                
                <div class="flex-grow min-w-[120px]">
                  <div class="font-semibold text-indigo-600 truncate">${row.subject}</div>
                  ${row.topic ? `<div class="text-[11px] text-slate-400 truncate mt-0.5">📚 ${row.topic}</div>` : ''}
                </div>

                <div class="flex items-center gap-1.5 no-print">
                  <input type="number" 
                    class="w-12 md:w-14 px-1 py-1 border border-slate-200 rounded text-center font-bold text-blue-700 focus:border-blue-400 focus:ring-1 focus:ring-blue-400 outline-none" 
                    value="${row.score ?? ''}" 
                    placeholder="-"
                    max="${row.full_score}"
                    onblur="updateScoreInline(this, '${code}', ${row.student_id}, ${row.test_number}, '${row.subject}', ${row.full_score})"
                  >
                  <span class="text-slate-400 text-xs">/ ${row.full_score}</span>
                </div>

                <button onclick="deleteScore('${code}', ${row.student_id}, ${row.test_number}, '${row.subject}')" 
                  class="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all no-print">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
              </div>
            `;
          });
        }
      });

      html += '</div>';
      container.innerHTML = html;
    }

    // ======== FIXED: updateScoreInline with proper validation & isolation ========
    async function updateScoreInline(input, courseCode, studentId, testNumber, subject, fullScore) {
      const newScoreStr = input.value.trim();
      
      // ========== VALIDATION 1: NULL/EMPTY CHECK (Stale Data Protection) ==========
      if (!courseCode || !studentId || !testNumber || !subject) {
        showToast('⚠️ ข้อมูลสูญหาย - กรุณารีเฟรชหน้า', 'error');
        input.classList.add('bg-red-50', 'border-red-400');
        return;
      }

      // ========== VALIDATION 2: EMPTY VALUE = DELETE SCORE ==========
      if (newScoreStr === '') {
        await performUpdate(null);
        return;
      }

      const newScore = parseFloat(newScoreStr);

      // ========== VALIDATION 3: NaN CHECK ==========
      if (isNaN(newScore) || newScore < 0) {
        showToast('กรุณากรอกคะแนนให้ถูกต้อง', 'error');
        input.classList.add('bg-red-50', 'border-red-400');
        input.focus();
        return;
      }

      // ========== VALIDATION 4: MAX SCORE CHECK ==========
      if (fullScore > 0 && newScore > fullScore) {
        showToast(`⚠️ คะแนนเกิน! (คะแนนเต็ม ${fullScore})`, 'error');
        input.classList.remove('bg-green-50', 'border-green-400');
        input.classList.add('bg-red-50', 'border-red-400');
        input.focus();
        
        // Shake animation effect
        input.style.animation = 'none';
        setTimeout(() => {
          input.style.animation = 'shake 0.4s ease-in-out';
        }, 10);
        
        return;
      }

      await performUpdate(newScore);

      // ========== HELPER: Perform the actual database update ==========
      async function performUpdate(scoreToSave) {
        try {
          // ========== ISOLATION: Only update the score column ==========
          // This ensures full_score and topic are NOT touched
          const { error } = await db
            .from('test_scores')
            .update({ score: scoreToSave })  // ONLY update score
            .eq('course_code', courseCode)
            .eq('student_id', studentId)
            .eq('test_number', testNumber)
            .eq('subject', subject);

          if (error) throw error;
          
          // ========== SUCCESS FEEDBACK ==========
          showToast('✅ บันทึกคะแนนเรียบร้อย', 'success');
          
          // Green highlight effect
          input.classList.remove('bg-red-50', 'border-red-400');
          input.classList.add('bg-green-50', 'border-green-400');
          setTimeout(() => input.classList.remove('bg-green-50', 'border-green-400'), 1500);
          
          // Refresh rankings only (not full data)
          await refreshRankings(courseCode);
          
        } catch (err) {
          console.error('Database error:', err);
          showToast('⚠️ เกิดข้อผิดพลาดในการเชื่อมต่อ Database', 'error');
          input.classList.add('bg-red-50', 'border-red-400');
        }
      }
    }

    // Add CSS for shake animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }
    `;
    document.head.appendChild(style);

    // Enable inline edit in View mode
    function enableInlineEdit(scoreDiv, code, studentId, testNum, subject, fullScore) {
      // Close any previous edit
      if (editingCell) {
        editingCell.input.classList.add('hidden');
        editingCell.display.classList.remove('hidden');
      }

      const inputEl = scoreDiv.parentElement.querySelector('.score-row-edit-input');
      scoreDiv.classList.add('hidden');
      inputEl.classList.remove('hidden');
      inputEl.focus();
      inputEl.select();

      editingCell = { input: inputEl, display: scoreDiv };

      // Save on blur
      inputEl.onblur = async () => {
        const newScore = inputEl.value === '' ? null : parseFloat(inputEl.value);

        if (newScore !== null && (newScore < 0 || newScore > fullScore)) {
          showToast('คะแนนไม่ถูกต้อง', 'error');
          inputEl.classList.add('hidden');
          scoreDiv.classList.remove('hidden');
          editingCell = null;
          return;
        }

        // Update database - ISOLATED to score column only
        const { error } = await db.from('test_scores')
          .update({ score: newScore })
          .eq('student_id', studentId)
          .eq('course_code', code)
          .eq('test_number', testNum)
          .eq('subject', subject);

        if (!error) {
          showToast('✅ บันทึกสำเร็จ');
          await refreshRankings(code);
          
          // Update local display
          const displayScore = newScore === null 
            ? '<span class="null-score">—</span>'
            : `<span class="font-black text-indigo-600">${newScore}</span>`;
          scoreDiv.innerHTML = `${displayScore} <span class="text-slate-400">/</span> <span class="max-score text-slate-500">${fullScore}</span>`;
        } else {
          showToast('เกิดข้อผิดพลาด', 'error');
        }

        inputEl.classList.add('hidden');
        scoreDiv.classList.remove('hidden');
        editingCell = null;
      };

      // Cancel on Escape
      inputEl.onkeydown = (e) => {
        if (e.key === 'Enter') inputEl.blur();
        if (e.key === 'Escape') {
          inputEl.classList.add('hidden');
          scoreDiv.classList.remove('hidden');
          editingCell = null;
        }
      };
    }

    // Delete score - ISOLATED update
    async function deleteScore(code, studentId, testNum, subject) {
      if (!confirm('ลบคะแนนนี้?')) return;
      
      const { error } = await db.from('test_scores')
        .delete()
        .eq('student_id', studentId)
        .eq('course_code', code)
        .eq('test_number', testNum)
        .eq('subject', subject);

      if (!error) {
        showToast('✅ ลบสำเร็จ');
        await refreshRankings(code);
        loadScoreTableView();
      } else {
        showToast('ลบไม่สำเร็จ', 'error');
      }
    }

    // Refresh rankings
    async function refreshRankings(courseCode) {
      const { data: scores } = await db
        .from('test_scores')
        .select('student_id, score, full_score')
        .eq('course_code', courseCode);

      const map = {};
      scores.forEach(s => {
        if (!map[s.student_id]) map[s.student_id] = { sum: 0, count: 0 };
        if (s.score != null && s.full_score > 0) {
          map[s.student_id].sum += (s.score / s.full_score) * 100;
          map[s.student_id].count += 1;
        }
      });

      const rows = Object.entries(map)
        .filter(([_, d]) => d.count > 0)
        .map(([sid, d]) => ({
          course_code: courseCode,
          student_id: +sid,
          total_percent: Math.round((d.sum / d.count) * 100) / 100
        }))
        .sort((a, b) => b.total_percent - a.total_percent)
        .map((r, i) => ({ ...r, rank_number: i + 1 }));

      await db.from('class_rankings').upsert(rows, { onConflict: 'course_code,student_id' });
    }

    // Init with active courses only
    async function init() {
      // Load only active courses
      const { data: courses } = await db
        .from('courses')
        .select('course_code, course_name')
        .eq('is_active', true)
        .order('sort_order', { ascending: true });

      const courseOptions = (courses || [])
        .map(c => `<option value="${c.course_code}">${c.course_name}</option>`)
        .join('');
      
      document.getElementById('enterCourse').innerHTML = '<option value="">-- เลือกคอร์ส --</option>' + courseOptions;
      document.getElementById('viewCourse').innerHTML = '<option value="">-- เลือกคอร์ส --</option>' + courseOptions;

      // Apply persistent state
      applyPersistentState();
    }

    init();

  </script>
