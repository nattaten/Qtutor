<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>จัดการคะแนน - Qtutor Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
    .sidebar { background: #0f172a; min-height: 100vh; width: 240px; flex-shrink: 0; transition: all 0.3s; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .nav-item:hover { background: #1e293b; color: #e2e8f0; }
    .nav-item.active { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; box-shadow: 0 4px 12px rgba(99,102,241,0.35); }
    .field-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; display: block; }
    .input { background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; padding: 11px 13px; font-size: 15px; font-weight: 600; color: #1e293b; width: 100%; transition: border-color 0.15s; outline: none; }
    .input:focus { border-color: #6366f1; }
    .score-input { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 10px 8px; font-size: 18px; font-weight: 900; color: #1e293b; width: 100%; text-align: center; outline: none; transition: all 0.2s; }
    .score-input:focus { border-color: #6366f1; background: #fff; }
    .score-input.valid { background: #dcfce7; border-color: #22c55e; }
    .score-input.invalid { background: #fee2e2; border-color: #ef4444; }
    .score-input.empty { background: #fff; border-color: #e2e8f0; }
    .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; font-weight: 900; border-radius: 14px; padding: 13px 20px; transition: all 0.15s; border: none; cursor: pointer; text-align: center; width: 100%; font-size: 15px; min-height: 50px; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary.success { background: linear-gradient(135deg,#10b981,#34d399); animation: successPulse 0.6s ease-out; }
    @keyframes successPulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    .btn-secondary { background: #10b981; color: #fff; font-weight: 800; border-radius: 10px; padding: 8px 16px; font-size: 12px; border: none; cursor: pointer; min-height: 40px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translate(-50%, 80px); z-index: 9999; padding: 14px 20px; border-radius: 16px; font-weight: 700; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); transition: all 0.3s; opacity: 0; width: 90%; max-width: 380px; text-align: center; }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }
    .toast.success { background: #d1fae5; color: #065f46; }
    .toast.error { background: #fee2e2; color: #991b1b; }
    .tab-btn { padding: 10px 14px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s; border: 2px solid transparent; flex: 1; text-align: center; white-space: nowrap; min-width: 0; min-height: 40px; }
    .tab-btn.active { background: #0f172a; color: #fff; }
    .tab-btn:not(.active) { background: #f1f5f9; color: #64748b; }
    .loading-dots::after { content: ''; animation: dots 1.2s infinite; }
    @keyframes dots { 0%,100%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
    .subject-column-header { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 4px; text-align: center; border-bottom: 2px solid #e2e8f0; }
    .score-table-row { display: grid; gap: 2px; padding: 4px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; margin-bottom: 8px; }
    .score-table-cell { padding: 4px; }
    .student-name-cell { font-weight: 800; font-size: 14px; color: #1e293b; padding: 8px; min-width: 150px; }
    .score-cell { min-width: 80px; }
    .editable-score { cursor: pointer; padding: 6px; border-radius: 6px; transition: all 0.2s; border: 2px solid transparent; }
    .editable-score:hover { background: #f0f9ff; border-color: #6366f1; }
    .editable-score.editing { background: #fff; border-color: #10b981; }
    .topic-text { font-size: 11px; color: #94a3b8; font-weight: 600; margin-top: 2px; padding: 2px 4px; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 50; left: -240px; height: 100vh; }
      .sidebar.open { left: 0; }
      .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; backdrop-filter: blur(2px); }
      .overlay.open { display: block; }
      .mobile-stack { display: flex; flex-direction: column; }
      .mobile-stack > * { width: 100%; }
    }
    @media (min-width: 769px) {
      .sidebar { position: relative; left: 0; }
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .null-score { color: #94a3b8; font-weight: 300; font-style: italic; }
    .zero-score { color: #1e293b; font-weight: 900; }
    .two-col-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: flex-end; }
    @media (max-width: 640px) {
      .two-col-inline { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="bg-slate-50 flex overflow-x-hidden">

  <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

  <aside id="sidebar" class="sidebar flex flex-col">
    <div class="px-5 py-6 border-b border-slate-800 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-black text-white">Qtutor</h1>
        <p class="text-slate-500 text-xs mt-0.5">Admin Panel</p>
      </div>
      <button onclick="closeSidebar()" class="md:hidden text-slate-400 text-xl leading-none">✕</button>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="dashboard.html" class="nav-item"><span>📊</span> ภาพรวม</a>
      <a href="scores.html"    class="nav-item active"><span>📝</span> จัดการคะแนน</a>
      <a href="students.html"  class="nav-item"><span>👥</span> นักเรียน</a>
      <a href="courses.html"   class="nav-item"><span>📚</span> คอร์สเรียน</a>
      <a href="content.html"   class="nav-item"><span>🎬</span> เนื้อหา (เฉลย/คลิป)</a>
      <a href="export.html"    class="nav-item"><span>📤</span> Export รายงาน</a>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-h-screen min-w-0">

    <div class="bg-white border-b border-slate-100 px-4 py-4 flex items-center justify-between sticky top-0 z-30">
      <div class="flex items-center gap-3">
        <button onclick="openSidebar()" class="md:hidden text-slate-500 bg-slate-50 p-2 rounded-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h2 class="text-lg font-black text-slate-800">📝 จัดการคะแนน</h2>
      </div>
    </div>

    <main class="flex-1 p-3 md:p-6 space-y-4 max-w-6xl mx-auto w-full pb-10">

      <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
        <button class="tab-btn active" onclick="switchTab('enter', this)">✏️ กรอกคะแนน</button>
        <button class="tab-btn" onclick="switchTab('view', this)">📋 ดู/แก้ไข</button>
      </div>

      <!-- ===== TAB: กรอกคะแนน ===== -->
      <div id="tab-enter" class="space-y-4">

        <!-- Step 1: เลือกคอร์ส + ครั้งที่ -->
        <div class="bg-white rounded-2xl p-4 md:p-5 shadow-sm border border-slate-100">
          <h3 class="font-black text-slate-800 mb-3 text-sm md:text-base">1. เลือกคอร์สและครั้งที่สอบ</h3>
          <div class="mobile-stack md:grid md:grid-cols-2 gap-3">
            <div>
              <label class="field-label">คอร์ส</label>
              <select id="enterCourse" onchange="onEnterCourseChange()" class="input"><option value="">-- เลือกคอร์ส --</option></select>
            </div>
            <div>
              <label class="field-label">ครั้งที่สอบ</label>
              <div class="flex gap-2 items-center">
                <select id="enterTest" onchange="onCourseTestChange()" class="input flex-1"><option value="">-- ครั้งที่ --</option></select>
                <button onclick="addNextTest()" id="addTestBtn" title="เพิ่มการสอบครั้งถัดไป"
                  class="flex-shrink-0 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-black text-lg rounded-xl w-12 h-12 flex items-center justify-center transition-all shadow-md shadow-indigo-200 disabled:opacity-40 min-w-[50px]"
                  disabled>＋</button>
                <button onclick="deleteTest()" id="delTestBtn" title="ลบการสอบครั้งนี้"
                  class="flex-shrink-0 bg-red-500 hover:bg-red-600 active:scale-95 text-white font-black text-lg rounded-xl w-12 h-12 flex items-center justify-center transition-all shadow-md shadow-red-200 disabled:opacity-40 min-w-[50px]"
                  disabled>🗑</button>
              </div>
              <p id="testHint" class="text-xs text-slate-400 mt-1">เลือกคอร์สก่อนเพื่อดูการสอบที่มีอยู่</p>
            </div>
          </div>
        </div>

        <!-- Step 2: คะแนนเต็ม & หัวข้อ -->
        <div id="fullScoreArea" class="hidden bg-white rounded-2xl p-4 md:p-5 shadow-sm border border-slate-100">
          <h3 class="font-black text-slate-800 mb-3 text-sm md:text-base">2. กำหนดคะแนนเต็มและหัวข้อ</h3>
          <div id="fullScoreInputs" class="grid gap-3"></div>
          <button onclick="saveFullScoresAndTopic()" class="btn-secondary mt-4 w-full">💾 บันทึกคะแนนเต็มและหัวข้อ</button>
        </div>

        <!-- Step 3: กรอกคะแนน -->
        <div id="bulkScoreArea" class="hidden">
          <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
            <h3 class="font-black text-slate-800 text-sm md:text-base">3. กรอกคะแนนนักเรียน</h3>
            <span id="bulkTestLabel" class="text-xs font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full"></span>
          </div>

          <!-- Score Entry Table -->
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-x-auto">
            <div id="scoreTableContainer" class="p-4 space-y-2">
              <p class="text-slate-400 font-bold text-sm text-center py-6 loading-dots">กำลังโหลด</p>
            </div>
          </div>

          <button onclick="saveAllScores()" id="saveAllBtn" class="btn-primary mt-4">
            💾 บันทึกคะแนนทั้งหมด
          </button>
        </div>

      </div>

      <!-- ===== TAB: ดู/แก้ไข ===== -->
      <div id="tab-view" class="hidden space-y-4">
        <div class="bg-white rounded-2xl p-4 md:p-5 shadow-sm border border-slate-100">
          <h3 class="font-black text-slate-800 mb-4 text-sm md:text-base">🔍 Advanced Search & Filter</h3>
          
          <!-- Filters Grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
            <div>
              <label class="field-label">คอร์ส <span class="text-red-500">*</span></label>
              <select id="viewCourse" onchange="onViewCourseChange()" class="input"><option value="">-- เลือกคอร์ส --</option></select>
            </div>
            <div>
              <label class="field-label">วิชา</label>
              <select id="viewSubject" class="input"><option value="">-- ทั้งหมด --</option></select>
            </div>
            <div>
              <label class="field-label">ครั้งที่สอบ</label>
              <input type="number" id="viewTestNumber" class="input" placeholder="ปล่อยว่างเพื่อดูทั้งหมด" min="1">
            </div>
            <div>
              <label class="field-label">ค้นหานักเรียน</label>
              <input type="text" id="studentSearch" class="input" placeholder="ชื่อหรือชื่อเล่น" inputmode="text">
            </div>
          </div>

          <button onclick="loadScoreTableView()" class="btn-primary">🔍 ค้นหา</button>
        </div>

        <!-- Results Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-x-auto">
          <div id="scoreTableView"></div>
        </div>
      </div>

    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allSubjects = [];
    let allStudents = [];
    let fullScores = {};
    let currentScores = {};
    let currentTopics = {};
    let isSaving = false;
    let scoreDisplayMode = 'default';
    let editingCell = null;

    // ========== PERSISTENCE: LocalStorage Helpers ==========
    function saveSelectionState(courseCode, testNumber) {
      const state = { courseCode, testNumber, timestamp: Date.now() };
      localStorage.setItem('scoreManagementState', JSON.stringify(state));
    }

    function loadSelectionState() {
      const saved = localStorage.getItem('scoreManagementState');
      return saved ? JSON.parse(saved) : null;
    }

    function applyPersistentState() {
      const state = loadSelectionState();
      if (!state) return;

      const enterCourse = document.getElementById('enterCourse');
      if (enterCourse.querySelector(`option[value="${state.courseCode}"]`)) {
        enterCourse.value = state.courseCode;
        onEnterCourseChange();
        
        setTimeout(() => {
          const enterTest = document.getElementById('enterTest');
          if (enterTest.querySelector(`option[value="${state.testNumber}"]`)) {
            enterTest.value = state.testNumber;
            onCourseTestChange();
          }
        }, 300);
      }

      const viewCourse = document.getElementById('viewCourse');
      if (viewCourse.querySelector(`option[value="${state.courseCode}"]`)) {
        viewCourse.value = state.courseCode;
        onViewCourseChange();
      }
    }

    // Sidebar
    function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

    // Init
    async function init() {
      const { data: courses } = await db
        .from('courses')
        .select('course_code, course_name')
        .eq('is_active', true)
        .order('created_at', { ascending: false });
      
      ['enterCourse', 'viewCourse'].forEach(id => {
        const sel = document.getElementById(id);
        sel.innerHTML = `<option value="">-- เลือกคอร์ส --</option>`;
        (courses || []).forEach(c => { sel.innerHTML += `<option value="${c.course_code}">${c.course_name}</option>`; });
      });

      setTimeout(() => applyPersistentState(), 100);
    }

    function pendingKey(code) { return 'pendingTest_' + code; }

    // Tab switching
    function switchTab(name, btn) {
      ['enter','view'].forEach(t => document.getElementById('tab-' + t).classList.add('hidden'));
      document.getElementById('tab-' + name).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (name === 'view') {
        const state = loadSelectionState();
        if (state && state.courseCode) {
          const viewCourse = document.getElementById('viewCourse');
          if (viewCourse.querySelector(`option[value="${state.courseCode}"]`)) {
            viewCourse.value = state.courseCode;
            onViewCourseChange();
          }
        }
      }
    }

    // Toast
    function showToast(m, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = m; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── When course changes (Entry Mode) ──────────────────────────────────────
    async function onEnterCourseChange() {
      const code = document.getElementById('enterCourse').value;
      const testSel = document.getElementById('enterTest');
      const addBtn = document.getElementById('addTestBtn');
      const hint = document.getElementById('testHint');

      testSel.innerHTML = '<option value="">-- ครั้งที่ --</option>';
      document.getElementById('fullScoreArea').classList.add('hidden');
      document.getElementById('bulkScoreArea').classList.add('hidden');

      if (!code) {
        addBtn.disabled = true;
        hint.textContent = 'เลือกคอร์สก่อนเพื่อดูการสอบที่มีอยู่';
        return;
      }

      saveSelectionState(code, '');

      // Fetch course display mode
      const { data: courseData } = await db
        .from('courses')
        .select('score_display_mode')
        .eq('course_code', code)
        .limit(1);

      scoreDisplayMode = courseData?.[0]?.score_display_mode || 'default';

      // Fetch subjects for this course
      const { data: subjects } = await db
        .from('subjects')
        .select('subject_name')
        .eq('course_code', code)
        .order('sort_order', { ascending: true });

      allSubjects = (subjects || []).map(s => s.subject_name);

      // Fetch test numbers
      const { data } = await db
        .from('test_scores')
        .select('test_number')
        .eq('course_code', code);

      const existing = [...new Set((data || []).map(r => r.test_number))].sort((a, b) => a - b);
      let nextNum = existing.length > 0 ? Math.max(...existing) + 1 : 1;

      existing.forEach(n => {
        testSel.innerHTML += `<option value="${n}">ครั้งที่ ${n}</option>`;
      });

      const saved = sessionStorage.getItem(pendingKey(code));
      if (saved && !existing.includes(+saved)) {
        testSel.innerHTML += `<option value="${saved}">ครั้งที่ ${saved} (ยังไม่บันทึก)</option>`;
        testSel.value = saved;
        nextNum = +saved + 1;
        await onCourseTestChange();
      }

      addBtn.disabled = false;
      addBtn.dataset.next = nextNum;

      const total = existing.length + (saved && !existing.includes(+saved) ? 1 : 0);
      if (total === 0) {
        hint.textContent = `ยังไม่มีการสอบ — กด ＋ เพื่อเพิ่มครั้งที่ ${nextNum}`;
      } else {
        hint.textContent = `มีการสอบแล้ว ${total} ครั้ง — กด ＋ เพื่อเพิ่มครั้งที่ ${nextNum}`;
      }
    }

    // ── Add next test number ─────────────────────────────────────
    function addNextTest() {
      const code = document.getElementById('enterCourse').value;
      if (!code) return;
      const addBtn = document.getElementById('addTestBtn');
      const testSel = document.getElementById('enterTest');
      const hint = document.getElementById('testHint');
      const nextNum = +(addBtn.dataset.next || 1);

      const exists = Array.from(testSel.options).some(o => +o.value === nextNum);
      if (!exists) {
        testSel.innerHTML += `<option value="${nextNum}">ครั้งที่ ${nextNum} (ยังไม่บันทึก)</option>`;
      }
      testSel.value = nextNum;

      sessionStorage.setItem(pendingKey(code), nextNum);

      const newNext = nextNum + 1;
      addBtn.dataset.next = newNext;
      hint.textContent = `กด ＋ เพื่อเพิ่มครั้งที่ ${newNext}`;

      onCourseTestChange();
    }

    // ── On course+test change ────────────────────────────────────
    async function onCourseTestChange() {
      const code = document.getElementById('enterCourse').value;
      const test = document.getElementById('enterTest').value;
      document.getElementById('delTestBtn').disabled = !(code && test);

      if (code && test) {
        saveSelectionState(code, test);
      }

      document.getElementById('fullScoreArea').classList.add('hidden');
      document.getElementById('bulkScoreArea').classList.add('hidden');

      if (!code || !test) return;

      // Load full scores and topics for each subject
      const { data: existing } = await db.from('test_scores')
        .select('subject, full_score, topic')
        .eq('course_code', code)
        .eq('test_number', +test)
        .limit(allSubjects.length);

      fullScores = {};
      currentTopics = {};
      (existing || []).forEach(r => {
        fullScores[r.subject] = r.full_score;
        currentTopics[r.subject] = r.topic || '';
      });

      // Render full score inputs for each subject
      renderFullScoreInputs();

      // Load students
      await loadStudentsAndScores(code, test);
    }

    // Render full score inputs with topic field (conditional)
    function renderFullScoreInputs() {
      const container = document.getElementById('fullScoreInputs');
      container.innerHTML = '';

      allSubjects.forEach(subject => {
        const score = fullScores[subject] || 50;
        const topic = currentTopics[subject] || '';

        // Show topic field only if score_display_mode === 'by_subject'
        const topicField = scoreDisplayMode === 'by_subject' 
          ? `<input id="topic_${subject}" type="text" value="${topic}" placeholder="เช่น บทที่ 3" class="input text-base font-normal">`
          : '';

        const html = scoreDisplayMode === 'by_subject'
          ? `
            <div class="bg-blue-50 rounded-xl p-3">
              <label class="field-label text-blue-700">${subject}</label>
              <div class="two-col-inline">
                <div>
                  <label class="field-label text-xs">คะแนนเต็ม</label>
                  <input id="fullScore_${subject}" type="number" value="${score}" min="1" class="input text-center py-2 text-base font-black">
                </div>
                <div>
                  <label class="field-label text-xs">หัวข้อ</label>
                  ${topicField}
                </div>
              </div>
            </div>
          `
          : `
            <div class="bg-blue-50 rounded-xl p-3">

            </div>
          `;

    // Save full scores and topics (if applicable)
    async function saveFullScoresAndTopic() {
      const code = document.getElementById('enterCourse').value;
      const test = document.getElementById('enterTest').value;
      if (!code || !test) return;

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '⏳ กำลังบันทึก...';

      const updates = allSubjects.map(subject => {
        const fullScore = +document.getElementById(`fullScore_${subject}`).value;
        const topic = scoreDisplayMode === 'by_subject' 
          ? document.getElementById(`topic_${subject}`)?.value?.trim() || null
          : null;

        fullScores[subject] = fullScore;
        currentTopics[subject] = topic || '';
        
        return db.from('test_scores')
          .update({ 
            full_score: fullScore,
            topic: topic
          })
          .eq('course_code', code)
          .eq('test_number', +test)
          .eq('subject', subject);
      });

      const results = await Promise.all(updates);
      const hasError = results.some(r => r.error);

      if (hasError) {
        showToast('บันทึกบางรายการล้มเหลว', 'error');
      } else {
        showToast('✅ บันทึกคะแนนเต็มและหัวข้อสำเร็จ');
      }

      btn.disabled = false;
      btn.textContent = '💾 บันทึกคะแนนเต็มและหัวข้อ';
    }

    // Load students and existing scores
    async function loadStudentsAndScores(code, test) {
      const container = document.getElementById('scoreTableContainer');
      container.innerHTML = `<p class="text-slate-400 font-bold text-sm text-center py-6 loading-dots">กำลังโหลด</p>`;
      document.getElementById('bulkScoreArea').classList.remove('hidden');
      document.getElementById('bulkTestLabel').textContent = `ครั้งที่ ${test}`;

      // Fetch students from enrollments
      const { data: enrollments } = await db
        .from('enrollments')
        .select('student_id, students(id, nickname, full_name)')
        .eq('course_code', code)
        .order('students(nickname)');

      allStudents = (enrollments || [])
        .map(e => ({ 
          id: e.student_id, 
          nickname: e.students?.nickname || e.students?.full_name || 'Unknown'
        }));

      if (!allStudents.length) {
        container.innerHTML = `<p class="text-slate-400 text-sm text-center py-6">ไม่พบนักเรียนในคอร์สนี้</p>`;
        return;
      }

      // Fetch existing scores
      const { data: scores } = await db
        .from('test_scores')
        .select('student_id, subject, score')
        .eq('course_code', code)
        .eq('test_number', +test);

      currentScores = {};
      (scores || []).forEach(r => {
        if (!currentScores[r.student_id]) currentScores[r.student_id] = {};
        currentScores[r.student_id][r.subject] = r.score;
      });

      renderScoreTable();

    // Render score entry table
    function renderScoreTable() {
      const container = document.getElementById('scoreTableContainer');
      container.innerHTML = '';

      // Header row
      let headerHtml = '<div class="grid gap-2 mb-3" style="grid-template-columns: 150px ' + allSubjects.map(() => '100px').join(' ') + '">';
      headerHtml += '<div class="font-black text-slate-600 text-xs py-2">นักเรียน</div>';
      allSubjects.forEach(subject => {
        const full = fullScores[subject] || 50;
        headerHtml += `<div class="subject-column-header">${subject}<br>(/${full})</div>`;
      });
      headerHtml += '</div>';
      container.innerHTML = headerHtml;

      // Student rows
      allStudents.forEach((student, idx) => {
        let rowHtml = `<div class="score-table-row" style="grid-template-columns: 150px ${allSubjects.map(() => '100px').join(' ')}">`;
        rowHtml += `<div class="student-name-cell">${student.nickname}</div>`;

        allSubjects.forEach((subject, subjIdx) => {
          const scoreVal = currentScores[student.id]?.[subject] || '';
          const full = fullScores[subject] || 50;
          const inputId = `score_${student.id}_${subject}`;
          
          rowHtml += `
            <div class="score-cell">
              <input 
                id="${inputId}" 
                type="text" 
                inputmode="decimal" 
                value="${scoreVal}" 
                placeholder="–" 
                class="score-input text-sm py-2" 
                data-student-id="${student.id}"
                data-subject="${subject}"
                data-full="${full}"
                data-row="${idx}"
                data-col="${subjIdx}"
                onchange="validateScoreInput(this)" 
                onkeydown="handleScoreKeyNavigation(event, this)"
              >
            </div>
          `;
        });
        
        rowHtml += '</div>';
        container.innerHTML += rowHtml;
      });
    }

    // Validate score input
    function validateScoreInput(input) {
      const val = input.value.trim();
      const fullScore = +input.dataset.full;
      
      const sanitized = val.replace(/[^\d.]/g, '');
      if (sanitized !== val) {
        input.value = sanitized;
      }

      input.classList.remove('valid', 'invalid', 'empty');

      if (input.value === '' || input.value === null) {
        input.classList.add('empty');
        return true;
      }

      const numVal = parseFloat(input.value);
      
      if (isNaN(numVal)) {
        input.classList.add('empty');
        return true;
      }

      if (numVal < 0 || numVal > fullScore) {
        input.classList.add('invalid');
        document.getElementById('saveAllBtn').disabled = true;
        return false;
      }

      input.classList.add('valid');
      checkIfAllValid();
      return true;
    }

    function checkIfAllValid() {
      const saveBtn = document.getElementById('saveAllBtn');
      const allInputs = document.querySelectorAll('#scoreTableContainer .score-input');
      let hasInvalid = false;

      allInputs.forEach(input => {
        if (input.classList.contains('invalid')) {
          hasInvalid = true;
        }
      });

      saveBtn.disabled = hasInvalid || isSaving;
    }

    // Excel-like keyboard navigation
    function handleScoreKeyNavigation(e, input) {
      const row = +input.dataset.row;
      const col = +input.dataset.col;
      const allInputs = document.querySelectorAll('#scoreTableContainer .score-input');
      const currentIdx = Array.from(allInputs).indexOf(input);

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const nextInput = document.querySelector(`[data-row="${row + 1}"][data-col="${col}"]`);
        if (nextInput) nextInput.focus();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prevInput = document.querySelector(`[data-row="${row - 1}"][data-col="${col}"]`);
        if (prevInput) prevInput.focus();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        const nextInput = document.querySelector(`[data-row="${row}"][data-col="${col + 1}"]`);
        if (nextInput) nextInput.focus();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        const prevInput = document.querySelector(`[data-row="${row}"][data-col="${col - 1}"]`);
        if (prevInput) prevInput.focus();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const nextInput = document.querySelector(`[data-row="${row + 1}"][data-col="0"]`);
        if (nextInput) nextInput.focus();
        else {
          const firstInput = document.querySelector('[data-row="0"][data-col="0"]');
          if (firstInput) firstInput.focus();
        }
      }
    }

    // Save all scores
    async function saveAllScores() {
      const code = document.getElementById('enterCourse').value;
      const test = document.getElementById('enterTest').value;
      if (!code || !test) return showToast('กรุณาเลือกคอร์สและครั้งที่สอบ', 'error');

      const btn = document.getElementById('saveAllBtn');
      isSaving = true;
      btn.disabled = true;
      btn.textContent = '⏳ กำลังบันทึก...';

      const rows = [];
      allStudents.forEach(student => {
        allSubjects.forEach(subject => {
          const input = document.getElementById(`score_${student.id}_${subject}`);
          const val = input?.value;
          const full = fullScores[subject] || 50;
          const topic = currentTopics[subject] || null;
          
          rows.push({
            course_code: code,
            student_id: student.id,
            test_number: +test,
            subject: subject,
            score: (val === '' || val === null) ? null : parseFloat(val),
            full_score: full,
            topic: topic
            // NOTE: Do NOT include score_percent - it's a generated column in Supabase
          });
        });
      });

      if (!rows.length) {
        showToast('ไม่พบข้อมูลนักเรียน', 'error');
        isSaving = false;
        btn.disabled = false;
        return;
      }

      const { error } = await db.from('test_scores').upsert(rows, { 
        onConflict: 'student_id,course_code,test_number,subject' 
      });
      
      if (!error) {
        btn.classList.add('success');
        btn.textContent = '✅ บันทึกเรียบร้อย!';
        showToast(`✅ บันทึกคะแนนทั้งหมดเรียบร้อย`);
        sessionStorage.removeItem(pendingKey(code));

        await refreshRankings(code);

        setTimeout(() => {
          btn.classList.remove('success');
          btn.textContent = '💾 บันทึกคะแนนทั้งหมด';
          isSaving = false;
          btn.disabled = false;
        }, 2000);
      } else {
        console.error(error);
        showToast('เกิดข้อผิดพลาดในการบันทึก: ' + error.message, 'error');
        isSaving = false;
        btn.disabled = false;
        btn.textContent = '💾 บันทึกคะแนนทั้งหมด';
      }
    }

    // ── Delete test ──────────────────────────────────────────────
    async function deleteTest() {
      const code = document.getElementById('enterCourse').value;

      if (!code || !test) return;

      if (!confirm(`⚠️ ลบการสอบครั้งที่ ${test} ของคอร์สนี้ทั้งหมด?\n\nคะแนนของนักเรียนทุกคนจะถูกลบถาวร`)) return;

      const btn = document.getElementById('delTestBtn');
      btn.disabled = true;
      btn.textContent = '⏳';

      const { error } = await db.from('test_scores')
        .delete()
        .eq('course_code', code)
        .eq('test_number', +test);

      if (error) {
        showToast('ลบไม่สำเร็จ กรุณาลองใหม่', 'error');
        btn.disabled = false;
        btn.textContent = '🗑';
        return;
      }

      showToast(`✅ ลบการสอบครั้งที่ ${test} เรียบร้อย`);

      const testSel = document.getElementById('enterTest');
      const opt = testSel.querySelector(`option[value="${test}"]`);

    // ── View tab: Advanced search with filters ──────────────────────────────────
    async function loadScoreTableView() {
      const code = document.getElementById('viewCourse').value;
      const subject = document.getElementById('viewSubject').value;
      const testNumber = document.getElementById('viewTestNumber').value;
      const studentSearch = document.getElementById('studentSearch').value?.toLowerCase() || '';

      if (!code) {
        showToast('กรุณาเลือกคอร์สก่อน', 'error');
        return;
      }

      const container = document.getElementById('scoreTableView');
      container.innerHTML = '<p class="p-10 text-center loading-dots font-bold text-slate-400">กำลังโหลด</p>';

      // Build query with filters
      let q = db.from('test_scores')
        .select('student_id, test_number, subject, score, full_score, topic, students(id, nickname, full_name)')
        .eq('course_code', code)
        .order('test_number', { ascending: true });
      
      if (subject) q = q.eq('subject', subject);
      if (testNumber) q = q.eq('test_number', +testNumber);
      
      const { data } = await q;

      if (!data || !data.length) {
        container.innerHTML = '<p class="p-10 text-center text-slate-400 font-bold">ไม่มีข้อมูลคะแนน</p>';
        return;
      }

      // Filter by student name if search is provided
      let filteredData = data;
      if (studentSearch) {
        filteredData = data.filter(row => {
          const nickname = row.students?.nickname?.toLowerCase() || '';
          const fullName = row.students?.full_name?.toLowerCase() || '';
          return nickname.includes(studentSearch) || fullName.includes(studentSearch);
        });
      }

      if (!filteredData.length) {
        container.innerHTML = '<p class="p-10 text-center text-slate-400 font-bold">ไม่พบผลการค้นหา</p>';
        return;

      let html = `<table class="w-full text-xs min-w-[700px]">
        <thead class="bg-slate-50 sticky top-0">
          <tr>
            <th class="p-3 text-left font-black text-slate-600">นักเรียน</th>
            <th class="p-3 font-black text-slate-600">ครั้งที่</th>
            <th class="p-3 font-black text-slate-600">วิชา</th>
            <th class="p-3 font-black text-blue-600">คะแนน</th>

      filteredData.forEach(row => {

          ? `<span class="null-score">—</span>/<span class="text-slate-400">${row.full_score}`
          : `${row.score}/<span class="text-slate-400">${row.full_score}</span>`;

        const topic = row.topic ? `<div class="topic-text">📚 ${row.topic}</div>` : '';

        html += `<tr class="border-b border-slate-50 hover:bg-slate-50">
          <td class="p-3 font-bold">${row.students?.nickname || row.students?.full_name || 'Unknown'}</td>
          <td class="p-3 text-center font-black text-indigo-600">${row.test_number}</td>
          <td class="p-3 text-center">${row.subject}</td>
          <td class="p-3 text-center">
            <div class="editable-score cursor-pointer" onclick="enableInlineEdit(this, '${code}', ${row.student_id}, ${row.test_number}, '${row.subject}', ${row.full_score})" title="คลิกเพื่อแก้ไข">
              ${displayScore}
              ${topic}
            </div>
            <input type="number" class="edit-input hidden w-full border-2 border-indigo-600 rounded-lg p-2 text-sm" style="display: none;" value="${row.score || ''}" min="0" max="${row.full_score}">
          </td>
          <td class="p-3 text-center">
            <button onclick="deleteScore('${code}', ${row.student_id}, ${row.test_number}, '${row.subject}')" class="text-red-600 font-bold text-xs hover:underline">🗑 ลบ</button>
          </td>
        </tr>`;
      });

      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    // Enable inline edit in View mode
    function enableInlineEdit(scoreDiv, code, studentId, testNum, subject, fullScore) {
      if (editingCell) {
        editingCell.input.style.display = 'none';
        editingCell.display.style.display = '';
      }

      const inputEl = scoreDiv.nextElementSibling;
      scoreDiv.style.display = 'none';
      inputEl.style.display = 'block';
      inputEl.focus();
      inputEl.select();

      editingCell = { input: inputEl, display: scoreDiv };

      // Save on blur
      inputEl.onblur = async () => {
        const newScore = inputEl.value === '' ? null : parseFloat(inputEl.value);

        if (newScore !== null && (newScore < 0 || newScore > fullScore)) {
          showToast('คะแนนไม่ถูกต้อง', 'error');
          inputEl.style.display = 'none';
          scoreDiv.style.display = '';
          editingCell = null;
          return;
        }

        // Update database (without score_percent as it's a generated column)
        const { error } = await db.from('test_scores')
          .update({ score: newScore })
          .eq('student_id', studentId)
          .eq('course_code', code)
          .eq('test_number', testNum)
          .eq('subject', subject);

        if (!error) {
          showToast('✅ บันทึกสำเร็จ');
          await refreshRankings(code);
          
          // Update local display
          const displayScore = newScore === null 
            ? `<span class="null-score">—</span>/<span class="text-slate-400">${fullScore}</span>`
            : `${newScore}/<span class="text-slate-400">${fullScore}</span>`;
          scoreDiv.innerHTML = displayScore;
        } else {
          showToast('เกิดข้อผิดพลาด', 'error');
        }

        inputEl.style.display = 'none';
        scoreDiv.style.display = '';
        editingCell = null;
      };

      // Cancel on Escape
      inputEl.onkeydown = (e) => {
        if (e.key === 'Enter') inputEl.blur();
        if (e.key === 'Escape') {
          inputEl.style.display = 'none';
          scoreDiv.style.display = '';
          editingCell = null;
        }
      };
    }

    // Delete score
    async function deleteScore(code, studentId, testNum, subject) {
      if (!confirm('ลบคะแนนนี้?')) return;
      
      const { error } = await db.from('test_scores')
        .delete()
        .eq('student_id', studentId)
        .eq('course_code', code)
        .eq('test_number', testNum)
        .eq('subject', subject);

      if (!error) {
        showToast('✅ ลบสำเร็จ');
        refreshRankings(code);
        loadScoreTableView();
      } else {
        showToast('ลบไม่สำเร็จ', 'error');
      }
    }

    // Refresh rankings
    async function refreshRankings(courseCode) {
      const { data: scores } = await db
        .from('test_scores')
        .select('student_id, score, full_score')
        .eq('course_code', courseCode);

      const map = {};
      scores.forEach(s => {
        if (!map[s.student_id]) map[s.student_id] = { sum: 0, count: 0 };
        if (s.score != null && s.full_score > 0) {
          map[s.student_id].sum += (s.score / s.full_score) * 100;
          map[s.student_id].count += 1;
        }
      });

      const rows = Object.entries(map)
        .filter(([_, d]) => d.count > 0)
        .map(([sid, d]) => ({
          course_code: courseCode,
          student_id: +sid,
          total_percent: Math.round((d.sum / d.count) * 100) / 100
        }))
        .sort((a, b) => b.total_percent - a.total_percent)
        .map((r, i) => ({ ...r, rank_number: i + 1 }));

      await db.from('class_rankings').upsert(rows, { onConflict: 'course_code,student_id' });
    }

    init();
