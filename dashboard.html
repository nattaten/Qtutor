<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ด - Qtutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Kanit', sans-serif; }
        body {
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.12), transparent 28rem),
                linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        }
        .app-shell { max-width: 430px; }
        .top-nav {
            background: rgba(248, 250, 252, 0.86);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.9);
        }
        .brand-mark {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
        }
        #userName {
            max-width: 112px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 999px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
            font-size: 12px;
            padding: 8px 12px;
        }
        button[onclick="logout()"] {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid #e2e8f0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
        }
        button[onclick="logout()"] svg {
            width: 20px;
            height: 20px;
        }
        .hero-gradient {
            background: #fff;
            border: 1px solid rgba(226, 232, 240, 0.92);
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.07);
        }
        .course-select {
            appearance: none;
            background-image:
                linear-gradient(45deg, transparent 50%, #64748b 50%),
                linear-gradient(135deg, #64748b 50%, transparent 50%);
            background-position:
                calc(100% - 20px) calc(50% - 3px),
                calc(100% - 14px) calc(50% - 3px);
            background-size: 6px 6px, 6px 6px;
            background-repeat: no-repeat;
        }
        .card-hover {
            min-height: 124px;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            border-color: rgba(14, 165, 233, 0.35);
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.07);
        }
        .card-hover:active { transform: translateY(0) scale(0.99); }
        .card-hover h3 {
            color: #0f172a;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 0;
        }
        .card-hover p {
            color: #64748b;
            font-size: 11px;
            letter-spacing: 0;
            text-transform: none;
        }
        .card-hover > div:first-child {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            margin-bottom: 16px;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Qtutor"> <!-- 👈 เปลี่ยนตรงนี้เรียบร้อยแล้ว -->
    <link rel="apple-touch-icon" href="logo.png">
</head>
<body class="min-h-screen pb-20 text-slate-900">

    <nav class="top-nav sticky top-0 z-50">
        <div class="app-shell mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Qtutor" class="brand-mark">
                <div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tight leading-none">Qtutor</h1>
                    <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-wider">Student Hub</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span id="userName" class="text-sm font-bold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full">👤 -</span>
                <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="app-shell mx-auto px-4">
        <div class="hero-gradient rounded-[24px] mt-5 p-5">
            <div>
                <div class="min-w-0">
                    <p id="greetingLabel" class="text-sky-700 text-sm font-bold"></p>
                    <h2 id="greetingName" class="text-3xl font-black mt-1 leading-tight tracking-tight text-slate-950">...</h2>
                    <p class="text-xs text-slate-500 mt-2 leading-relaxed">เลือกคอร์สก่อนเข้าใช้งานเมนู</p>
                </div>
            </div>
            
            <div class="mt-6">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">เลือกคอร์สเรียน</label>
                <select id="courseSelect" onchange="selectCourse(this.value)" class="course-select w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-2xl px-4 py-3.5 pr-10 outline-none focus:bg-white focus:border-sky-400 focus:ring-4 focus:ring-sky-100 transition-all font-bold shadow-inner">
                    <option value="" class="text-slate-800">-- กำลังโหลดคอร์สของคุณ --</option>
                </select>
            </div>

        </div>

        <div class="mt-8">
            <div class="flex items-center justify-between mb-4 px-1">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">เมนูการเรียน</p>
                <span id="currentCourseLabel" class="text-[10px] text-sky-700 font-bold hidden bg-sky-50 border border-sky-100 px-2.5 py-1 rounded-full">กำลังเรียน: ...</span>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="goTo('score.html')" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 card-hover text-left group">
                    <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-2xl mb-4">📊</div>
                    <h3 class="font-bold text-slate-800 leading-tight">คะแนนรายบุคคล</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Personal Score</p>
                </button>

                <button onclick="goTo('ranking.html')" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 card-hover text-left group">
                    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-2xl mb-4">🏆</div>
                    <h3 class="font-bold text-slate-800 leading-tight">อันดับห้อง</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Class Ranking</p>
                </button>

                <button onclick="goTo('answers.html')" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 card-hover text-left group">
                    <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center text-2xl mb-4">📚</div>
                    <h3 class="font-bold text-slate-800 leading-tight">คลังเฉลย</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Solutions</p>
                </button>

                <button onclick="goTo('videos.html')" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 card-hover text-left group">
                    <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center text-2xl mb-4">📽️</div>
                    <h3 class="font-bold text-slate-800 leading-tight">บทเรียนวิดีโอ</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Video Lessons</p>
                </button>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userData = JSON.parse(sessionStorage.getItem('student_user'));
        let userEnrollments = [];

        async function init() {
            if (!userData) {
                location.href = 'index.html';
                return;
            }

            document.getElementById('userName').textContent = `👤 ${userData.nickname}`;
            updateGreeting(userData.nickname);
            await loadCourses();
        }

        function updateGreeting(name) {
            const hour = new Date().getHours();
            let greeting = 'สวัสดีตอนเช้า';
            if (hour >= 12 && hour < 17) greeting = 'สวัสดีตอนบ่าย';
            else if (hour >= 17) greeting = 'สวัสดีตอนเย็น';
            document.getElementById('greetingLabel').textContent = greeting + ' 👋';
            document.getElementById('greetingName').textContent = `น้อง${name}`;
        }

        async function loadCourses() {
            try {
                // แก้ไข: เพิ่มการดึงสถานะ is_active จากตาราง courses
                const { data, error } = await db
                    .from('enrollments')
                    .select(`
                        course_code, 
                        courses(course_name, is_active)
                    `)
                    .eq('student_id', userData.id);

                if (error) throw error;
                
                // แก้ไข: กรองเฉพาะคอร์สที่กำลังเปิดใช้งาน (is_active === true)
                const activeCourses = (data || []).filter(item => 
                    item.courses && item.courses.is_active === true
                );
                
                userEnrollments = activeCourses; // เก็บเฉพาะคอร์สที่ active ไว้ใช้งานต่อ

                const select = document.getElementById('courseSelect');
                select.innerHTML = '<option value="" class="text-slate-800">-- กรุณาเลือกคอร์สเพื่อเริ่มต้น --</option>';

                if (activeCourses.length === 0) {
                    select.innerHTML = '<option value="" class="text-slate-800">-- ไม่มีคอร์สที่กำลังเปิดเรียน --</option>';
                    return;
                }

                activeCourses.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.course_code;
                    opt.textContent = item.courses.course_name;
                    opt.className = "text-slate-800";
                    
                    // ถ้าใน session มีคอร์สเดิมอยู่แล้ว ให้เลือกไว้อัตโนมัติ
                    if(userData.course_code === item.course_code) opt.selected = true;
                    select.appendChild(opt);
                });

                // ตรวจสอบว่าคอร์สที่เคยเลือกไว้เดิม ยังคง active อยู่หรือไม่
                if (userData.course_code) {
                    const stillActive = activeCourses.find(c => c.course_code === userData.course_code);
                    if (stillActive) {
                        updateCurrentCourseLabel(userData.course_name);
                    } else {
                        // ถ้าคอร์สเดิมที่เคยเลือกไว้โดนปิดไปแล้ว ให้ล้างค่าใน session
                        userData.course_code = null;
                        userData.course_name = null;
                        sessionStorage.setItem('student_user', JSON.stringify(userData));
                        document.getElementById('currentCourseLabel').classList.add('hidden');
                    }
                }

            } catch (err) {
                console.error('Load Error:', err);
            }
        }

        function selectCourse(code) {
            if (!code) return;
            
            const selected = userEnrollments.find(e => e.course_code === code);
            const courseName = selected.courses.course_name;

            // บันทึกค่าลง sessionStorage ทันทีเพื่อให้หน้าอื่นดึงไปใช้ได้
            userData.course_code = code;
            userData.course_name = courseName;
            sessionStorage.setItem('student_user', JSON.stringify(userData));

            updateCurrentCourseLabel(courseName);
            
            // แสดง Feedback เล็กน้อย
            console.log("Selected:", code);
        }

        function updateCurrentCourseLabel(name) {
            const label = document.getElementById('currentCourseLabel');
            label.textContent = `กำลังเรียน: ${name}`;
            label.classList.remove('hidden');
        }

        function goTo(page) { 
            // ตรวจสอบความชัวร์ก่อนไปหน้าอื่น
            const currentData = JSON.parse(sessionStorage.getItem('student_user'));
            if (!currentData || !currentData.course_code) {
                alert('กรุณาเลือกคอร์สเรียนในช่องดรอปดาวน์ด้านบนก่อนครับ');
                return;
            }
            location.href = page; 
        }

        function logout() {
            if (confirm('ยืนยันการออกจากระบบใช่ไหม?')) {
                sessionStorage.clear();
                location.href = 'index.html';
            }
        }

        init();
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Ready!'))
                    .catch(err => console.log('PWA Error', err));
            });
        }
    </script>
</body>
</html>
