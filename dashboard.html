<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ด - Qtutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Kanit', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%); }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.10); }
        .card-hover:active { transform: scale(0.97); }
        .score-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .ranking-gradient { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        .answer-gradient { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
        .video-gradient { background: linear-gradient(135deg, #10b981, #059669); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white/80 backdrop-blur-md shadow-sm px-4 py-3 sticky top-0 z-20 border-b border-slate-100">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-indigo-600 tracking-tight">Qtutor</h1>
            <div class="text-right">
                <p id="userName" class="text-sm font-bold text-slate-800">👤 ...</p>
                <p id="courseName" class="text-xs text-slate-400 mt-0.5">...</p>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <main class="max-w-2xl mx-auto px-4 pb-20">

        <!-- HERO GREETING -->
        <div class="hero-gradient rounded-3xl mt-5 p-6 text-white shadow-xl shadow-indigo-200">
            <p id="greetingLabel" class="text-indigo-200 text-sm font-semibold"></p>
            <h2 id="greetingName" class="text-3xl font-black mt-1">...</h2>
            <p class="text-indigo-200 text-sm mt-1">พร้อมเรียนวันนี้ไหมครับ? 🚀</p>

            <div class="grid grid-cols-3 gap-3 mt-5">
                <div class="bg-white/15 rounded-2xl p-3 text-center">
                    <p class="text-indigo-100 text-xs">เฉลย</p>
                    <p id="lessonCount" class="text-2xl font-black mt-0.5">—</p>
                </div>
                <div class="bg-white/15 rounded-2xl p-3 text-center">
                    <p class="text-indigo-100 text-xs">วิดีโอ</p>
                    <p id="videoCount" class="text-2xl font-black mt-0.5">—</p>
                </div>
                <div class="bg-white/15 rounded-2xl p-3 text-center">
                    <p class="text-indigo-100 text-xs">อันดับ</p>
                    <p id="myRank" class="text-2xl font-black mt-0.5">—</p>
                </div>
            </div>
        </div>

        <!-- SCORE & RANKING (featured) -->
        <div class="grid grid-cols-2 gap-4 mt-5">
            <!-- คะแนนรายบุคคล -->
            <button onclick="goTo('score.html')"
                class="score-gradient card-hover rounded-3xl p-5 text-white text-left shadow-lg shadow-indigo-200 col-span-1">
                <div class="text-3xl mb-3">📊</div>
                <h3 class="font-black text-lg leading-tight">คะแนน<br>รายบุคคล</h3>
                <p class="text-indigo-200 text-xs mt-1">ดูคะแนน + กราฟพัฒนาการ</p>
                <div class="mt-3 bg-white/20 rounded-full px-3 py-1 text-xs font-bold inline-block">ดูเลย →</div>
            </button>

            <!-- อันดับห้อง -->
            <button onclick="goTo('ranking.html')"
                class="ranking-gradient card-hover rounded-3xl p-5 text-white text-left shadow-lg shadow-amber-200 col-span-1">
                <div class="text-3xl mb-3">🏆</div>
                <h3 class="font-black text-lg leading-tight">อันดับ<br>ห้อง</h3>
                <p class="text-amber-100 text-xs mt-1">เปรียบเทียบคะแนนกับเพื่อน</p>
                <div class="mt-3 bg-white/20 rounded-full px-3 py-1 text-xs font-bold inline-block">ดูเลย →</div>
            </button>
        </div>

        <!-- MENU GRID -->
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-6 mb-3 px-1">เมนูหลัก</p>
        <div class="grid grid-cols-2 gap-4">
            <!-- คลังเฉลย -->
            <button onclick="goTo('answers.html')"
                class="bg-white card-hover rounded-3xl p-5 shadow-sm border border-slate-100 text-left group">
                <div class="answer-gradient w-12 h-12 rounded-2xl flex items-center justify-center text-2xl mb-3 shadow-md shadow-cyan-200 group-hover:scale-105 transition-transform">📖</div>
                <h3 class="font-black text-slate-800 text-base">คลังเฉลย</h3>
                <p class="text-xs text-slate-400 mt-0.5">ดูเอกสารที่จดแล้ว</p>
            </button>

            <!-- บทเรียนวิดีโอ -->
            <button onclick="goTo('videos.html')"
                class="bg-white card-hover rounded-3xl p-5 shadow-sm border border-slate-100 text-left group">
                <div class="video-gradient w-12 h-12 rounded-2xl flex items-center justify-center text-2xl mb-3 shadow-md shadow-emerald-200 group-hover:scale-105 transition-transform">🎬</div>
                <h3 class="font-black text-slate-800 text-base">บทเรียนวิดีโอ</h3>
                <p class="text-xs text-slate-400 mt-0.5">วิดีโอเพิ่มเติม</p>
            </button>
        </div>

        <!-- LOGOUT -->
        <button onclick="logout()"
            class="w-full mt-10 text-slate-300 text-xs font-bold py-3 hover:text-red-400 transition-colors tracking-widest uppercase">
            ♦ ออกจากระบบ
        </button>
    </main>

    <script>
        const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const userData = JSON.parse(sessionStorage.getItem('student_user'));

        async function init() {
            if (!userData) return (location.href = 'index.html');

            document.getElementById('userName').textContent = `👤 ${userData.nickname}`;
            document.getElementById('courseName').textContent = userData.course_name;
            updateGreeting(userData.nickname);
            loadStats();
            loadRank();
        }

        function updateGreeting(name) {
            const hour = new Date().getHours();
            let greeting = 'ยินดีต้อนรับ';
            if (hour >= 5 && hour < 12) greeting = 'สวัสดีตอนเช้า';
            else if (hour >= 12 && hour < 17) greeting = 'สวัสดีตอนบ่าย';
            else if (hour >= 17) greeting = 'สวัสดีตอนเย็น';
            document.getElementById('greetingLabel').textContent = greeting + ' 👋';
            document.getElementById('greetingName').textContent = name;
        }

        async function loadStats() {
            const [solutionsRes, videosRes] = await Promise.all([
                db.from('solutions').select('id', { count: 'exact' }).eq('course_code', userData.course_code),
                db.from('videos').select('id', { count: 'exact' }).eq('course_code', userData.course_code),
            ]);
            document.getElementById('lessonCount').textContent = solutionsRes.count ?? 0;
            document.getElementById('videoCount').textContent = videosRes.count ?? 0;
        }

        async function loadRank() {
            const { data } = await db
                .from('class_rankings')
                .select('rank_number')
                .eq('course_code', userData.course_code)
                .eq('student_id', userData.id)
                .single();
            document.getElementById('myRank').textContent = data ? `#${data.rank_number}` : '—';
        }

        function goTo(page) { location.href = page; }

        function logout() {
            if (confirm('ยืนยันการออกจากระบบใช่ไหม?')) {
                sessionStorage.clear();
                location.href = 'index.html';
            }
        }

        init();
    </script>
</body>
</html>
