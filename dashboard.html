<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ด - Qtutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Kanit', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%); }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .card-hover:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-2xl font-black text-indigo-600 tracking-tighter">Qtutor</h1>
            <div class="flex items-center gap-3">
                <span id="userName" class="text-sm font-bold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full">👤 -</span>
                <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4">
        <div class="hero-gradient rounded-3xl mt-5 p-7 text-white shadow-xl shadow-indigo-100">
            <p id="greetingLabel" class="text-indigo-100 text-sm font-semibold opacity-90"></p>
            <h2 id="greetingName" class="text-3xl font-black mt-1 leading-tight">...</h2>
            
            <div class="mt-6">
                <label class="text-[10px] font-bold text-indigo-200 uppercase tracking-widest block mb-1">เลือกคอร์สเรียน</label>
                <select id="courseSelect" onchange="selectCourse(this.value)" class="w-full bg-white/20 border border-white/30 text-white rounded-xl p-3 outline-none focus:bg-white focus:text-slate-800 transition-all font-bold">
                    <option value="" class="text-slate-800">-- กำลังโหลดคอร์สของคุณ --</option>
                </select>
            </div>
        </div>

        <div class="mt-8">
            <div class="flex items-center justify-between mb-4 px-1">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">เมนูการเรียน</p>
                <span id="currentCourseLabel" class="text-[10px] text-indigo-500 font-bold hidden">กำลังเรียน: ...</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="goTo('score.html')" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 card-hover text-left group">
                    <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-2xl mb-4">📊</div>
                    <h3 class="font-bold text-slate-800 leading-tight">คะแนนรายบุคคล</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Personal Score</p>
                </button>

                <button onclick="goTo('ranking.html')" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 card-hover text-left group">
                    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-2xl mb-4">🏆</div>
                    <h3 class="font-bold text-slate-800 leading-tight">อันดับห้อง</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Class Ranking</p>
                </button>

                <button onclick="goTo('answers.html')" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 card-hover text-left group">
                    <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center text-2xl mb-4">📚</div>
                    <h3 class="font-bold text-slate-800 leading-tight">คลังเฉลย</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Solutions</p>
                </button>

                <button onclick="goTo('videos.html')" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 card-hover text-left group">
                    <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center text-2xl mb-4">📽️</div>
                    <h3 class="font-bold text-slate-800 leading-tight">บทเรียนวิดีโอ</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Video Lessons</p>
                </button>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userData = JSON.parse(sessionStorage.getItem('student_user'));
        let userEnrollments = [];

        async function init() {
            if (!userData) {
                location.href = 'index.html';
                return;
            }

            document.getElementById('userName').textContent = `👤 ${userData.nickname}`;
            updateGreeting(userData.nickname);
            await loadCourses();
        }

        function updateGreeting(name) {
            const hour = new Date().getHours();
            let greeting = 'สวัสดีตอนเช้า';
            if (hour >= 12 && hour < 17) greeting = 'สวัสดีตอนบ่าย';
            else if (hour >= 17) greeting = 'สวัสดีตอนเย็น';
            document.getElementById('greetingLabel').textContent = greeting + ' 👋';
            document.getElementById('greetingName').textContent = `น้อง${name}`;
        }

        async function loadCourses() {
            try {
                // แก้ไข: เพิ่มการดึงสถานะ is_active จากตาราง courses
                const { data, error } = await db
                    .from('enrollments')
                    .select(`
                        course_code, 
                        courses(course_name, is_active)
                    `)
                    .eq('student_id', userData.id);

                if (error) throw error;
                
                // แก้ไข: กรองเฉพาะคอร์สที่กำลังเปิดใช้งาน (is_active === true)
                const activeCourses = (data || []).filter(item => 
                    item.courses && item.courses.is_active === true
                );
                
                userEnrollments = activeCourses; // เก็บเฉพาะคอร์สที่ active ไว้ใช้งานต่อ

                const select = document.getElementById('courseSelect');
                select.innerHTML = '<option value="" class="text-slate-800">-- กรุณาเลือกคอร์สเพื่อเริ่มต้น --</option>';

                if (activeCourses.length === 0) {
                    select.innerHTML = '<option value="" class="text-slate-800">-- ไม่มีคอร์สที่กำลังเปิดเรียน --</option>';
                    return;
                }

                activeCourses.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.course_code;
                    opt.textContent = item.courses.course_name;
                    opt.className = "text-slate-800";
                    
                    // ถ้าใน session มีคอร์สเดิมอยู่แล้ว ให้เลือกไว้อัตโนมัติ
                    if(userData.course_code === item.course_code) opt.selected = true;
                    select.appendChild(opt);
                });

                // ตรวจสอบว่าคอร์สที่เคยเลือกไว้เดิม ยังคง active อยู่หรือไม่
                if (userData.course_code) {
                    const stillActive = activeCourses.find(c => c.course_code === userData.course_code);
                    if (stillActive) {
                        updateCurrentCourseLabel(userData.course_name);
                    } else {
                        // ถ้าคอร์สเดิมที่เคยเลือกไว้โดนปิดไปแล้ว ให้ล้างค่าใน session
                        userData.course_code = null;
                        userData.course_name = null;
                        sessionStorage.setItem('student_user', JSON.stringify(userData));
                        document.getElementById('currentCourseLabel').classList.add('hidden');
                    }
                }

            } catch (err) {
                console.error('Load Error:', err);
            }
        }

        function selectCourse(code) {
            if (!code) return;
            
            const selected = userEnrollments.find(e => e.course_code === code);
            const courseName = selected.courses.course_name;

            // บันทึกค่าลง sessionStorage ทันทีเพื่อให้หน้าอื่นดึงไปใช้ได้
            userData.course_code = code;
            userData.course_name = courseName;
            sessionStorage.setItem('student_user', JSON.stringify(userData));

            updateCurrentCourseLabel(courseName);
            
            // แสดง Feedback เล็กน้อย
            console.log("Selected:", code);
        }

        function updateCurrentCourseLabel(name) {
            const label = document.getElementById('currentCourseLabel');
            label.textContent = `กำลังเรียน: ${name}`;
            label.classList.remove('hidden');
        }

        function goTo(page) { 
            // ตรวจสอบความชัวร์ก่อนไปหน้าอื่น
            const currentData = JSON.parse(sessionStorage.getItem('student_user'));
            if (!currentData || !currentData.course_code) {
                alert('กรุณาเลือกคอร์สเรียนในช่องดรอปดาวน์ด้านบนก่อนครับ');
                return;
            }
            location.href = page; 
        }

        function logout() {
            if (confirm('ยืนยันการออกจากระบบใช่ไหม?')) {
                sessionStorage.clear();
                location.href = 'index.html';
            }
        }

        init();
    </script>
</body>
</html>
