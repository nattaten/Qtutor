<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>อันดับห้อง - Qtutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { font-family: 'Kanit', sans-serif; }

    /* test selector strip */
    .test-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding: 4px 2px 8px;
      scrollbar-width: none;
    }
    .test-strip::-webkit-scrollbar { display: none; }
    .test-chip {
      scroll-snap-align: start;
      flex: 0 0 72px;
      height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s;
      border: 2px solid transparent;
      background: #f1f5f9;
      color: #64748b;
      line-height: 1.2;
    }
    .test-chip.active {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
      box-shadow: 0 4px 12px rgba(15,23,42,0.25);
      transform: scale(1.04);
    }
    .test-chip-sub { font-size: 10px; font-weight: 400; opacity: 0.6; }
    .test-chip.active .test-chip-sub { opacity: 0.5; color: #fff; }

    /* hero */
    .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }

    /* row styles */
    .row-gold   { background: linear-gradient(135deg,#fefce8,#fef9c3); border-left: 4px solid #eab308; }
    .row-silver { background: linear-gradient(135deg,#f8fafc,#f1f5f9); border-left: 4px solid #94a3b8; }
    .row-bronze { background: linear-gradient(135deg,#fff7ed,#ffedd5); border-left: 4px solid #f97316; }
    .row-me     { background: linear-gradient(135deg,#eff6ff,#dbeafe); border-left: 4px solid #3b82f6; }
    .row-normal { background: #fff; border-left: 4px solid transparent; }

    .pill-sci  { background: #d1fae5; color: #065f46; }
    .pill-math { background: #dbeafe; color: #1e40af; }
    .pill-eng  { background: #ede9fe; color: #5b21b6; }
    .pill-total { background: #0f172a; color: #fff; }

    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-white/90 backdrop-blur-md shadow-sm px-4 py-3 sticky top-0 z-20 border-b border-slate-100">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="location.href='dashboard.html'" class="text-slate-400 hover:text-slate-700 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div>
          <h1 class="text-lg font-black text-slate-800 leading-tight">🏆 อันดับห้อง</h1>
          <p id="courseName" class="text-xs text-slate-400"></p>
        </div>
      </div>
      <button onclick="saveImage()" class="no-print bg-slate-800 hover:bg-slate-900 active:scale-95 text-white font-bold text-sm px-4 py-2 rounded-2xl shadow transition-all flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        บันทึกรูป
      </button>
    </div>
  </nav>

  <!-- TEST SELECTOR -->
  <div class="bg-white border-b border-slate-100 px-4 pt-3 pb-1 sticky top-[60px] z-10">
    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">เลือกครั้งที่ test</p>
    <div id="testStrip" class="test-strip"></div>
  </div>

  <!-- MAIN -->
  <div id="mainContent" class="max-w-2xl mx-auto px-4 py-4 pb-20 space-y-4">

    <!-- HERO MY RANK -->
    <div class="hero-gradient rounded-3xl p-5 text-white shadow-xl shadow-indigo-200">
      <p class="text-indigo-200 text-xs font-semibold uppercase tracking-widest">อันดับของคุณ</p>
      <div class="flex items-end justify-between mt-1">
        <div>
          <p id="heroRank" class="text-5xl font-black leading-none">#—</p>
          <p id="heroOf" class="text-indigo-200 text-sm mt-1">จาก — คน</p>
        </div>
        <div class="text-right space-y-1">
          <div class="flex gap-2 justify-end">
            <span class="bg-white/20 text-white text-xs font-bold px-2.5 py-1 rounded-xl">วิทย์ <span id="heroSci">—</span></span>
            <span class="bg-white/20 text-white text-xs font-bold px-2.5 py-1 rounded-xl">คณิต <span id="heroMath">—</span></span>
          </div>
          <div class="flex gap-2 justify-end">
            <span class="bg-white/20 text-white text-xs font-bold px-2.5 py-1 rounded-xl">อังกฤษ <span id="heroEng">—</span></span>
            <span class="bg-white/10 border border-white/40 text-white text-xs font-bold px-2.5 py-1 rounded-xl">รวม <span id="heroTotal">—</span></span>
          </div>
        </div>
      </div>
      <div class="mt-3 bg-white/20 rounded-full h-2 overflow-hidden">
        <div id="heroBar" class="h-full rounded-full bg-white/70 transition-all duration-700" style="width:0%"></div>
      </div>
      <p id="heroGap" class="text-indigo-200 text-xs mt-1.5"></p>
    </div>

    <!-- NOTE -->
    <div class="bg-blue-50 border border-blue-100 rounded-2xl px-4 py-2.5 flex items-center gap-3">
      <span>ℹ️</span>
      <p class="text-xs text-blue-700">ชื่อเพื่อนถูกซ่อนไว้ คุณจะเห็นแค่ <strong>อันดับ</strong> และ <strong>คะแนน</strong> ของแต่ละคน</p>
    </div>

    <!-- COLUMN HEADER -->
    <div class="grid grid-cols-[36px_1fr_52px_52px_52px_58px] gap-1 px-3 pb-1 text-xs font-bold text-slate-400 uppercase tracking-wider">
      <div>#</div>
      <div>ชื่อ</div>
      <div class="text-center">วิทย์</div>
      <div class="text-center">คณิต</div>
      <div class="text-center">อังกฤษ</div>
      <div class="text-center">รวม%</div>
    </div>

    <!-- RANKING LIST -->
    <div id="rankingList" class="space-y-2">
      <div class="text-center py-10 text-slate-400 animate-pulse bg-white rounded-3xl text-sm">กำลังโหลด...</div>
    </div>

    <!-- CLASS AVG -->
    <div class="bg-white rounded-3xl p-4 shadow-sm border border-slate-100">
      <p class="text-xs font-black text-slate-500 uppercase tracking-widest mb-3">📊 ค่าเฉลี่ยห้อง</p>
      <div class="grid grid-cols-4 gap-2 text-center">
        <div class="bg-slate-800 rounded-2xl p-3">
          <p class="text-xs text-slate-300">รวม</p>
          <p id="avgTotal" class="text-lg font-black text-white">—</p>
        </div>
        <div class="bg-emerald-50 rounded-2xl p-3">
          <p class="text-xs text-emerald-600">วิทย์</p>
          <p id="avgSci" class="text-lg font-black text-emerald-700">—</p>
        </div>
        <div class="bg-blue-50 rounded-2xl p-3">
          <p class="text-xs text-blue-600">คณิต</p>
          <p id="avgMath" class="text-lg font-black text-blue-700">—</p>
        </div>
        <div class="bg-violet-50 rounded-2xl p-3">
          <p class="text-xs text-violet-600">อังกฤษ</p>
          <p id="avgEng" class="text-lg font-black text-violet-700">—</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allScores = [];
    let myId = null;
    let courseCode = null;
    let activeTest = 0; // 0 = รวมทุกครั้ง

    async function init() {
      const userData = JSON.parse(sessionStorage.getItem('student_user'));
      if (!userData) return (location.href = 'index.html');
      myId = +userData.id;
      courseCode = userData.course_code;
      document.getElementById('courseName').textContent = userData.course_name;

      const { data } = await db
        .from('test_scores')
        .select('student_id, test_number, subject, score, full_score')
        .eq('course_code', courseCode);

      allScores = data || [];
      buildTestStrip();
      render();
    }

    function buildTestStrip() {
      const tests = [...new Set(allScores.map(s => s.test_number))].sort((a, b) => a - b);
      const strip = document.getElementById('testStrip');

      const allChip = makeChip(0, 'ทุกครั้ง', '', true);
      strip.appendChild(allChip);

      tests.forEach(t => {
        strip.appendChild(makeChip(t, `ครั้งที่`, t, false));
      });
    }

    function makeChip(val, label, sub, active) {
      const btn = document.createElement('button');
      btn.className = 'test-chip' + (active ? ' active' : '');
      btn.dataset.val = val;
      btn.innerHTML = `<span>${label}</span>${sub !== '' ? `<span class="test-chip-sub">${sub}</span>` : ''}`;
      btn.addEventListener('click', () => selectTest(val, btn));
      return btn;
    }

    function selectTest(val, clickedBtn) {
      activeTest = val;
      document.querySelectorAll('.test-chip').forEach(b => b.classList.remove('active'));
      clickedBtn.classList.add('active');
      // scroll the chip into view smoothly
      clickedBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      render();
    }

    // รวมคะแนนของนักเรียนแต่ละคนตาม test filter
    function computeRows() {
      let filtered = activeTest === 0
        ? allScores
        : allScores.filter(s => s.test_number === activeTest);

      // group by student_id
      const map = {};
      filtered.forEach(s => {
        const sid = +s.student_id;
        if (!map[sid]) map[sid] = { sci: 0, sciF: 0, math: 0, mathF: 0, eng: 0, engF: 0 };
        if (s.subject === 'วิทย์')  { map[sid].sci  += +s.score; map[sid].sciF  += +s.full_score; }
        if (s.subject === 'คณิต')  { map[sid].math += +s.score; map[sid].mathF += +s.full_score; }
        if (s.subject === 'อังกฤษ') { map[sid].eng  += +s.score; map[sid].engF  += +s.full_score; }
      });

      const rows = Object.entries(map).map(([sid, d]) => {
        const totalScore = d.sci + d.math + d.eng;
        const totalFull  = d.sciF + d.mathF + d.engF;
        const totalPct   = totalFull > 0 ? (totalScore / totalFull) * 100 : 0;
        return {
          student_id: +sid,
          sci:  d.sciF  > 0 ? d.sci  : null,
          sciF: d.sciF,
          math: d.mathF > 0 ? d.math : null,
          mathF: d.mathF,
          eng:  d.engF  > 0 ? d.eng  : null,
          engF: d.engF,
          totalPct,
          totalScore,
          totalFull,
        };
      }).sort((a, b) => b.totalPct - a.totalPct);

      rows.forEach((r, i) => r.rank = i + 1);
      return rows;
    }

    function fmt(score, full) {
      if (score === null || full === 0) return '—';
      return score + '<span class="text-slate-400 text-[10px">/' + full + '</span>';
    }

    function render() {
      const rows = computeRows();
      renderHero(rows);
      renderList(rows);
      renderAvg(rows);
    }

    function renderHero(rows) {
      const me = rows.find(r => r.student_id === myId);
      if (!me) {
        document.getElementById('heroRank').textContent = '#—';
        document.getElementById('heroOf').textContent   = `จาก ${rows.length} คน`;
        ['heroSci','heroMath','heroEng','heroTotal'].forEach(id => document.getElementById(id).textContent = '—');
        document.getElementById('heroBar').style.width = '0%';
        document.getElementById('heroGap').textContent = '';
        return;
      }
      document.getElementById('heroRank').textContent  = `#${me.rank}`;
      document.getElementById('heroOf').textContent    = `จาก ${rows.length} คน`;
      document.getElementById('heroSci').textContent   = me.sci  !== null ? me.sci  : '—';
      document.getElementById('heroMath').textContent  = me.math !== null ? me.math : '—';
      document.getElementById('heroEng').textContent   = me.eng  !== null ? me.eng  : '—';
      document.getElementById('heroTotal').textContent = `${me.totalPct.toFixed(1)}%`;
      document.getElementById('heroBar').style.width   = `${Math.min(100, me.totalPct)}%`;

      const above = rows[me.rank - 2];
      document.getElementById('heroGap').textContent = above
        ? `เพิ่มอีก ${(above.totalPct - me.totalPct).toFixed(1)}% ขึ้นอันดับ #${above.rank}`
        : me.rank === 1 ? '🥇 อันดับ 1 ของห้อง!' : '';
    }

    function renderList(rows) {
      const list = document.getElementById('rankingList');
      if (!rows.length) {
        list.innerHTML = '<p class="text-center text-slate-400 py-8 bg-white rounded-3xl text-sm">ยังไม่มีข้อมูล</p>';
        return;
      }

      list.innerHTML = rows.map(r => {
        const isMe = r.student_id === myId;
        let rowCls = r.rank === 1 ? 'row-gold' : r.rank === 2 ? 'row-silver' : r.rank === 3 ? 'row-bronze' : 'row-normal';
        if (isMe) rowCls = 'row-me';
        const emoji = r.rank === 1 ? '🥇' : r.rank === 2 ? '🥈' : r.rank === 3 ? '🥉' : '';
        const rankLabel = emoji || `<span class="text-xs font-black text-slate-500">#${r.rank}</span>`;
        const name = isMe ? '<span class="text-blue-600 font-black">⭐ คุณ</span>' : '<span class="text-slate-700">นักเรียน</span>';

        const sciTxt  = r.sci  !== null ? `<span class="font-black">${r.sci}</span><span class="text-slate-400 text-[10px]">/${r.sciF}</span>`  : '<span class="text-slate-300">—</span>';
        const mathTxt = r.math !== null ? `<span class="font-black">${r.math}</span><span class="text-slate-400 text-[10px]">/${r.mathF}</span>` : '<span class="text-slate-300">—</span>';
        const engTxt  = r.eng  !== null ? `<span class="font-black">${r.eng}</span><span class="text-slate-400 text-[10px]">/${r.engF}</span>`  : '<span class="text-slate-300">—</span>';
        const pctTxt  = `<span class="font-black ${isMe ? 'text-blue-600' : 'text-slate-800'}">${r.totalPct.toFixed(1)}%</span>`;

        return `
          <div class="${rowCls} rounded-2xl px-3 py-3 grid grid-cols-[36px_1fr_52px_52px_52px_58px] gap-1 items-center">
            <div class="text-center text-base leading-none">${rankLabel}</div>
            <div class="text-sm leading-tight">${name}</div>
            <div class="text-center text-sm leading-none">${sciTxt}</div>
            <div class="text-center text-sm leading-none">${mathTxt}</div>
            <div class="text-center text-sm leading-none">${engTxt}</div>
            <div class="text-center text-sm leading-none">${pctTxt}</div>
          </div>`;
      }).join('');
    }

    function renderAvg(rows) {
      if (!rows.length) return;
      const n = rows.length;
      const sciPct  = rows.filter(r => r.sciF > 0).map(r => r.sci / r.sciF * 100);
      const mathPct = rows.filter(r => r.mathF > 0).map(r => r.math / r.mathF * 100);
      const engPct  = rows.filter(r => r.engF > 0).map(r => r.eng / r.engF * 100);
      const avg = arr => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1) + '%' : '—';

      document.getElementById('avgSci').textContent   = avg(sciPct);
      document.getElementById('avgMath').textContent  = avg(mathPct);
      document.getElementById('avgEng').textContent   = avg(engPct);

      const allPct = rows.map(r => r.totalPct);
      document.getElementById('avgTotal').textContent = avg(allPct);
    }

    async function saveImage() {
      const btn = event.target.closest('button');
      const orig = btn.innerHTML;
      btn.textContent = '⏳ กำลังบันทึก...';
      btn.disabled = true;
      try {
        const canvas = await html2canvas(document.getElementById('mainContent'), {
          scale: 2, useCORS: true, backgroundColor: '#f8fafc',
          ignoreElements: el => el.classList.contains('no-print')
        });
        const label = activeTest === 0 ? 'ทุกครั้ง' : `ครั้งที่${activeTest}`;
        const link = document.createElement('a');
        link.download = `ranking-${label}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) { alert('บันทึกไม่สำเร็จ: ' + e.message); }
      btn.innerHTML = orig;
      btn.disabled = false;
    }

    init();
  </script>
</body>
</html>
