<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>อันดับห้อง - Qtutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #f8fafc; }

    .test-strip { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 4px 0 8px; scrollbar-width: none; }
    .test-strip::-webkit-scrollbar { display: none; }
    .test-chip {
      flex: 0 0 auto; min-width: 52px; height: 46px; border-radius: 12px;
      font-weight: 900; font-size: 14px; cursor: pointer; transition: all 0.18s;
      background: #334155; color: #cbd5e1; border: 2px solid transparent;
      display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.2;
    }
    .test-chip.active { background: #fff; color: #0f172a; border-color: #fff; transform: scale(1.06); box-shadow: 0 4px 14px rgba(0,0,0,0.25); }
    .test-chip-sub { font-size: 9px; font-weight: 400; opacity: 0.6; }

    .avg-card { background: #fff; border-radius: 20px; padding: 14px 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

    .row-gold   { background: linear-gradient(135deg,#fefce8,#fef9c3); border-left: 4px solid #eab308; }
    .row-silver { background: linear-gradient(135deg,#f8fafc,#f1f5f9); border-left: 4px solid #94a3b8; }
    .row-bronze { background: linear-gradient(135deg,#fff7ed,#ffedd5); border-left: 4px solid #f97316; }
    .row-me     { background: linear-gradient(135deg,#eff6ff,#dbeafe); border-left: 4px solid #3b82f6; }
    .row-normal { background: #fff; border-left: 4px solid transparent; }

    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body class="min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-white/90 backdrop-blur-md shadow-sm px-4 py-3 sticky top-0 z-30 border-b border-slate-100 no-print">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="location.href='dashboard.html'" class="text-slate-400 hover:text-slate-700 p-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div>
          <h1 class="text-base font-black text-slate-800 leading-tight">🏆 อันดับห้อง</h1>
          <p id="navCourse" class="text-xs text-slate-400"></p>
        </div>
      </div>
      <button onclick="saveImage()" class="no-print bg-slate-800 active:scale-95 text-white font-bold text-xs px-3 py-2 rounded-xl flex items-center gap-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        บันทึกรูป
      </button>
    </div>
  </nav>

  <!-- EXPORT CONTENT -->
  <div id="exportContent" class="max-w-3xl mx-auto px-4 py-4 pb-20 space-y-5">

    <!-- HERO (dark) -->
    <div class="bg-[#0f172a] rounded-[2rem] p-5 md:p-7 text-white shadow-xl">
      <div class="flex items-center gap-4 mb-5">
        <div class="bg-yellow-400 w-12 h-12 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-yellow-400/30 flex-shrink-0">🏆</div>
        <div>
          <h2 id="heroTitle" class="text-2xl md:text-3xl font-black italic leading-tight">Dashboard</h2>
          <p id="heroCourse" class="text-indigo-400 font-bold uppercase tracking-widest text-xs mt-0.5"></p>
        </div>
      </div>
      <div>
        <p class="text-[10px] text-slate-400 uppercase font-black mb-2 tracking-widest">เลือกครั้งที่สอบ</p>
        <div id="testStrip" class="test-strip"></div>
      </div>
    </div>

    <!-- TOPICS AREA -->
    <div id="topicsArea"></div>

    <!-- AVG CARDS -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="avg-card border-b-4 border-slate-800">
        <p class="text-[10px] font-black text-slate-400 uppercase">รวม</p>
        <p id="avgTotal" class="text-2xl font-black text-slate-800">—</p>
      </div>
      <div class="avg-card border-b-4 border-emerald-500">
        <p class="text-[10px] font-black text-emerald-600 uppercase">วิทย์</p>
        <p id="avgSci" class="text-2xl font-black text-emerald-700">—</p>
      </div>
      <div class="avg-card border-b-4 border-blue-500">
        <p class="text-[10px] font-black text-blue-600 uppercase">คณิต</p>
        <p id="avgMath" class="text-2xl font-black text-blue-700">—</p>
      </div>
      <div class="avg-card border-b-4 border-purple-500">
        <p class="text-[10px] font-black text-purple-600 uppercase">อังกฤษ</p>
        <p id="avgEng" class="text-2xl font-black text-purple-700">—</p>
      </div>
    </div>

    <!-- RANKING TABLE -->
    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
      <div class="overflow-x-auto">
        <div style="min-width:560px;">
          <div class="grid grid-cols-[64px_1fr_72px_72px_72px_80px] gap-2 px-5 py-4 bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-wider">
            <span>Rank</span><span>Student</span>
            <span class="text-center">Sci %</span>
            <span class="text-center">Math %</span>
            <span class="text-center">Eng %</span>
            <span class="text-right">Total %</span>
          </div>
          <div id="rankingList" class="divide-y divide-slate-50">
            <p class="text-center py-8 text-slate-400 text-sm animate-pulse">กำลังโหลด...</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allScores = [];
    let students  = [];
    let myId      = null;
    let activeTest = 0;

    // ─── Init ──────────────────────────────────────────────────
    async function init() {
      const userData = JSON.parse(sessionStorage.getItem('student_user'));
      if (!userData) return (location.href = 'index.html');

      myId = +userData.id;
      document.getElementById('navCourse').textContent  = userData.course_name;
      document.getElementById('heroCourse').textContent = userData.course_name;

      const [sRes, scRes] = await Promise.all([
        db.from('students').select('id, nickname').eq('course_code', userData.course_code).order('nickname'),
        db.from('test_scores').select('student_id, test_number, subject, score, full_score, topic').eq('course_code', userData.course_code),
      ]);
      students  = sRes.data  || [];
      allScores = scRes.data || [];

      buildTestStrip();
      render();
    }

    // ─── Test strip ────────────────────────────────────────────
    function buildTestStrip() {
      const tests = [...new Set(allScores.map(s => s.test_number))].sort((a, b) => a - b);
      const strip = document.getElementById('testStrip');
      strip.innerHTML = '';

      const allChip = document.createElement('button');
      allChip.className = 'test-chip active';
      allChip.innerHTML = 'รวม';
      allChip.addEventListener('click', () => selectTest(0, allChip));
      strip.appendChild(allChip);

      tests.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'test-chip';
        btn.innerHTML = `<span>${t}</span>`;
        btn.addEventListener('click', () => selectTest(t, btn));
        strip.appendChild(btn);
      });
    }

    function selectTest(val, btn) {
      activeTest = val;
      document.querySelectorAll('.test-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      render();
    }

    // ─── Render all ────────────────────────────────────────────
    function render() {
      const label = activeTest === 0 ? 'Dashboard' : `Test #${activeTest}`;
      document.getElementById('heroTitle').textContent = label;

      const filtered = activeTest === 0 ? allScores : allScores.filter(s => s.test_number === activeTest);

      renderTopics(filtered);
      renderRanking(filtered);
    }

    // ─── Topics area ───────────────────────────────────────────
    function renderTopics(filtered) {
      const area = document.getElementById('topicsArea');
      const subjects = ['วิทย์', 'คณิต', 'อังกฤษ'];

      if (activeTest !== 0) {
        // Single test: show one topic per subject
        const topicMap = {};
        filtered.forEach(r => { if (r.topic && !topicMap[r.subject]) topicMap[r.subject] = r.topic; });
        const cols = subjects.map(sub => `
          <div>
            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">${sub === 'อังกฤษ' ? 'อังกฤษ' : sub}</p>
            <p class="text-sm font-bold text-slate-700">${topicMap[sub] || '-'}</p>
          </div>`).join('');
        area.innerHTML = `
          <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <p class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">📚 เนื้อหาที่สอบครั้งที่ ${activeTest}</p>
            <div class="grid grid-cols-3 gap-4">${cols}</div>
          </div>`;
      } else {
        // All tests: show numbered list of topics per subject
        const topicsBySubject = {};
        subjects.forEach(s => {
          const rows = allScores.filter(r => r.subject === s && r.topic);
          const unique = [];
          const seen = new Set();
          rows.sort((a, b) => a.test_number - b.test_number).forEach(r => {
            if (!seen.has(r.topic)) { seen.add(r.topic); unique.push(r.topic); }
          });
          topicsBySubject[s] = unique;
        });

        const cols = subjects.map(sub => {
          const items = topicsBySubject[sub];
          const colorMap = { 'วิทย์': '#6366f1', 'คณิต': '#6366f1', 'อังกฤษ': '#6366f1' };
          return `
            <div class="space-y-2">
              <p class="text-xs font-black text-white flex items-center gap-2">
                <span class="w-1 h-4 bg-indigo-500 rounded-full"></span>${sub}
              </p>
              <div class="bg-slate-800/60 rounded-2xl p-3 border border-slate-700/40 min-h-[60px]">
                ${items.length > 0
                  ? items.map((t, i) => `<p class="text-[11px] text-slate-300 leading-relaxed mb-1 font-medium">${i + 1}. ${t}</p>`).join('')
                  : '<p class="text-[11px] text-slate-500 italic">ยังไม่มีข้อมูลเนื้อหา</p>'}
              </div>
            </div>`;
        }).join('');

        area.innerHTML = `
          <div class="bg-slate-900 rounded-[2rem] p-5 shadow-xl">
            <p class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">📚 ภาพรวมเนื้อหาการสอบทั้งหมด</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">${cols}</div>
          </div>`;
      }
    }

    // ─── Ranking ───────────────────────────────────────────────
    function renderRanking(filtered) {
      const map = {};
      filtered.forEach(s => {
        const sid = +s.student_id;
        if (!map[sid]) map[sid] = { sci:0, sciF:0, math:0, mathF:0, eng:0, engF:0 };
        if (s.subject === 'วิทย์')   { map[sid].sci  += +s.score; map[sid].sciF  += +s.full_score; }
        if (s.subject === 'คณิต')   { map[sid].math += +s.score; map[sid].mathF += +s.full_score; }
        if (s.subject === 'อังกฤษ') { map[sid].eng  += +s.score; map[sid].engF  += +s.full_score; }
      });

      const rows = Object.entries(map).map(([sid, d]) => {
        const tS = d.sci + d.math + d.eng;
        const tF = d.sciF + d.mathF + d.engF;
        const getPct = (score, full) => full > 0 ? (score / full * 100).toFixed(1) : null;
        return {
          student_id: +sid,
          nickname: students.find(s => s.id === +sid)?.nickname || '—',
          sci:  d.sciF  > 0 ? getPct(d.sci,  d.sciF)  : null,
          math: d.mathF > 0 ? getPct(d.math, d.mathF) : null,
          eng:  d.engF  > 0 ? getPct(d.eng,  d.engF)  : null,
          pct: tF > 0 ? (tS / tF * 100) : 0,
        };
      }).sort((a, b) => b.pct - a.pct);

      // Avg
      const avg = arr => arr.length ? (arr.reduce((a, b) => +a + +b, 0) / arr.length).toFixed(1) + '%' : '—';
      document.getElementById('avgTotal').textContent = avg(rows.map(r => r.pct));
      document.getElementById('avgSci').textContent   = avg(rows.map(r => r.sci).filter(Boolean));
      document.getElementById('avgMath').textContent  = avg(rows.map(r => r.math).filter(Boolean));
      document.getElementById('avgEng').textContent   = avg(rows.map(r => r.eng).filter(Boolean));

      // List
      document.getElementById('rankingList').innerHTML = rows.map((r, i) => {
        const rank = i + 1;
        const isMe = r.student_id === myId;
        const emoji = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
        // Show name only for self, hide others
        const nameCell = isMe
          ? `<span class="font-black text-blue-600 text-sm">⭐ ${r.nickname}</span>`
          : `<span class="text-slate-400 text-sm font-bold">นักเรียน</span>`;
        const fmt = v => v !== null ? `<span class="font-bold text-slate-700">${v}</span>` : '<span class="text-slate-300">—</span>';
        const rowCls = rank === 1 ? 'bg-yellow-50/60' : isMe ? 'bg-blue-50/60' : '';
        return `
        <div class="grid grid-cols-[64px_1fr_72px_72px_72px_80px] gap-2 px-5 py-3 items-center ${rowCls}">
          <div class="font-black text-slate-400 text-sm">${emoji || '#' + rank}</div>
          <div>${nameCell}</div>
          <div class="text-center text-xs">${fmt(r.sci)}</div>
          <div class="text-center text-xs">${fmt(r.math)}</div>
          <div class="text-center text-xs">${fmt(r.eng)}</div>
          <div class="text-right font-black text-sm ${isMe ? 'text-blue-600' : 'text-indigo-600'}">${r.pct.toFixed(1)}%</div>
        </div>`;
      }).join('');
    }

    // ─── Save image ────────────────────────────────────────────
    async function saveImage() {
      const btn = event.target.closest('button');
      const orig = btn.innerHTML;
      btn.textContent = '⏳...';
      btn.disabled = true;
      try {
        const canvas = await html2canvas(document.getElementById('exportContent'), {
          scale: 2, useCORS: true, backgroundColor: '#f8fafc',
          ignoreElements: el => el.classList.contains('no-print'),
        });
        const link = document.createElement('a');
        link.download = `อันดับห้อง-${activeTest === 0 ? 'รวม' : 'ครั้งที่' + activeTest}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) { alert('บันทึกไม่สำเร็จ: ' + e.message); }
      btn.innerHTML = orig;
      btn.disabled = false;
    }

    init();
  </script>
</body>
</html>
