<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนวิดีโอ - Qtutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .content-hidden { display: none; }
        .rotate-icon { transform: rotate(180deg); }
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); }
        .modal-content { position: relative; margin: auto; top: 15%; width: 95%; max-width: 700px; aspect-ratio: 16/9; }
        .close-modal { position: absolute; top: -45px; right: 0; color: white; font-size: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 font-['Kanit'] min-h-screen">

    <div class="bg-white shadow-sm p-4 sticky top-0 z-20">
        <div class="max-w-md mx-auto flex items-center">
            <button onclick="location.href='dashboard.html'" class="mr-4 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h1 class="text-xl font-bold text-slate-800">บทเรียนวิดีโอ</h1>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4 pb-20">
        <div id="videoContent" class="space-y-3">
            <div class="text-center py-10">
                <p class="text-slate-400 animate-pulse">กำลังโหลดบทเรียน...</p>
            </div>
        </div>
    </main>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeVideo()">✕ ปิดหน้าต่าง</span>
            <iframe id="youtubePlayer" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen class="rounded-xl shadow-2xl"></iframe>
        </div>
    </div>

    <script>
      const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0'; // คีย์ของคุณ
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // ฟังก์ชันกำหนดสีตามวิชา
      function getSubjectColor(subject) {
          if (subject.includes('คณิต')) return { bg: 'bg-blue-600', light: 'bg-blue-50', text: 'text-blue-600', border: 'border-blue-100' };
          if (subject.includes('วิทย์')) return { bg: 'bg-green-600', light: 'bg-green-50', text: 'text-green-600', border: 'border-green-100' };
          if (subject.includes('อังกฤษ')) return { bg: 'bg-pink-500', light: 'bg-pink-50', text: 'text-pink-600', border: 'border-pink-100' };
          return { bg: 'bg-slate-600', light: 'bg-slate-50', text: 'text-slate-600', border: 'border-slate-100' };
      }

      async function init() {
          // 1. ดึงข้อมูลผู้ใช้จาก sessionStorage
          const user = JSON.parse(sessionStorage.getItem('student_user'));
          
          // 2. ถ้าไม่มีข้อมูล (ยังไม่ Login) ให้เด้งไปหน้าแรก
          if (!user) return window.location.href = 'index.html';

          // 3. ดึงข้อมูลวิดีโอ โดยกรองตาม course_code (ระบบปี 2569)
          const { data, error } = await db
              .from('videos')
              .select('*')
              .eq('course_code', user.course_code) // เปลี่ยนจาก level เป็น course_code
              .order('subject', { ascending: true })
              .order('order_number', { ascending: true });

          if (error) {
              console.error("Error fetching videos:", error);
              document.getElementById('videoContent').innerHTML = `<p class="text-center text-red-400 mt-10">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>`;
              return;
          }

          renderVideos(data);
      }

      // --- ฟังก์ชันควบคุม UI (เหมือนเดิมแต่ปรับปรุงความลื่นไหล) ---

      function toggleSubject(id) {
          const content = document.getElementById(`subject-${id}`);
          const icon = document.getElementById(`icon-${id}`);
          if (content.style.display === "block") {
              content.style.display = "none";
              icon.classList.remove('rotate-icon');
          } else {
              content.style.display = "block";
              icon.classList.add('rotate-icon');
          }
      }

      function playVideo(url) {
          let videoId = "";
          if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
          else if (url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
          else videoId = url;

          document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
          document.getElementById('videoModal').style.display = "block";
          document.body.style.overflow = 'hidden'; // ล็อคหน้าจอไม่ให้สกรูลขณะดูวิดีโอ
      }

      function closeVideo() {
          document.getElementById('videoModal').style.display = "none";
          document.getElementById('youtubePlayer').src = "";
          document.body.style.overflow = 'auto';
      }

      function renderVideos(data) {
          const container = document.getElementById('videoContent');
          if (!data || data.length === 0) {
              container.innerHTML = `<p class="text-center text-slate-400 mt-10">ยังไม่มีบทเรียนในคอร์สนี้</p>`;
              return;
          }
          container.innerHTML = '';

          // จัดกลุ่มตามวิชา
          const groupedBySubject = data.reduce((acc, curr) => {
              const subj = curr.subject || 'ทั่วไป';
              if (!acc[subj]) acc[subj] = [];
              acc[subj].push(curr);
              return acc;
          }, {});

          let index = 0;
          for (const subject in groupedBySubject) {
              index++;
              const color = getSubjectColor(subject);
              let subjectHTML = `
                  <div class="border border-slate-200 rounded-3xl overflow-hidden bg-white shadow-sm mb-3">
                      <button onclick="toggleSubject(${index})" class="w-full flex justify-between items-center p-5 hover:bg-slate-50 transition-all">
                          <div class="flex items-center">
                              <div class="w-2 h-6 ${color.bg} rounded-full mr-3"></div>
                              <span class="text-lg font-bold text-slate-800">${subject}</span>
                          </div>
                          <svg id="icon-${index}" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                          </svg>
                      </button>
                      <div id="subject-${index}" style="display: none;" class="px-4 pb-5 space-y-3">
                          <div class="h-[1px] bg-slate-100 mb-2 mx-2"></div>
              `;

              groupedBySubject[subject].forEach(item => {
                  subjectHTML += `
                      <div class="p-4 rounded-2xl border ${color.border} ${color.light}">
                          <p class="text-slate-800 font-bold mb-3 text-sm">${item.title}</p>
                          <div class="flex gap-2">
                              ${item.video_url ? `
                                  <button onclick="playVideo('${item.video_url}')" class="flex-1 bg-white ${color.text} py-2.5 rounded-xl text-xs font-black shadow-sm border border-white hover:bg-white/50 active:scale-95 transition-all">
                                      🎬 ดูวิดีโอ
                                  </button>
                              ` : ''}
                              ${item.pdf_url ? `
                                  <button onclick="window.open('${item.pdf_url}', '_blank')" class="flex-1 ${color.bg} text-white py-2.5 rounded-xl text-xs font-black shadow-md active:scale-95 transition-all">
                                      📄 ดาวน์โหลดชีท
                                  </button>
                              ` : ''}
                          </div>
                      </div>
                  `;
              });

              subjectHTML += `</div></div>`;
              container.innerHTML += subjectHTML;
          }
      }

      init();
    </script>
</body>
</html>
