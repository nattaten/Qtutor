<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คะแนนรายบุคคล - Qtutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f8fafc; }
        .btn-save { transition: all 0.2s; cursor: pointer; }
        .btn-save:active { transform: scale(0.95); opacity: 0.8; }
        canvas { max-width: 100% !important; }
        .table-container::-webkit-scrollbar { height: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Qtutor"> <!-- 👈 เปลี่ยนตรงนี้เรียบร้อยแล้ว -->
    <link rel="apple-touch-icon" href="logo.png">
</head>
<body class="pb-10">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-4 h-16 flex items-center justify-between">
        <div class="flex items-center">
            <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full mr-3 text-slate-600">←</button>
            <h1 class="text-lg font-extrabold text-slate-800">ผลการเรียน</h1>
        </div>
        <button onclick="saveFullReport()" class="text-[10px] sm:text-xs bg-indigo-600 text-white px-4 py-2 rounded-full font-bold shadow-lg shadow-indigo-200 btn-save">
            📸 บันทึกภาพรวม
        </button>
    </nav>

    <main id="reportContent" class="max-w-md mx-auto px-4 mt-6">

        <!-- Student Header Card -->
        <div class="bg-white rounded-[2rem] p-5 mb-4 shadow-sm border border-slate-100">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white text-xl font-black shadow-lg">
                    <span id="initialName">-</span>
                </div>
                <div>
                    <h2 class="text-lg font-extrabold text-slate-800 leading-tight" id="studentName">กำลังโหลด...</h2>
                    <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest" id="courseCodeDisplay">COURSE NAME</p>
                </div>
            </div>
        </div>

        <!-- Course Cover -->
        <div class="mb-6 rounded-[2rem] overflow-hidden shadow-md border border-white">
            <img id="courseCover" src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?q=80&w=800"
                 class="w-full h-48 object-cover bg-slate-200" alt="Course Cover">
        </div>

        <!-- Chart Card -->
        <div id="chart-card" class="bg-white rounded-[2rem] p-6 mb-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-sm font-black text-slate-800 flex items-center gap-2">
                    <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span> วิเคราะห์พัฒนาการ (%)
                </h3>
                <button onclick="saveGraph()" class="text-[9px] font-black text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full uppercase btn-save">บันทึกรูปกราฟ</button>
            </div>
            <div class="relative h-64 w-full">
                <canvas id="scoreChart"></canvas>
            </div>
        </div>

        <!-- Score Sections -->
        <div id="scoreContainer" class="space-y-6"></div>

    </main>

    <script>
        const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myChart = null;
        let subjectSortMap = {};

        const colorPalette = {
            'คณิตศาสตร์': '#3b82f6', 'วิทยาศาสตร์': '#10b981', 'ภาษาอังกฤษ': '#a855f7',
            'ภาษาไทย': '#f59e0b', 'สังคมศึกษา': '#64748b', 'OVERALL': '#1e293b'
        };

        // =====================================================
        // SETTINGS LOOKUP
        // =====================================================
        let settingsRows = []; // populated in init() from score_settings

        function getSettings(testNumber, subject) {
            const row = settingsRows.find(
                r => r.test_number === testNumber && r.subject === subject
            );
            return {
                full_score: row?.full_score ?? 0,          // 0 signals "missing"
                topic:      row?.topic      ?? null         // null → show placeholder
            };
        }

        // Enrich a raw test_scores row with full_score + topic from score_settings.
        function enrichScore(sc) {
            const meta = getSettings(sc.test_number, sc.subject);
            return {
                ...sc,
                full_score: meta.full_score,  // always from score_settings
                topic:      meta.topic        // always from score_settings
            };
        }

        // =====================================================
        // INIT
        // =====================================================
        async function init() {
            const userData = JSON.parse(sessionStorage.getItem('student_user'));
            if (!userData) return (location.href = 'index.html');

            document.getElementById('studentName').innerText    = `น้อง${userData.nickname}`;
            document.getElementById('initialName').innerText    = userData.nickname.charAt(0);
            document.getElementById('courseCodeDisplay').innerText = userData.course_name || 'ไม่ระบุชื่อคอร์ส';

            try {
                const [courseRes, scoreRes, settingsRes, subjectsRes] = await Promise.all([
                    db.from('courses')
                        .select('*')
                        .eq('course_code', userData.course_code)
                        .maybeSingle(),

                    db.from('test_scores')
                        .select('student_id, course_code, test_number, subject, score')
                        .eq('student_id',   userData.id)
                        .eq('course_code',  userData.course_code)
                        .order('test_number', { ascending: true }),

                    db.from('score_settings')
                        .select('test_number, subject, full_score, topic')
                        .eq('course_code', userData.course_code),

                    db.from('subjects')
                        .select('subject_name, sort_order')
                        .eq('course_code', userData.course_code)
                        .order('sort_order', { ascending: true })
                ]);

                const courseInfo = courseRes.data;
                const rawScores  = scoreRes.data    || [];
                settingsRows     = settingsRes.data  || [];   
                const subjects   = subjectsRes.data  || [];

                // Build sort_order map
                subjectSortMap = {};
                subjects.forEach(sub => {
                    subjectSortMap[sub.subject_name] = sub.sort_order;
                });

                // ตรวจสอบคัดกรองเฉพาะ "แถวที่มีคะแนนบันทึกอยู่จริง" (ไม่เอาค่า null/undefined)
                const scores = rawScores
                    .filter(s => s.score !== null && s.score !== undefined)
                    .map(enrichScore);

                // ── Course cover image ────────────────────────────────────
                const coverEl           = document.getElementById('courseCover');
                const defaultPlaceholder = 'https://images.unsplash.com/photo-1635070041078-e363dbe005cb?q=80&w=800';

                if (courseInfo?.thumbnail_url) {
                    let finalUrl = courseInfo.thumbnail_url;
                    if (finalUrl.includes('drive.google.com')) {
                        const fileId = finalUrl.split('/d/')[1]?.split('/')[0];
                        if (fileId) finalUrl = `https://lh3.googleusercontent.com/d/${fileId}`;
                    }
                    coverEl.src = finalUrl;
                    coverEl.onerror = function() { this.src = defaultPlaceholder; this.onerror = null; };
                } else {
                    coverEl.src = defaultPlaceholder;
                }

                // ── Render (ถ้าไม่มีคะแนนเหลืออยู่เลยหลังกรอง ให้ซ่อนกราฟและแสดงข้อความ) ────────────────
                if (!scores.length) {
                    document.getElementById('chart-card').style.display = 'none';
                    document.getElementById('scoreContainer').innerHTML =
                        `<p class="text-center text-slate-400 py-10 font-bold">ยังไม่มีข้อมูลคะแนนสอบในคอร์สนี้</p>`;
                    return;
                }

                const threshold = 60;
                if (courseInfo?.score_display_mode === 'test_summary') {
                    setupSummaryChart(scores, threshold);
                    renderSummaryTable(scores, threshold);
                } else {
                    setupChart(scores, threshold);
                    renderBySubject(scores, threshold);
                }

            } catch (err) { console.error('Error in init():', err); }
        }

        // =====================================================
        // SORT HELPER
        // =====================================================
        function sortedSubjects(scores) {
            const subs = [...new Set(scores.map(s => s.subject))];
            return subs.sort((a, b) =>
                (subjectSortMap[a] ?? 999) - (subjectSortMap[b] ?? 999)
            );
        }

        // =====================================================
        // CHART FACTORY
        // =====================================================
        function createChart(labels, datasets, threshold) {
            if (myChart) myChart.destroy();

            const allValues = datasets.flatMap(d => d.data).filter(v => v !== null && v !== undefined);
            const minValue  = allValues.length ? Math.min(...allValues) : 0;
            const yMin      = minValue > 20 ? Math.floor((minValue - 10) / 10) * 10 : 0;

            const ctx = document.getElementById('scoreChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: yMin, max: 100,
                            ticks: { font: { size: 10 }, callback: v => v + '%' },
                            grid: { color: 'rgba(0,0,0,0.03)' }
                        },
                        x: {
                            ticks: { font: { size: 10 } },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { boxWidth: 8, font: { size: 9, weight: 'bold' }, padding: 15 }
                        }
                    }
                },
                plugins: [{
                    id: 'threshold',
                    beforeDraw: (c) => {
                        const { ctx, chartArea: { left, right }, scales: { y } } = c;
                        const yPos = y.getPixelForValue(threshold);
                        ctx.save();
                        ctx.strokeStyle = '#ef4444';
                        ctx.setLineDash([5, 5]);
                        ctx.lineWidth = 1.2;
                        ctx.beginPath(); ctx.moveTo(left, yPos); ctx.lineTo(right, yPos); ctx.stroke();
                        ctx.restore();
                    }
                }]
            });
        }

        // =====================================================
        // SUMMARY MODE — CHART
        // =====================================================
        function setupSummaryChart(scores, threshold) {
            // ดึงเฉพาะครั้งที่สอบที่มีคะแนนบันทึกไว้จริงๆ เท่านั้น
            const testNums = [...new Set(scores.map(s => s.test_number))].sort((a,b) => a - b);
            const subjects = sortedSubjects(scores);

            const datasets = subjects.map((sub, idx) => ({
                label: sub,
                data: testNums.map(num => {
                    const r = scores.find(s => s.test_number === num && s.subject === sub);
                    return (r && r.score != null && r.full_score > 0)
                        ? +(r.score / r.full_score * 100).toFixed(1)
                        : null;
                }),
                borderColor: colorPalette[sub] || `hsl(${idx * 137}, 60%, 65%)`,
                borderWidth: 2, pointRadius: 3, tension: 0.3, spanGaps: true
            }));

            const overallData = testNums.map(num => {
                const rows = scores.filter(s => s.test_number === num && s.score != null && s.full_score > 0);
                if (!rows.length) return null;
                const s = rows.reduce((a, b) => a + b.score,      0);
                const f = rows.reduce((a, b) => a + b.full_score,  0);
                return f > 0 ? +(s / f * 100).toFixed(1) : null;
            });

            datasets.push({
                label: 'ภาพรวม (%)',
                data: overallData,
                borderColor: colorPalette['OVERALL'],
                borderWidth: 4, pointRadius: 5, fill: false, tension: 0.3, borderDash: [5, 5]
            });

            createChart(testNums.map(n => `ครั้งที่ ${n}`), datasets, threshold);
        }

        // =====================================================
        // SUMMARY MODE — TABLE
        // =====================================================
        function renderSummaryTable(scores, threshold) {
            const subjects = sortedSubjects(scores);
            // ดึงเฉพาะครั้งที่สอบที่มีคะแนนบันทึกไว้จริง
            const testNums = [...new Set(scores.map(s => s.test_number))].sort((a,b) => a - b);

            const headerHtml = `<tr>
                <th class="pb-3 w-10">No.</th>
                ${subjects.map(sub => {
                    const latestTopic = [...scores]
                        .filter(s => s.subject === sub && s.topic)
                        .sort((a,b) => b.test_number - a.test_number)[0]?.topic;
                    const topicLine = latestTopic
                        ? `<div class="text-[8px] font-normal text-indigo-400 normal-case">${latestTopic}</div>`
                        : '';
                    return `<th class="pb-3 text-center text-[9px] font-black">${sub}${topicLine}</th>`;
                }).join('')}
                <th class="pb-3 text-right text-indigo-600 font-black">รวม %</th>
            </tr>`;

            const rowsHtml = testNums.map(num => {
                let rowScore = 0, rowFull = 0;
                const cells = subjects.map(sub => {
                    const row = scores.find(s => s.test_number === num && s.subject === sub);
                    if (row && row.score != null && row.full_score > 0) {
                        const p = row.score / row.full_score * 100;
                        rowScore += row.score;
                        rowFull  += row.full_score;
                        return `<td class="py-4 text-center">
                            <span class="text-[11px] font-bold ${p >= threshold ? 'text-emerald-600' : 'text-red-500'}">${p.toFixed(0)}%</span>
                            ${row.topic ? `<div class="text-[9px] text-slate-400 mt-0.5">${row.topic}</div>` : ''}
                        </td>`;
                    }
                    if (row && row.score != null && row.full_score === 0) {
                        return `<td class="py-4 text-center text-[10px] text-slate-400">—<br><span class="text-[8px]">ไม่มีข้อมูลเต็ม</span></td>`;
                    }
                    return `<td class="py-4 text-center text-slate-300 text-[11px]">-</td>`;
                }).join('');

                const totalP = rowFull > 0 ? (rowScore / rowFull * 100).toFixed(0) : '—';
                const pClass  = rowFull > 0 && +totalP >= threshold
                    ? 'bg-indigo-100 text-indigo-600'
                    : 'bg-red-100 text-red-600';

                return `<tr class="border-b border-slate-50 last:border-0">
                    <td class="py-4 text-sm font-bold text-slate-700">T${num}</td>
                    ${cells}
                    <td class="py-4 text-right">
                        <span class="px-2 py-0.5 rounded-md text-[10px] font-black ${rowFull > 0 ? pClass : 'bg-slate-100 text-slate-400'}">${totalP}${rowFull > 0 ? '%' : ''}</span>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('scoreContainer').innerHTML = `
                <div id="summary-card" class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-50">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-md font-black italic text-slate-800">📊 ตารางสรุปคะแนน</h4>
                        <button onclick="saveCard('summary-card', 'Summary')" class="text-[9px] font-black text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full btn-save">บันทึกรูป</button>
                    </div>
                    <div class="table-container overflow-x-auto">
                        <table class="w-full text-left min-w-[320px]">
                            <thead class="text-[10px] font-black uppercase text-slate-500 border-b border-slate-100">${headerHtml}</thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>
                </div>`;
        }

        // =====================================================
        // BY-SUBJECT MODE — CHART
        // =====================================================
        function setupChart(scores, threshold) {
            // ดึงเฉพาะครั้งที่สอบที่มีคะแนนบันทึกไว้จริง
            const testNums = [...new Set(scores.map(s => s.test_number))].sort((a,b) => a - b);
            const subjects = sortedSubjects(scores);
            const labels   = testNums.map(n => `ครั้งที่ ${n}`);

            const datasets = subjects.map((sub, idx) => ({
                label: sub,
                data: testNums.map(num => {
                    const r = scores.find(s => s.test_number === num && s.subject === sub);
                    return (r && r.score != null && r.full_score > 0)
                        ? +(r.score / r.full_score * 100).toFixed(1)
                        : null;
                }),
                borderColor: colorPalette[sub] || `hsl(${idx * 137}, 60%, 65%)`,
                borderWidth: 3, tension: 0.3, spanGaps: true
            }));

            createChart(labels, datasets, threshold);
        }

        // =====================================================
        // BY-SUBJECT MODE — RENDER
        // =====================================================
        function renderBySubject(scores, threshold) {
            const subjects = sortedSubjects(scores);

            document.getElementById('scoreContainer').innerHTML = subjects.map(sub => {
                // ดึงคะแนนรายวิชานี้ ซึ่งกรองตัวที่มีค่า null ออกไปแล้วตั้งแต่ต้นในฟังก์ชัน init()
                const subScores = scores
                    .filter(s => s.subject === sub)
                    .sort((a,b) => a.test_number - b.test_number);

                // 🔥 เงื่อนไขเด็ด: ถ้าวิชานี้ยังไม่มีคะแนนบันทึกไว้เลยสักครั้งเดียว ไม่ต้องวาดตัวการ์ดวิชานี้ออกมาเลย
                if (!subScores.length) return '';

                const rows = subScores.map(s => {
                    const hasFull    = s.full_score > 0;
                    const pct        = hasFull ? (s.score / s.full_score * 100).toFixed(0) : null;
                    const scoreDisp  = hasFull ? `${s.score}/${s.full_score}` : `${s.score}/—`;
                    const topicDisp  = s.topic || '<span class="text-slate-300 italic">ไม่มีข้อมูลเนื้อหา</span>';
                    const pctBadge   = pct !== null
                        ? `<span class="px-2 py-0.5 rounded-md text-[10px] font-black ${+pct >= threshold ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}">${pct}%</span>`
                        : `<span class="px-2 py-0.5 rounded-md text-[10px] font-black bg-slate-100 text-slate-400">—</span>`;

                    return `<tr class="border-b border-slate-50 last:border-0">
                        <td class="py-4 text-sm font-bold text-slate-700">T${s.test_number}</td>
                        <td class="py-4 text-[11px] text-slate-500">${topicDisp}</td>
                        <td class="py-4 text-right font-black text-slate-800 text-sm">${scoreDisp}</td>
                        <td class="py-4 text-right">${pctBadge}</td>
                    </tr>`;
                }).join('');

                const safeSubId = sub.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_ก-๙]/g, '');
                return `<div id="card-${safeSubId}" class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-50">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-md font-black italic">📚 ${sub}</h4>
                        <button onclick="saveCard('card-${safeSubId}', '${sub}')" class="text-[9px] font-black text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full btn-save">บันทึกรูป</button>
                    </div>
                    <table class="w-full text-left">
                        <thead class="text-[10px] font-black uppercase text-slate-500 border-b border-slate-100">
                            <tr><th class="pb-2 w-12">No.</th><th class="pb-2">เนื้อหา</th><th class="pb-2 text-right">คะแนน</th><th class="pb-2 text-right">%</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
            }).join('');
        }

        // =====================================================
        // IMAGE EXPORT
        // =====================================================
        function saveGraph() {
            html2canvas(document.getElementById('chart-card'), {
                scale: 3, backgroundColor: '#f8fafc'
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Graph.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function saveCard(id, name) {
            html2canvas(document.getElementById(id), {
                scale: 3, backgroundColor: '#ffffff'
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Score_${name}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function saveFullReport() {
            html2canvas(document.getElementById('reportContent'), {
                scale: 2, backgroundColor: '#f8fafc'
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Full_Report.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        init();
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Ready!'))
                    .catch(err => console.log('PWA Error', err));
            });
        }
    </script>
</html>
