<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คะแนนรายบุคคล - Qtutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f8fafc; }
        .btn-save { transition: all 0.2s; cursor: pointer; }
        .btn-save:active { transform: scale(0.95); opacity: 0.8; }
        canvas { max-width: 100% !important; }
        .table-container::-webkit-scrollbar { height: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="pb-10">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-4 h-16 flex items-center justify-between">
        <div class="flex items-center">
            <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full mr-3 text-slate-600">←</button>
            <h1 class="text-lg font-extrabold text-slate-800">ผลการเรียน</h1>
        </div>
        <button onclick="saveFullReport()" class="text-[10px] sm:text-xs bg-indigo-600 text-white px-4 py-2 rounded-full font-bold shadow-lg shadow-indigo-200 btn-save">
            📸 บันทึกภาพรวม
        </button>
    </nav>

    <main id="reportContent" class="max-w-md mx-auto px-4 mt-6">
        
        <div class="bg-white rounded-[2rem] p-5 mb-4 shadow-sm border border-slate-100">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white text-xl font-black shadow-lg">
                    <span id="initialName">-</span>
                </div>
                <div>
                    <h2 class="text-lg font-extrabold text-slate-800 leading-tight" id="studentName">กำลังโหลด...</h2>
                    <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest" id="courseCodeDisplay">COURSE NAME</p>
                </div>
            </div>
        </div>

        <div class="mb-6 rounded-[2rem] overflow-hidden shadow-md border border-white">
            <img id="courseCover" src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?q=80&w=800" 
                 class="w-full h-48 object-cover bg-slate-200" alt="Course Cover">
        </div>

        <div id="chart-card" class="bg-white rounded-[2rem] p-6 mb-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-sm font-black text-slate-800 flex items-center gap-2">
                    <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span> วิเคราะห์พัฒนาการ (%)
                </h3>
                <button onclick="saveGraph()" class="text-[9px] font-black text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full uppercase btn-save">บันทึกรูปกราฟ</button>
            </div>
            <div class="relative h-64 w-full">
                <canvas id="scoreChart"></canvas>
            </div>
        </div>

        <div id="scoreContainer" class="space-y-6"></div>

    </main>

    <script>
        const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myChart = null;
        let subjectSortMap = {}; // เก็บ sort_order ของแต่ละวิชา
        
        const colorPalette = {
            'คณิตศาสตร์': '#3b82f6', 'วิทยาศาสตร์': '#10b981', 'ภาษาอังกฤษ': '#a855f7',
            'ภาษาไทย': '#f59e0b', 'สังคมศึกษา': '#64748b', 'OVERALL': '#1e293b'
        };

        async function init() {
          const userData = JSON.parse(sessionStorage.getItem('student_user'));
          if (!userData) return (location.href = 'index.html');

          document.getElementById('studentName').innerText = `น้อง${userData.nickname}`;
          document.getElementById('initialName').innerText = userData.nickname.charAt(0);
          document.getElementById('courseCodeDisplay').innerText = userData.course_name || 'ไม่ระบุชื่อคอร์ส';

          try {
              console.log('🔍 userData.course_code:', userData.course_code);

              const [courseRes, scoreRes, subjectsRes] = await Promise.all([
                  db.from('courses').select('*').eq('course_code', userData.course_code).maybeSingle(),
                  db.from('test_scores').select('*').eq('student_id', userData.id).eq('course_code', userData.course_code).order('test_number', { ascending: true }),
                  db.from('subjects').select('subject_name, sort_order').eq('course_code', userData.course_code).order('sort_order', { ascending: true })
              ]);

              const courseInfo = courseRes.data;
              const scores = scoreRes.data;
              const subjects = subjectsRes.data || [];

              // Debug
              console.log('❌ subjectsRes.error:', subjectsRes.error);
              console.log('✅ subjectsRes.data:', subjectsRes.data);
              console.log('📊 scores:', scores);

              // สร้าง map ของ sort_order สำหรับการเรียงลำดับวิชา
              subjects.forEach(sub => {
                  subjectSortMap[sub.subject_name] = sub.sort_order;
                  console.log(`📚 ${sub.subject_name} -> sort_order: ${sub.sort_order}`);
              });
              console.log('🗺️ Final subjectSortMap:', subjectSortMap);

              // --- ส่วนจัดการรูปภาพหน้าปก ---
              const courseCover = document.getElementById('courseCover');
              const defaultPlaceholder = 'https://images.unsplash.com/photo-1635070041078-e363dbe005cb?q=80&w=800';

              if (courseInfo?.thumbnail_url) {
                  let finalUrl = courseInfo.thumbnail_url;

                  // 🛠️ ตรวจสอบและแปลงลิงก์ Google Drive ให้เป็น Direct Link
                  if (finalUrl.includes('drive.google.com')) {
                      const fileId = finalUrl.split('/d/')[1]?.split('/')[0];
                      if (fileId) {
                          finalUrl = `https://lh3.googleusercontent.com/d/${fileId}`;
                      }
                  }

                  courseCover.src = finalUrl;
                  
                  courseCover.onerror = function() {
                      this.src = defaultPlaceholder;
                      this.onerror = null;
                  };
              } else {
                  courseCover.src = defaultPlaceholder;
              }
              // --------------------------

              if (!scores || scores.length === 0) {
                  document.getElementById('scoreContainer').innerHTML = `<p class="text-center text-slate-400 py-10 font-bold">ยังไม่มีข้อมูลคะแนน</p>`;
                  return;
              }

              const threshold = 60; 
              if (courseInfo?.score_display_mode === 'test_summary') {
                  setupSummaryChart(scores, threshold);
                  renderSummaryTable(scores, threshold);
              } else {
                  setupChart(scores, threshold);
                  renderBySubject(scores, threshold);
              }

          } catch (err) { console.error('Error:', err); }
        }

        // --- 📊 Core Chart Function (With Dynamic Axis Scaling) ---
        function createChart(labels, datasets, threshold) {
            if (myChart) myChart.destroy();

            // คำนวณจุดต่ำสุดของแกน Y แบบ Dynamic เพื่อย่อกราฟ (Axis Scaling)
            const allValues = datasets.flatMap(d => d.data).filter(v => v !== null);
            const minValue = Math.min(...allValues);
            // ถ้าคะแนนต่ำสุดคือ 72% ให้เริ่มที่ 60% (ปัดลงทีละ 10) แต่ไม่ต่ำกว่า 0
            const yMin = minValue > 20 ? Math.floor((minValue - 10) / 10) * 10 : 0;

            const ctx = document.getElementById('scoreChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            min: yMin,
                            max: 100, 
                            ticks: { 
                                font: { size: 10 }, 
                                callback: v => v + '%' 
                            },
                            grid: { color: 'rgba(0,0,0,0.03)' }
                        },
                        x: { 
                            ticks: { font: { size: 10 } },
                            grid: { display: false }
                        }
                    },
                    plugins: { 
                        legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 9, weight: 'bold' }, padding: 15 } } 
                    }
                },
                plugins: [{
                    id: 'threshold',
                    beforeDraw: (c) => {
                        const {ctx, chartArea: {left, right}, scales: {y}} = c;
                        const yPos = y.getPixelForValue(threshold);
                        ctx.save();
                        ctx.strokeStyle = '#ef4444';
                        ctx.setLineDash([5, 5]);
                        ctx.beginPath(); ctx.moveTo(left, yPos); ctx.lineTo(right, yPos); ctx.stroke();
                        ctx.restore();
                    }
                }]
            });
        }

        // --- 📈 Summary Mode: Multi-line Chart ---
        function setupSummaryChart(scores, threshold) {
            const testNums = [...new Set(scores.map(s => s.test_number))];
            let subjects = [...new Set(scores.map(s => s.subject))];
            
            // เรียงวิชาตาม sort_order
            subjects.sort((a, b) => {
                const orderA = subjectSortMap[a] ?? 999;
                const orderB = subjectSortMap[b] ?? 999;
                return orderA - orderB;
            });
            
            // 1. เส้นรายวิชา
            const datasets = subjects.map((sub, idx) => ({
                label: sub,
                data: testNums.map(num => {
                    const match = scores.find(s => s.test_number === num && s.subject === sub);
                    return match ? (match.score / match.full_score * 100) : null;
                }),
                borderColor: colorPalette[sub] || `hsl(${idx * 137}, 60%, 65%)`,
                borderWidth: 2, pointRadius: 3, tension: 0.3, spanGaps: true
            }));

            // 2. เส้น Overall (หนาพิเศษ/เส้นประ)
            const overallData = testNums.map(num => {
                const tests = scores.filter(s => s.test_number === num);
                return (tests.reduce((a, b) => a + b.score, 0) / tests.reduce((a, b) => a + b.full_score, 0) * 100);
            });

            datasets.push({
                label: 'ภาพรวม (%)',
                data: overallData,
                borderColor: colorPalette['OVERALL'],
                borderWidth: 4, pointRadius: 5, fill: false, tension: 0.3, borderDash: [5, 5]
            });

            createChart(testNums.map(n => `ครั้งที่ ${n}`), datasets, threshold);
        }

        // --- 📑 Summary Mode: Matrix Table ---
        function renderSummaryTable(scores, threshold) {
            let subjects = [...new Set(scores.map(s => s.subject))];
            const testNums = [...new Set(scores.map(s => s.test_number))];

            // เรียงวิชาตาม sort_order
            subjects.sort((a, b) => {
                const orderA = subjectSortMap[a] ?? 999;
                const orderB = subjectSortMap[b] ?? 999;
                return orderA - orderB;
            });

            const headerHtml = `<tr>
                <th class="pb-3 w-10">No.</th>
                ${subjects.map(sub => `<th class="pb-3 text-center text-[9px] font-black">${sub} (%)</th>`).join('')}
                <th class="pb-3 text-right text-indigo-600 font-black">รวม %</th>
            </tr>`;

            const rowsHtml = testNums.map(num => {
                let rowScore = 0, rowFull = 0;
                const cells = subjects.map(sub => {
                    const match = scores.find(s => s.test_number === num && s.subject === sub);
                    if (match) {
                        const p = (match.score / match.full_score * 100);
                        rowScore += match.score; rowFull += match.full_score;
                        return `<td class="py-4 text-center text-[11px] font-bold ${p >= threshold ? 'text-emerald-600' : 'text-red-500'}">${p.toFixed(0)}%</td>`;
                    }
                    return `<td class="py-4 text-center text-slate-300">-</td>`;
                }).join('');

                const totalP = rowFull > 0 ? ((rowScore / rowFull) * 100).toFixed(0) : 0;
                return `<tr class="border-b border-slate-50 last:border-0">
                    <td class="py-4 text-sm font-bold text-slate-700">T${num}</td>
                    ${cells}
                    <td class="py-4 text-right">
                        <span class="px-2 py-0.5 rounded-md text-[10px] font-black ${totalP >= threshold ? 'bg-indigo-100 text-indigo-600' : 'bg-red-100 text-red-600'}">${totalP}%</span>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('scoreContainer').innerHTML = `
                <div id="summary-card" class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-50">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-md font-black italic text-slate-800">📊 ตารางสรุปคะแนน</h4>
                        <button onclick="saveCard('summary-card', 'Summary')" class="text-[9px] font-black text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full btn-save">บันทึกรูป</button>
                    </div>
                    <div class="table-container overflow-x-auto">
                        <table class="w-full text-left min-w-[320px]">
                            <thead class="text-[10px] font-black uppercase text-slate-500 border-b border-slate-100">${headerHtml}</thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>
                </div>`;
        }

        // --- (Fallback Functions for Single Subject Mode) ---
        function setupChart(scores, threshold) {
            const labels = [...new Set(scores.map(s => `ครั้งที่ ${s.test_number}`))];
            let subjects = [...new Set(scores.map(s => s.subject))];
            
            // เรียงวิชาตาม sort_order
            subjects.sort((a, b) => {
                const orderA = subjectSortMap[a] ?? 999;
                const orderB = subjectSortMap[b] ?? 999;
                return orderA - orderB;
            });
            
            const datasets = subjects.map((sub, idx) => ({
                label: sub,
                data: labels.map((_, i) => {
                    const match = scores.find(s => s.test_number === (i+1) && s.subject === sub);
                    return match ? (match.score / match.full_score * 100) : null;
                }),
                borderColor: colorPalette[sub] || `hsl(${idx * 137}, 60%, 65%)`,
                borderWidth: 3, tension: 0.3, spanGaps: true
            }));
            createChart(labels, datasets, threshold);
        }

        function renderBySubject(scores, threshold) {
            let subjects = [...new Set(scores.map(s => s.subject))];
            
            // เรียงวิชาตาม sort_order
            subjects.sort((a, b) => {
                const orderA = subjectSortMap[a] ?? 999;
                const orderB = subjectSortMap[b] ?? 999;
                return orderA - orderB;
            });
            
            document.getElementById('scoreContainer').innerHTML = subjects.map(sub => {
                const subScores = scores.filter(s => s.subject === sub);
                const rows = subScores.map(s => {
                    const p = ((s.score / s.full_score) * 100).toFixed(0);
                    return `<tr class="border-b border-slate-50 last:border-0">
                        <td class="py-4 text-sm font-bold text-slate-700">T${s.test_number}</td>
                        <td class="py-4 text-[11px] text-slate-500">${s.topic || '-'}</td>
                        <td class="py-4 text-right font-black text-slate-800 text-sm">${s.score}/${s.full_score}</td>
                        <td class="py-4 text-right"><span class="px-2 py-0.5 rounded-md text-[10px] font-black ${p >= threshold ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}">${p}%</span></td>
                    </tr>`;
                }).join('');
                return `<div id="card-${sub}" class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-50">
                    <div class="flex justify-between items-center mb-4"><h4 class="text-md font-black italic">📚 ${sub}</h4>
                    <button onclick="saveCard('card-${sub}', '${sub}')" class="text-[9px] font-black text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full btn-save">บันทึกรูป</button></div>
                    <table class="w-full text-left"><thead class="text-[10px] font-black uppercase text-slate-500 border-b border-slate-100">
                    <tr><th class="pb-2 w-12">No.</th><th class="pb-2">Topic</th><th class="pb-2 text-right">Score</th><th class="pb-2 text-right">%</th></tr></thead>
                    <tbody>${rows}</tbody></table></div>`;
            }).join('');
        }

        // --- Image Export Logic ---
        function saveGraph() {
            html2canvas(document.getElementById('chart-card'), { scale: 3, backgroundColor: '#f8fafc', borderRadius: 32 }).then(canvas => {
                const link = document.createElement('a'); link.download = `Graph.png`; link.href = canvas.toDataURL(); link.click();
            });
        }
        function saveCard(id, name) {
            html2canvas(document.getElementById(id), { scale: 3, backgroundColor: '#f8fafc', borderRadius: 32 }).then(canvas => {
                const link = document.createElement('a'); link.download = `Score_${name}.png`; link.href = canvas.toDataURL(); link.click();
            });
        }
        function saveFullReport() {
            html2canvas(document.getElementById('reportContent'), { scale: 2, backgroundColor: '#f8fafc' }).then(canvas => {
                const link = document.createElement('a'); link.download = `Full_Report.png`; link.href = canvas.toDataURL(); link.click();
            });
        }

        init();
    </script>
</body>
</html>
