<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังเฉลย - Qtutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .rotate-icon { transform: rotate(180deg); transition: transform 0.3s ease; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { position: relative; width: 95%; height: 90%; max-width: 800px; }
        .close-modal { position: absolute; top: -45px; right: 0; color: white; cursor: pointer; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 999px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body class="bg-slate-50 font-['Kanit'] min-h-screen">

    <!-- NAVBAR -->
    <div class="bg-white shadow-sm p-4 sticky top-0 z-20">
        <div class="max-w-2xl mx-auto flex items-center">
            <button onclick="goBack()" class="mr-4 text-slate-400 hover:text-blue-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h1 class="text-xl font-bold text-slate-800">📖 คลังเฉลยบทเรียน</h1>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="max-w-2xl mx-auto p-4 pb-20">
        
        <!-- COURSE BADGE -->
        <div id="courseBadge" class="mb-5 inline-block bg-blue-100 text-blue-600 px-4 py-2 rounded-full text-sm font-bold">
            ⏳ กำลังโหลด...
        </div>

        <!-- CONTENT -->
        <div id="mainContent" class="space-y-3">
            <div class="text-center py-20">
                <p class="text-slate-400 animate-pulse">🔄 กำลังโหลดข้อมูลเฉลย...</p>
            </div>
        </div>
    </main>

    <!-- PDF MODAL -->
    <div id="pdfModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePDF()">✕ ปิด</span>
            <iframe id="pdfViewer" width="100%" height="100%" src="" frameborder="0" class="rounded-2xl shadow-2xl bg-white"></iframe>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const userData = JSON.parse(sessionStorage.getItem('student_user'));

        // === INIT ===
        async function init() {
            if (!userData) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('courseBadge').textContent = userData.course_name;

            try {
                const { data, error } = await db
                    .from('solutions')
                    .select('*')
                    .eq('course_code', userData.course_code)
                    .order('week', { ascending: true })
                    .order('subject', { ascending: true });

                if (error) throw error;
                renderSolutions(data || []);
            } catch (err) {
                showError('ไม่สามารถโหลดข้อมูลเฉลย');
                console.error(err);
            }
        }

        // === SUBJECT COLOR MAPPING ===
        function getSubjectColor(subject) {
            const colors = {
                'คณิต': { text: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-200', pill: 'bg-blue-100' },
                'วิทย': { text: 'text-green-600', bg: 'bg-green-50', border: 'border-green-200', pill: 'bg-green-100' },
                'อังกฤษ': { text: 'text-pink-600', bg: 'bg-pink-50', border: 'border-pink-200', pill: 'bg-pink-100' },
                'ไทย': { text: 'text-red-600', bg: 'bg-red-50', border: 'border-red-200', pill: 'bg-red-100' },
            };

            for (const [key, color] of Object.entries(colors)) {
                if (subject.includes(key)) return color;
            }
            return { text: 'text-slate-600', bg: 'bg-slate-50', border: 'border-slate-200', pill: 'bg-slate-100' };
        }

        // === RENDER SOLUTIONS ===
        function renderSolutions(data) {
            const container = document.getElementById('mainContent');
            
            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <p class="text-5xl mb-3">📭</p>
                        <p class="text-slate-400">ยังไม่มีเฉลยในหลักสูตรนี้</p>
                        <p class="text-xs text-slate-300 mt-2">กรุณาติดต่อครูผสอนสำหรับข้อมูลเพิ่มเติม</p>
                    </div>
                `;
                return;
            }

            // จัดกลุ่มตามสัปดาห์
            const groupedByWeek = {};
            data.forEach(item => {
                const week = item.week || 0;
                if (!groupedByWeek[week]) groupedByWeek[week] = [];
                groupedByWeek[week].push(item);
            });

            container.innerHTML = '';
            let weekIndex = 0;

            Object.keys(groupedByWeek)
                .sort((a, b) => a - b)
                .forEach(week => {
                    weekIndex++;
                    const items = groupedByWeek[week];
                    const color = getSubjectColor(items[0]?.subject || '');

                    let weekHTML = `
                        <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                            <button onclick="toggleWeek(${weekIndex})" class="w-full flex justify-between items-center p-5 hover:bg-slate-50 active:bg-slate-100 transition-colors group">
                                <div class="flex items-center gap-3">
                                    <div class="w-1.5 h-8 ${color.bg} rounded-full"></div>
                                    <span class="font-bold text-slate-800 text-lg">📅 สัปดาห์ที่ ${week}</span>
                                    <span class="text-xs text-slate-400 font-semibold">(${items.length} ไฟล์)</span>
                                </div>
                                <svg id="icon-${weekIndex}" class="h-5 w-5 text-slate-400 transition-transform" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                                </svg>
                            </button>
                            <div id="week-${weekIndex}" style="display: none;" class="px-4 pb-4 space-y-2">
                    `;

                    items.forEach(item => {
                        const itemColor = getSubjectColor(item.subject || '');
                        weekHTML += `
                            <button onclick="openPDF('${item.file_url}')" class="w-full p-4 rounded-2xl border ${itemColor.border} ${itemColor.bg} hover:shadow-md active:scale-95 transition-all text-left flex justify-between items-center group">
                                <div class="flex-1">
                                    <div class="text-[10px] font-black ${itemColor.text} ${itemColor.pill} px-2.5 py-1 rounded-lg uppercase mb-2 w-fit">${item.subject}</div>
                                    <h3 class="font-bold ${itemColor.text} text-sm group-hover:underline">${item.title}</h3>
                                </div>
                                <div class="${itemColor.text} text-xl opacity-40">📄</div>
                            </button>
                        `;
                    });

                    weekHTML += `</div></div>`;
                    container.innerHTML += weekHTML;
                });
        }

        // === TOGGLE WEEK ===
        function toggleWeek(id) {
            const content = document.getElementById(`week-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            
            if (content.style.display === 'block') {
                content.style.display = 'none';
                icon.classList.remove('rotate-icon');
            } else {
                content.style.display = 'block';
                icon.classList.add('rotate-icon');
            }
        }

        // === OPEN PDF ===
        function openPDF(url) {
            let finalUrl = url;
            if (url.includes('drive.google.com')) {
                finalUrl = url.replace('/view', '/preview').replace('?usp=sharing', '');
            }
            document.getElementById('pdfViewer').src = finalUrl;
            document.getElementById('pdfModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // === CLOSE PDF ===
        function closePDF() {
            document.getElementById('pdfModal').classList.remove('active');
            document.getElementById('pdfViewer').src = '';
            document.body.style.overflow = 'auto';
        }

        // === HELPERS ===
        function goBack() {
            window.location.href = 'dashboard.html';
        }

        function showError(message) {
            const container = document.getElementById('mainContent');
            container.innerHTML = `
                <div class="text-center py-20">
                    <p class="text-5xl mb-3">⚠️</p>
                    <p class="text-slate-600">${message}</p>
                </div>
            `;
        }

        // === START ===
        init();
    </script>
</body>
</html>
