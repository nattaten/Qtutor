<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังเฉลย - Qtutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .rotate-icon { transform: rotate(180deg); transition: transform 0.3s ease; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.88); backdrop-filter: blur(6px); }
        .modal.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { position: relative; width: 96%; height: 88%; max-width: 820px; }
        iframe { border-radius: 14px; background: #fff; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="bg-white shadow-sm p-4 sticky top-0 z-20">
        <div class="max-w-2xl mx-auto flex items-center">
            <button onclick="history.back()" class="w-9 h-9 flex items-center justify-center bg-slate-100 rounded-full text-slate-500">←</button>
            <h1 class="text-xl font-bold text-slate-800">📖 คลังเฉลยบทเรียน</h1>
        </div>
    </div>

    <main class="max-w-2xl mx-auto p-4 pb-20">
        <div id="courseBadge" class="mb-5 inline-block bg-blue-100 text-blue-600 px-4 py-2 rounded-full text-sm font-bold">
            ⏳ กำลังโหลด...
        </div>
        <div id="mainContent" class="space-y-3">
            <div class="text-center py-20">
                <p class="text-slate-400 animate-pulse">🔄 กำลังโหลดข้อมูลเฉลย...</p>
            </div>
        </div>
    </main>

    <div id="pdfModal" class="modal">
        <div class="w-full max-w-[820px] flex justify-between items-center px-2 pb-3">
            <p id="modalTitle" class="text-white font-bold text-sm truncate max-w-[60%]"></p>
            <div class="flex items-center gap-2">
                <a id="openTabBtn" href="#" target="_blank"
                    class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-2 rounded-full flex items-center gap-1.5 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                    </svg>
                    เปิดแท็บใหม่
                </a>
                <button onclick="closePDF()"
                    class="bg-white/20 hover:bg-red-500/70 text-white text-xs font-bold px-3 py-2 rounded-full transition-colors">
                    ✕ ปิด
                </button>
            </div>
        </div>
        <div class="modal-content">
            <iframe id="pdfViewer" width="100%" height="100%" src="" frameborder="0"
                allow="autoplay" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>
        </div>
        <p class="text-white/50 text-xs text-center mt-3 px-4">
            หากไฟล์ไม่โหลด กด "เปิดแท็บใหม่" เพื่อดูในเบราว์เซอร์โดยตรงครับ
        </p>
    </div>

    <script>
        const SUPABASE_URL = 'https://vsurgimkuuxdmalxawfr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdXJnaW1rdXV4ZG1hbHhhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg1NTUsImV4cCI6MjA5MDY4NDU1NX0.N6BHHblAiwsZQ09LZaphrqqNCkpCbomDX1orZSkBLg0';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const userData = JSON.parse(sessionStorage.getItem('student_user'));

        function toGDrivePreview(url) {
            let fileId = null;
            const matchFile = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (matchFile) { fileId = matchFile[1]; }
            const matchOpen = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (!fileId && matchOpen) { fileId = matchOpen[1]; }
            return fileId ? `https://drive.google.com/file/d/${fileId}/preview` : url;
        }

        async function init() {
            if (!userData) return (location.href = 'index.html');
            document.getElementById('courseBadge').textContent = userData.course_name;

            try {
                const { data, error } = await db
                    .from('solutions') // แก้ไขชื่อตารางเป็น solutions
                    .select('*')
                    .eq('course_code', userData.course_code)
                    .order('week', { ascending: true })
                    .order('subject', { ascending: true });

                if (error) throw error;
                renderSolutions(data || []);
            } catch (err) {
                showError('ไม่สามารถโหลดข้อมูลเฉลย');
            }
        }

        function getSubjectColor(subject) {
            const colors = {
                'MATH':  { text:'text-blue-600',  bg:'bg-blue-50',  border:'border-blue-200',  pill:'bg-blue-100'  },
                'SCI':   { text:'text-green-600', bg:'bg-green-50', border:'border-green-200', pill:'bg-green-100' },
                'ENG':   { text:'text-pink-600',  bg:'bg-pink-50',  border:'border-pink-200',  pill:'bg-pink-100'  },
                'THAI':  { text:'text-red-600',   bg:'bg-red-50',   border:'border-red-200',   pill:'bg-red-100'   },
            };
            
            const upperSub = (subject || '').toUpperCase();
            if (upperSub.includes('MATH')) return colors.MATH; // รองรับ MATH-M1
            if (upperSub.includes('SCI') || upperSub.includes('วิท')) return colors.SCI;
            if (upperSub.includes('ENG') || upperSub.includes('อังก')) return colors.ENG;
            if (upperSub.includes('THAI') || upperSub.includes('ไทย')) return colors.THAI;
            
            return { text:'text-slate-600', bg:'bg-slate-50', border:'border-slate-200', pill:'bg-slate-100' };
        }

        function renderSolutions(data) {
            const container = document.getElementById('mainContent');
            if (!data.length) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <p class="text-5xl mb-3">📭</p>
                        <p class="text-slate-400">ยังไม่มีเฉลยในหลักสูตรนี้</p>
                    </div>`;
                return;
            }

            const grouped = {};
            data.forEach(item => {
                const week = item.week || 0;
                if (!grouped[week]) grouped[week] = [];
                grouped[week].push(item);
            });

            container.innerHTML = '';
            let idx = 0;
            Object.keys(grouped).sort((a, b) => +a - +b).forEach(week => {
                idx++;
                const items = grouped[week];
                const color = getSubjectColor(items[0]?.subject || '');

                let html = `
                    <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                        <button onclick="toggleWeek(${idx})" class="w-full flex justify-between items-center p-5 hover:bg-slate-50 active:bg-slate-100 transition-colors">
                            <div class="flex items-center gap-3">
                                <div class="w-1.5 h-8 ${color.bg} rounded-full"></div>
                                <span class="font-bold text-slate-800 text-lg">📅 สัปดาห์ที่ ${week}</span>
                                <span class="text-xs text-slate-400 font-semibold">(${items.length} ไฟล์)</span>
                            </div>
                            <svg id="icon-${idx}" class="h-5 w-5 text-slate-400 transition-transform"
                                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>
                        <div id="week-${idx}" style="display:none;" class="px-4 pb-4 space-y-2">`;

                items.forEach(item => {
                    const ic = getSubjectColor(item.subject || '');
                    const safeUrl  = (item.file_url || '').replace(/'/g, "\\'");
                    const safeTitle = (item.title || '').replace(/'/g, "\\'");
                    html += `
                        <button onclick="openPDF('${safeUrl}','${safeTitle}')"
                            class="w-full p-4 rounded-2xl border ${ic.border} ${ic.bg} hover:shadow-md active:scale-95 transition-all text-left flex justify-between items-center group">
                            <div class="flex-1">
                                <div class="text-[10px] font-black ${ic.text} ${ic.pill} px-2.5 py-1 rounded-lg uppercase mb-2 w-fit">${item.subject}</div>
                                <h3 class="font-bold ${ic.text} text-sm group-hover:underline">${item.title}</h3>
                            </div>
                            <div class="${ic.text} text-xl opacity-40">📄</div>
                        </button>`;
                });

                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function toggleWeek(id) {
            const content = document.getElementById(`week-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            const isOpen = content.style.display === 'block';
            content.style.display = isOpen ? 'none' : 'block';
            icon.classList.toggle('rotate-icon', !isOpen);
        }

        function openPDF(url, title) {
            document.getElementById('pdfViewer').src   = toGDrivePreview(url);
            document.getElementById('openTabBtn').href = url;
            document.getElementById('modalTitle').textContent = title || '';
            document.getElementById('pdfModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePDF() {
            document.getElementById('pdfModal').classList.remove('active');
            document.getElementById('pdfViewer').src = '';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('pdfModal').addEventListener('click', function (e) {
            if (e.target === this) closePDF();
        });

        function goBack() { location.href = 'dashboard.html'; }
        function showError(msg) {
            document.getElementById('mainContent').innerHTML = `<div class="text-center py-20"><p class="text-slate-600">${msg}</p></div>`;
        }

        init();
    </script>
</body>
</html>
