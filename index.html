<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qtutor - เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-6xl mb-3">🎓</div>
            <h1 class="text-4xl font-black text-blue-600 tracking-tighter">Qtutor</h1>
            <p class="text-slate-500 text-sm mt-2">กรอกเบอร์โทรศัพท์เพื่อเข้าสู่บทเรียน</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-2xl shadow-blue-100 border border-white">
            <div id="loginStep">
                <label class="block text-sm font-bold text-slate-700 mb-2">📱 เบอร์โทรศัพท์ที่ลงทะเบียน</label>
                <input type="tel" id="phoneInput" placeholder="08XXXXXXXX" maxlength="10"
                    class="w-full p-4 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all text-xl font-bold tracking-widest text-center">
                
                <button id="checkBtn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                    ตรวจสอบข้อมูล
                </button>
            </div>

            <div id="previewStep" class="hidden space-y-4 animate-fade-in">
                <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                    <p class="text-xs text-blue-500 font-bold uppercase tracking-wider">ชื่อนักเรียน</p>
                    <p id="studentName" class="text-xl font-bold text-slate-800">-</p>
                </div>

                <div>
                    <p class="text-xs text-slate-400 font-bold mb-2 uppercase tracking-wider">คอร์สของคุณ</p>
                    <div id="courseList" class="flex flex-wrap gap-2">
                        </div>
                </div>

                <div class="pt-4 flex gap-3">
                    <button id="cancelBtn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all">
                        ไม่ใช่ฉัน
                    </button>
                    <button id="confirmBtn" class="flex-[2] bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-green-100 transition-all active:scale-95">
                        ยืนยันเข้าเรียน
                    </button>
                </div>
            </div>
        </div>

        <p class="text-xs text-slate-400 text-center mt-8">
            พัฒนาโดย <span class="font-bold text-slate-500">พี่เท็น</span> · กวดวิชาคิวติวเตอร์
        </p>
    </div>

    <script src="app.js"></script>
</body>
</html>
