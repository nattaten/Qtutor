<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qtutor - เข้าสู่ระบบ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, .22), transparent 34rem),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, .18), transparent 30rem),
                linear-gradient(135deg, #f8fbff 0%, #eaf4ff 52%, #f5f9ff 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, .86);
            box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
            backdrop-filter: blur(18px);
        }

        .soft-grid {
            background-image:
                linear-gradient(rgba(15, 23, 42, .045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, .045) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(to bottom, transparent, black 18%, black 76%, transparent);
        }

        .float-card {
            animation: floatCard 5.5s ease-in-out infinite;
        }

        .float-card:nth-child(2) {
            animation-delay: -1.2s;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeUp .28s ease-out both;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Qtutor">
    <link rel="apple-touch-icon" href="logo.png">
</head>
<body class="min-h-screen text-slate-900">
    <main class="relative min-h-screen overflow-hidden px-4 py-8 sm:px-6 lg:px-8">
        <div class="soft-grid pointer-events-none absolute inset-0"></div>

        <section class="relative mx-auto flex min-h-[calc(100vh-4rem)] w-full max-w-6xl items-center justify-center">
            <div class="mx-auto w-full max-w-md">
                <div class="mb-5 flex justify-center">
                    <img src="โลโก้คิวใหม่ (1).png" alt="Qtutor Logo" class="h-32 w-auto object-contain drop-shadow-xl sm:h-36">
                </div>

                <div class="glass-panel rounded-[2rem] border border-white p-6 sm:p-8">
                    <div class="mb-7 text-center">
                        <h2 class="mt-2 text-2xl font-bold text-slate-950">ระบบตรวจสอบคะแนน</h2>
                        <p class="mt-2 text-sm text-slate-500">กรอกเบอร์โทรที่ใช้สมัครเรียน เพื่อค้นหาข้อมูลของคุณ</p>
                    </div>

                    <div id="loginStep">
                        <label for="phoneInput" class="mb-2 block text-sm font-semibold text-slate-700">เบอร์โทรศัพท์ที่ลงทะเบียน</label>
                        <div class="relative">
                            <span class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-lg text-slate-400">☎</span>
                            <input type="tel" id="phoneInput" placeholder="08XXXXXXXX" maxlength="10" inputmode="numeric"
                                class="w-full rounded-2xl border border-slate-200 bg-white px-12 py-4 text-center text-xl font-semibold tracking-[.18em] text-slate-900 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
                        </div>

                        <button id="checkBtn" class="mt-5 flex w-full items-center justify-center gap-2 rounded-2xl bg-blue-600 py-4 font-semibold text-white shadow-xl shadow-blue-900/15 transition hover:-translate-y-0.5 hover:bg-blue-700 active:translate-y-0 disabled:cursor-wait disabled:opacity-70">
                            ตรวจสอบข้อมูล
                        </button>

                        <p class="mt-4 text-center text-xs leading-5 text-slate-400">ข้อมูลใช้สำหรับยืนยันการเข้าเรียนในระบบ Qtutor เท่านั้น</p>
                    </div>

                    <div id="previewStep" class="hidden space-y-5 animate-fade-in">
                        <div class="rounded-2xl border border-blue-100 bg-blue-50/80 p-5">
                            <p class="text-xs font-bold uppercase tracking-wider text-blue-700">ชื่อนักเรียน</p>
                            <p id="studentName" class="mt-1 text-xl font-bold text-slate-900">-</p>
                        </div>

                        <div>
                            <p class="mb-2 text-xs font-bold uppercase tracking-wider text-slate-400">คอร์สของคุณ</p>
                            <div id="courseList" class="flex flex-wrap gap-2"></div>
                        </div>

                        <div class="flex gap-3 pt-2">
                            <button id="cancelBtn" class="flex-1 rounded-2xl bg-slate-100 py-4 font-semibold text-slate-600 transition hover:bg-slate-200">
                                ไม่ใช่ฉัน
                            </button>
                            <button id="confirmBtn" class="flex-[2] rounded-2xl bg-blue-600 py-4 font-semibold text-white shadow-xl shadow-blue-900/15 transition hover:-translate-y-0.5 hover:bg-blue-700 active:translate-y-0">
                                ยืนยันเข้าเรียน
                            </button>
                        </div>
                    </div>
                </div>

                <p class="mt-6 text-center text-xs text-slate-400">
                    พัฒนาโดย <span class="font-semibold text-slate-500">พี่เท็น</span> · กวดวิชาคิวติวเตอร์
                </p>
            </div>
        </section>
    </main>

    <script src="app.js?v=20260604-4"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('PWA Ready!'))
                    .catch(err => console.log('PWA Error', err));
            });
        }
    </script>
</body>
</html>
